<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Idiom Forge — Sentence Builder (Eiken Pre-1 / GRADEPre1) [HINTSTYLE-G3+PREPSFIX]</title>
<style>
:root{--bg1:#050611;--bg2:#0c1330;--ink:#eaf2ff;--muted:rgba(234,242,255,.72);--glass:rgba(9,12,24,.74);--warn:#ff5a7a;--gold:#ffd86b;--ok:#7cffc5;--btnIdle:.32;--btnTouch:.14;--fade:120ms;}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;min-height:100vh;display:grid;place-items:center;color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 12% 14%, rgba(124,255,197,.12), transparent 30%),radial-gradient(circle at 82% 22%, rgba(189,163,255,.10), transparent 28%),radial-gradient(circle at 62% 84%, rgba(255,216,107,.10), transparent 30%),linear-gradient(180deg,var(--bg1),var(--bg2) 55%,var(--bg1));padding:max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));overflow-x:hidden;}
.frame{width:100%;max-width:375px;padding:14px;border-radius:28px;background:var(--glass);backdrop-filter:blur(10px) saturate(1.15);border:1px solid rgba(124,255,197,.20);box-shadow:0 22px 70px rgba(0,0,0,.52),0 0 40px rgba(124,255,197,.08);position:relative;}
.topbar{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 12px;border-radius:18px;background:rgba(10,16,34,.30);border:1px solid rgba(124,255,197,.14);}
.topcenter{display:flex;justify-content:center;align-items:center;}
.topright{display:flex;justify-content:flex-end;align-items:center;gap:10px;flex-wrap:wrap;}
.topspacer{min-height:1px;}
.brand{display:flex;flex-direction:column;gap:2px;min-width:200px}.brand .t{font-weight:900;letter-spacing:.08em;font-size:14px}.brand .s{font-size:11px;color:var(--muted);letter-spacing:.06em}
.controls{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.seg{display:flex;overflow:hidden;border-radius:14px;border:1px solid rgba(124,255,197,.16);background:rgba(10,16,34,.18)}
.seg button{appearance:none;border:0;padding:10px 12px;background:transparent;color:rgba(255,255,255,.86);font-weight:900;letter-spacing:.06em;cursor:pointer;opacity:.75}
.seg button.active{background:rgba(124,255,197,.14);opacity:1}
.sel{display:flex;gap:8px;align-items:center;padding:8px 10px;border-radius:14px;border:1px solid rgba(124,255,197,.14);background:rgba(10,16,34,.18);color:rgba(255,255,255,.86);font-weight:800;letter-spacing:.04em}
.sel.bad{border-color:rgba(255,90,122,.55);background:rgba(255,90,122,.08)}.sel.good{border-color:rgba(124,255,197,.45);background:rgba(124,255,197,.08)}
select{max-width:100%;
  background:#d9d9d9; /* 灰色で見やすく */
  color:#111;
  border:1px solid #bdbdbd;
  border-radius:10px;
  outline:none;
  font-weight:900;
  letter-spacing:.06em;
  cursor:pointer;
  padding:6px 10px;
  appearance:none;
}
select:focus{box-shadow:0 0 0 2px rgba(255,216,107,.35);}
select option{background:#f3f3f3;color:#111;}
.card{margin-top:12px;border-radius:18px;background:rgba(10,16,34,.28);border:1px solid rgba(124,255,197,.12);box-shadow:0 10px 26px rgba(0,0,0,.25);padding:12px}
.prompt{display:grid;gap:8px}.prompt .meta{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.chip{font-size:11px;letter-spacing:.06em;padding:6px 10px;border-radius:999px;border:1px solid rgba(189,163,255,.20);background:rgba(189,163,255,.10);color:rgba(234,242,255,.86);display:inline-flex;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chip.gold{border-color:rgba(255,216,107,.20);background:rgba(255,216,107,.08)}.chip.warn{border-color:rgba(255,90,122,.22);background:rgba(255,90,122,.08)}
.jp{font-size:15px;font-weight:800;letter-spacing:.02em;line-height:1.35}.scene{font-size:13px;color:rgba(234,242,255,.78);letter-spacing:.02em;line-height:1.35}
.slots{min-height:78px;border-radius:18px;padding:10px;border:1px dashed rgba(255,255,255,.18);background:rgba(10,16,34,.20);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.bank{min-height:92px;border-radius:18px;padding:10px;border:1px solid rgba(124,255,197,.12);background:rgba(10,16,34,.16);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.tok{display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:16px;border:1px solid rgba(124,255,197,.16);background:rgba(10,16,34,.18);color:rgba(255,255,255,.92);font-weight:900;letter-spacing:.04em;cursor:pointer;user-select:none;opacity:var(--btnIdle);transition:opacity var(--fade) ease,transform var(--fade) ease,background var(--fade) ease,border-color var(--fade) ease}
.tok:active{transform:scale(.97)}.tok.ui-touch{opacity:var(--btnTouch)}.tok.good{border-color:rgba(124,255,197,.38);background:rgba(124,255,197,.10);opacity:.92}.tok.bad{border-color:rgba(255,90,122,.45);background:rgba(255,90,122,.12);opacity:.92}.tok.prep{border-color:rgba(255,216,107,.22)}
.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-top:10px}
.btn{flex:1;min-width:120px;padding:12px 14px;border-radius:18px;border:1px solid rgba(124,255,197,.18);background:rgba(10,16,34,.26);color:rgba(255,255,255,.92);font-weight:900;letter-spacing:.06em;cursor:pointer;opacity:.82}
.btn.primary{border-color:rgba(124,255,197,.30);background:rgba(124,255,197,.14)}.btn.gold{border-color:rgba(255,216,107,.28);background:rgba(255,216,107,.10)}
.status{margin-top:10px;border-radius:18px;padding:12px;border:1px solid rgba(255,255,255,.10);background:rgba(10,16,34,.18);display:grid;gap:8px}
.status .line{display:flex;gap:10px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}.status .msg{font-weight:900;letter-spacing:.04em}.status .sub{color:rgba(234,242,255,.70);font-size:12px;line-height:1.45}
.explain{margin-top:10px;border-radius:18px;padding:12px;border:1px solid rgba(255,216,107,.18);background:rgba(255,216,107,.06);display:none;gap:10px}
.explain.show{display:grid}.explain h3{margin:0;font-size:13px;letter-spacing:.06em}.explain .p{color:rgba(234,242,255,.86);font-size:12.5px;line-height:1.55}.explain .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:rgba(234,242,255,.82)}
.diag{position:absolute;right:10px;top:10px;max-width:72ch;padding:9px 10px;border-radius:14px;background:rgba(0,0,0,.62);border:1px solid rgba(255,90,122,.45);color:rgba(255,255,255,.92);font:12px ui-monospace,SFMono-Regular,Menlo,monospace;display:none;pointer-events:none;white-space:pre-wrap;z-index:50}


@media (max-width: 420px){
  .frame{padding:12px;border-radius:22px;}
  .topbar{grid-template-columns:1fr auto;gap:8px;}
  .topspacer{display:none;}
  .seg button{padding:9px 10px;}
  .jp{font-size:14px;}
  .scene{font-size:12px;}
  .tok{padding:9px 10px;border-radius:14px;}
  .btn{min-width:96px;padding:11px 12px;border-radius:16px;}
}

/* === Exam Clean UI Overrides === */
/* BANK & slots text to white */
.bank, .bank *{color:#ffffff;}
.slots, .slots *{color:#ffffff;}
.bank .tok, .slots .tok{opacity:1;}

/* Hide decorative chips (MODE / GRADE / SHELF / FOCUS) */
#chipMode, #chipGrade, #chipSkill, #chipFocus{display:none !important;}

/* Hide instructional helper text */
.scene{display:none;}


/* Fixed-grade build */
#gradeWrap{display:none !important;}

/* === EXIT: back to index.html (sticky) === */
.index-exit{position:sticky;top:0;z-index:1000;display:flex;justify-content:center;padding:10px;
background:linear-gradient(180deg,rgba(5,6,17,.95),rgba(5,6,17,.75) 60%,rgba(5,6,17,0));}
.index-exit a{text-decoration:none;font-weight:900;letter-spacing:.08em;padding:10px 18px;
border-radius:18px;color:#eaf2ff;border:1px solid rgba(124,255,197,.35);
background:rgba(10,16,34,.65);backdrop-filter:blur(8px);
box-shadow:0 6px 20px rgba(0,0,0,.35);} 
.index-exit a:active{transform:scale(.97);} 

/* === In-frame Grade header (top of frame) === */
.grade-inframe{display:flex;justify-content:center;align-items:center;margin:2px 0 10px 0;}
.grade-inframe .badge{font-weight:900;letter-spacing:.12em;padding:9px 22px;border-radius:22px;
  color:#ffd86b;border:1px solid rgba(255,216,107,.45);background:rgba(10,16,34,.55);
  box-shadow:0 6px 18px rgba(0,0,0,.35);} 

/* Hide old right-aligned grade badge inside topbar */
#gradeBadge{display:none !important;}


/* === Drag & Drop UX === */
.drag-ghost{box-shadow:0 12px 28px rgba(0,0,0,.45);opacity:.92;}
/* === Insert marker for drag & drop === */
.drop-marker{width:0;border-left:3px solid var(--gold);height:34px;margin:0 2px;border-radius:3px;align-self:center;opacity:.95;}
.slots.drag-over{border-color:rgba(255,216,107,.55);}
/* === SHELF dropdown moved under topbar (no overflow) === */
.shelf-row{display:flex;flex-direction:column;gap:8px;margin:12px 0 0 0;}
#skillWrap{width:100%;justify-content:space-between;flex-wrap:wrap;}
#skillWrap span{white-space:nowrap;}
#skillWrap select{flex:1;min-width:0;}



/* === PATCH: Long-press ready (scale+float) & disable native selection/callout === */
/* Prevent iOS/Android text range selection & callout while interacting with tokens */
.bank, .slots { -webkit-user-select: none; user-select: none; }
.tok {
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-drag: none;
  touch-action: none; /* stop browser panning/selection on long-press */
}

/* Visual feedback exactly at long-press activation (before dragging) */
.tok.press-ready{
  opacity: 1;
  transform: scale(1.12) translateY(-2px);
  box-shadow: 0 18px 42px rgba(0,0,0,.55), 0 0 0 1px rgba(255,216,107,.22) inset;
  border-color: rgba(255,216,107,.50);
  background: rgba(255,216,107,.12);
  position: relative;
  z-index: 10;
}

/* HINT NEWLINE DISPLAY */
#statusMsg, #expDiff{white-space:pre-line;}
</style>

<div class="frame">

        <option value="prep">前置詞（時間・場所・期間）</option>
        <option value="conj">接続詞（because/when/if）</option>
        <option value="comp">比較（比較級・最上級）</option>
        <option value="qneg">疑問文/否定文</option>
        <option value="pron">代名詞・数量（some/any など）</option>
        <option value="verbprep">動詞＋前置詞（look for 等）</option>
   
  <option value="passive">受動態（be/get + p.p. / have|get O p.p.）</option>
  <option value="rel">関係代名詞（who/which/whose）</option>
   <option value="subj">仮定法（if/wish）</option>
   <option value="inv">倒置（Not until / Hardly / Only then）</option>
   <option value="part">分詞構文・付帯状況（Given / Having / With + O + C）</option>

    </div>
  </div>
<div class="card">
    <div class="prompt">
      <div class="meta">
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <span id="chipMode" class="chip">MODE A</span>
          <span id="chipGrade" class="chip gold">GRADE Pre-1</span>
            <span id=\"chipSkill\" class=\"chip\">SHELF ALL</span>
            <span id="chipFocus" class="chip warn">FOCUS: —</span>
          <span class="chip">5文型</span>
        </div>
        <div><span class="chip">Q <span id="qIndex">1</span>/<span id="qTotal">?</span></span></div>
      </div>
      <div id="jpPrompt" class="jp">（読み込み中…）</div>
      <div id="scenePrompt" class="scene">—</div>
    </div>

    <div style="margin-top:12px;display:grid;gap:10px;">
      <div class="scene">並べ替え（タップで追加 / 既存をタップで戻す）</div>
      <div id="slots" class="slots"></div>

      <div class="scene">BANK</div>
      <div id="bank" class="bank"></div>
 <div class="sel" id="patternWrap"><span>5文型</span>
        <select id="patternSel"><option value="">選択…</option></select>
      </div>

      

      <div class="actions">
        <button id="btnCheck" class="btn primary" type="button">CHECK</button>
        <button id="btnHint" class="btn gold" type="button">HINT</button>
        <button id="btnClear" class="btn" type="button">CLEAR</button>
        <button id="btnBack" class="btn" type="button">BACK</button>
          <button id="btnNext" class="btn" type="button">NEXT</button>
      </div>

      <div class="status" aria-live="polite">
        <div class="line"><div class="msg" id="statusMsg">英文＋5文型を答えよう。</div><div class="msg">SCORE: <span id="score">0</span></div></div>
        <div class="sub" id="statusSub">正解時は赤表示なし。文型が違う場合は「強ガイド」＋SVOO⇄SVO（to/for）広域救済。</div>
      </div>

      <div id="explain" class="explain">
        <h3 id="expTitle">解説</h3>
        <div class="mono" id="expDiff">—</div>
        <div class="p" id="expBody">—</div>
      </div>
    </div>
  </div>
</div>

function isWord(t){return /^[A-Za-z]+$/.test(t||'');}

function looksAdj(t){
  t=lower(t);
  if(!t) return false;
  var common={'happy':1,'sad':1,'tired':1,'late':1,'open':1,'closed':1,'clean':1,'boring':1,'interesting':1,'nervous':1,'reliable':1,'reasonable':1,'uncertain':1,'aware':1,'quiet':1,'effective':1,'active':1};

function looksNounStart(t){

function inferPatternFromSentence(raw){

  var ditrans={'give':1,'gave':1,'send':1,'sent':1,'show':1,'showed':1,'teach':1,'taught':1,'tell':1,'told':1,'lend':1,'lent':1,'buy':1,'bought':1,'make':1,'made':1,'cook':1,'cooked':1,'get':1,'got':1,'find':1,'found':1,'offer':1,'offered':1,'bring':1,'brought':1,'write':1,'wrote':1};

  }

    if(looksNounStart(t1) && (looksAdj(t2) || looksNounStart(t2))) return {guess:'5',verb:verb,why:'Oの後ろに説明（C）が来ている（O=C / OがCの状態）'};

function splitSVOC(raw, pat, verb){
  var tokens=tokenize(raw);
  while(tokens.length && !isWord(tokens[tokens.length-1])) tokens.pop();
  if(!tokens.length) return {S:'',V:'',O:'',C:'',M:'',pat:String(pat||'')};

  var v=verb||pickVerb(tokens.slice(1))||pickVerb(tokens);
  var vIndex=-1;
  for(var i=0;i<tokens.length;i++){ if(lower(tokens[i])===v){ vIndex=i; break; } }
  if(vIndex<0) vIndex=1;

  var S=tokens.slice(0,vIndex).join(' ');
  var V=tokens[vIndex]||'';
  var rest=tokens.slice(vIndex+1);

  var det={a:1,an:1,the:1,my:1,your:1,his:1,her:1,our:1,their:1,this:1,that:1,these:1,those:1,some:1,any:1,each:1,every:1};
  var pro={me:1,him:1,her:1,us:1,them:1,it:1,you:1,who:1,whom:1};
  var toOnly={explain:1,explained:1,introduce:1,introduced:1,describe:1,described:1,suggest:1,suggested:1,propose:1,proposed:1,announce:1,announced:1,report:1,reported:1,mention:1,mentioned:1};

  function join(a){return (a&&a.length)? a.join(' '):'';}

  // split first prepositional phrase starting at a key preposition (used for M)
  var PHEAD={to:1,for:1,in:1,on:1,at:1,by:1,with:1,from:1,into:1,onto:1,over:1,under:1,about:1,against:1,between:1,among:1,within:1,without:1,before:1,after:1,during:1,around:1,near:1,through:1,across:1,along:1,behind:1,beyond:1,despite:1,via:1};
  function splitPrepPhrase(arr){
    for(var k=0;k<arr.length;k++){
      var t=lower(arr[k]);
      if(PHEAD[t]) return {head:arr.slice(0,k), tail:arr.slice(k)};
    }
    return null;
  }

  var O='',C='',M='';
  pat=String(pat||'');

  if(pat==='1'){
    // SV: keep M minimal (only a leading prep phrase if exists)
    var sp1=splitPrepPhrase(rest);
    if(sp1){ M=join(sp1.tail); }
    else { M=''; }
  } else if(pat==='2'){
    // SVC: C is main; M only if a trailing prep phrase exists and C is not empty
    var sp2=splitPrepPhrase(rest);
    if(sp2 && sp2.head.length){ C=join(sp2.head); M=join(sp2.tail); }
    else { C=join(rest); }
  } else if(pat==='3'){
    var sp3=splitPrepPhrase(rest);
    if(sp3){ O=join(sp3.head); M=join(sp3.tail); }
    else { O=join(rest); }
  } else if(pat==='4'){
    // SVOO: if prep phrase appears (to/for...), treat as DO + M
    var sp4=splitPrepPhrase(rest);
    if(sp4){ O=join(sp4.head); M=join(sp4.tail); }
    else {
      var cut=-1;
      for(var j=1;j<rest.length;j++){
        if(det[lower(rest[j])]){ cut=j; break; }
      }
      if(cut<0) cut=Math.min(1, rest.length);
      var io=rest.slice(0,cut);
      var doo=rest.slice(cut);
      O=join(io);
      C=join(doo);
    }
  } else if(pat==='5'){
    // SVOC / O to do : if 'to' exists, treat as boundary for C
    var idxTo=-1;
    for(var t=0;t<rest.length;t++){ if(lower(rest[t])==='to'){ idxTo=t; break; } }
    if(idxTo>0){
      O=join(rest.slice(0,idxTo));
      C=join(rest.slice(idxTo));
    } else {
      var oEnd=1;
      var r0=lower(rest[0]||'');
      if(pro[r0]){
        oEnd=1;
      } else if(det[r0]){
        oEnd=Math.min(2, rest.length);
        if(typeof looksAdj==='function'){
          for(var u=2;u<rest.length;u++){
            if(looksAdj(rest[u])){ oEnd=u; break; }
          }
        }
      } else {
        oEnd=1;
      }
      O=join(rest.slice(0,oEnd));
      C=join(rest.slice(oEnd));
      // optional M: if complement contains a prep phrase later, don't surface by default
    }
  } else {
    var spX=splitPrepPhrase(rest);
    if(spX){ O=join(spX.head); M=join(spX.tail); }
    else { O=join(rest); }
  }

  // enforce toOnly verbs: prefer O + to/for phrase as M
  if(toOnly[lower(v)]){
    var spT=splitPrepPhrase(rest);
    if(spT){ O=join(spT.head); M=join(spT.tail); C=''; }
  }

  return {S:S,V:V,O:O,C:C,M:M,pat:pat,verb:v};
}

function shouldShowM(sp){
  if(!sp || !sp.M) return false;
  var ms=String(sp.M).trim();
  if(!ms || ms==='—') return false;
  // Only show if starts with a key preposition word (avoid noisy adverbs)
  var first=lower(ms.split(/\s+/)[0]||'');
  var ok={to:1,for:1,in:1,on:1,at:1,by:1,with:1,from:1,into:1,onto:1,within:1,without:1,before:1,after:1,during:1,about:1,against:1,between:1,among:1,around:1,near:1,through:1,across:1,along:1,behind:1,beyond:1,despite:1,via:1};
  if(!ok[first]) return false;
  // Keep it short to avoid clutter unless it's to/for phrase
  var n=ms.split(/\s+/).filter(Boolean).length;
  if((first==='to'||first==='for') && n<=8) return true;
  return n<=6;
}

function buildHintSVOC(raw, patGuess, verb){
  var sp=splitSVOC(raw, patGuess, verb);
  var lines=[];
  lines.push('S='+(sp.S||'—'));
  lines.push('V='+(sp.V||'—'));

  if(sp.pat==='4' && sp.M){
    // show DO + M (to/for...) for dative-like patterns
    lines.push('O(物)='+(sp.O||'—'));
    if(shouldShowM(sp)) lines.push('M='+(sp.M||'—'));
  } else if(sp.pat==='4'){
    lines.push('O(人)='+(sp.O||'—'));
    lines.push('O(物)='+(sp.C||'—'));
  } else {
    lines.push('O='+(sp.O||'—'));
    lines.push('C='+(sp.C||'—'));
    if(shouldShowM(sp)) lines.push('M='+(sp.M||'—'));
  }

  return lines.join('\n');
}

/* === HINT STYLE PORTED FROM GRADE3 (incl. _preps) === */
function _preps(){
  return {in:1,on:1,at:1,by:1,for:1,with:1,from:1,to:1,of:1,about:1,after:1,before:1,during:1,until:1,into:1,onto:1,over:1,under:1,between:1,among:1,around:1,across:1,through:1,within:1,without:1,along:1,near:1,beside:1,behind:1,beyond:1,against:1,throughout:1};
}

function parseDative(tokens){
  var endPunc={'.':1,'?':1,'!':1,',':1,':':1,';':1};
  var core=[];
  for(var i=0;i<tokens.length;i++){
    var t=tokens[i];
    if(!endPunc[t]) core.push(t);
  }
  if(core.length<3) return null;

  // --- identify S (subject) and V (main verb) (handle simple auxiliaries) ---
  var S=core[0]||'';
  var V=core[1]||'';
  var vIndex=1;
  var aux={will:1,can:1,must:1,should:1,may:1,might:1,have:1,has:1,had:1,"'ll":1,"'ve":1,"'d":1};
  var vlow=(V||'').toLowerCase();
  if(aux[vlow] && core.length>=4){ V=core[2]; vIndex=2; }

  var afterV=core.slice(vIndex+1);
  if(afterV.length<2) return null;

  var objPron={'me':1,'him':1,'her':1,'us':1,'them':1,'you':1};
  var poss={'my':1,'your':1,'his':1,'her':1,'our':1,'their':1};
  var human={'mother':1,'father':1,'mom':1,'dad':1,'parents':1,'parent':1,'sister':1,'brother':1,'friend':1,'teacher':1,'student':1,'kids':1,'kid':1,'child':1,'children':1,'grandmother':1,'grandfather':1,'aunt':1,'uncle':1,'cousin':1};
  function isPersonStart(idx){
    var w=(afterV[idx]||'');
    var low=w.toLowerCase();
    if(objPron[low]) return true;
    if(/^[A-Z]/.test(w)) return true;
    if(poss[low]){
      var next=(afterV[idx+1]||'').toLowerCase();
      if(human[next]) return true;
    }
    return false;
  }

  // --- SVOO: 人 → 物  (最優先: 後ろに to/for があっても、まず語順で判定) ---
  if(isPersonStart(0)){
    var o1Len=1;
    var firstLow=(afterV[0]||'').toLowerCase();
    if(poss[firstLow] && human[(afterV[1]||'').toLowerCase()]) o1Len=2;
    var O1=afterV.slice(0,o1Len).join(' ');
    var O2=afterV.slice(o1Len).join(' ');
    if(O2){ return {kind:'SVOO', S:S, V:V, O1:O1, O2:O2}; }
  }

  // --- SVO (物 → to/for → 人) ---
  var preps={'to':1,'for':1};
  var prepPos=-1;
  // 受け手を導く to/for を探す: 「to/for の直後が人っぽい」ものを優先し、最後の候補を採用
  for(var j=0;j<afterV.length-1;j++){
    var w=(afterV[j]||'').toLowerCase();
    if(!preps[w]) continue;
    // skip infinitive "to" (to + VERB) っぽいものは除外（簡易）
    var next=(afterV[j+1]||'');
    var nextLow=next.toLowerCase();
    var looksInf = (w==='to') && (!isPersonStart(j+1)) && (/^[a-z]+$/.test(nextLow)) && (!objPron[nextLow]) && (!poss[nextLow]);
    if(looksInf) continue;
    if(isPersonStart(j+1)) prepPos=j;
  }
  if(prepPos!==-1){
    var O=afterV.slice(0, prepPos);
    var prep=afterV[prepPos];
    var IO=afterV.slice(prepPos+1);
    if(O.length && IO.length){
      return {kind:'SVO_PREP', S:S, V:V, O:O.join(' '), prep:prep, IO:IO.join(' ')};
    }
  }

  return null;
}

function _svfix_labelForAlt(sentence, fallbackPattern){
  var dt=parseDative(tokenize(String(sentence||'')));
  if(dt && dt.kind==='SVOO') return '4';
  if(dt && dt.kind==='SVO_PREP') return '3';
  var fb=String(fallbackPattern||'');
  if(fb==='3' || fb==='4') return fb;
  return '4';
}

function _hintToMap(hintText){
  var lines = String(hintText||'').split(/\n/);
  var map = {S:'—',V:'—',O:'—',C:'—',M:'—'};
  for(var i=0;i<lines.length;i++){
    var ln = lines[i];
    if(!ln) continue;
    var m;
    if((m=/^S\s*=\s*(.*)$/.exec(ln))) map.S = (m[1]||'—');
    else if((m=/^V\s*=\s*(.*)$/.exec(ln))) map.V = (m[1]||'—');
    else if((m=/^O\(.*?\)\s*=\s*(.*)$/.exec(ln))) map.O = (m[1]||'—');
    else if((m=/^O\s*=\s*(.*)$/.exec(ln))) map.O = (m[1]||'—');
    else if((m=/^C\s*=\s*(.*)$/.exec(ln))) map.C = (m[1]||'—');
    else if((m=/^M\s*=\s*(.*)$/.exec(ln))) map.M = (m[1]||'—');
  }
  return map;
}

function _mapToHint(map){
  return ['S='+map.S,'V='+map.V,'O(物)='+map.O,'C='+map.C,'M='+map.M].join('\n');
}

function extractLeadingIntro(raw){
  var toks = tokenize(raw||'');
  if(!toks || !toks.length) return {m:'', rest: raw||''};
  var comma=-1;
  for(var i=0;i<toks.length;i++){ if(toks[i]===','){ comma=i; break; } }
  if(comma<=0) return {m:'', rest: raw||''};

  var first = toks[0]||'';
  var firstLow = first.toLowerCase();

  var startsPart = false;
  if(/ing$/.test(firstLow)) startsPart = true;
  if(/ed$/.test(firstLow) || /en$/.test(firstLow)) startsPart = true;
  var partStarters = {having:1, being:1, given:1, looking:1, considering:1, facing:1, resisting:1, surrounded:1, confronted:1};
  if(partStarters[firstLow]) startsPart = true;

  var clauseStarters = {when:1, if:1, because:1, although:1, though:1, while:1, as:1, since:1, before:1, after:1, until:1, once:1, unless:1, whereas:1, whenever:1, wherever:1};
  var startsClause = !!clauseStarters[firstLow];

  var prepStarters = {in:1,on:1,at:1,by:1,for:1,with:1,from:1,to:1,of:1,about:1,into:1,onto:1,over:1,under:1,between:1,among:1,around:1,across:1,through:1,throughout:1,within:1,without:1,along:1,near:1,beside:1,behind:1,beyond:1,against:1,after:1,before:1,during:1,until:1,regarding:1,concerning:1,despite:1,via:1};
  var startsPrep = !!prepStarters[firstLow];

  var startsInf = (firstLow==='to');
  var startsFallback = _isLikelySubjectToken(toks[comma+1]||'');

  if(!startsPart && !startsClause && !startsPrep && !startsInf && !startsFallback) return {m:'', rest: raw||''};

  var mTokens = toks.slice(0, comma+1);
  var restTokens = toks.slice(comma+1);
  var m = _detok(mTokens).replace(/\s*,$/,'').trim();
  var rest = _detok(restTokens).trim();
  return {m:m, rest:rest};
}

function _simpleObjectForSVO(raw){
  var toks = tokenize(raw||'');
  var endPunc={'.':1,'?':1,'!':1,',':1,':':1,';':1};
  var core=[];
  for(var i=0;i<toks.length;i++) if(!endPunc[toks[i]]) core.push(toks[i]);
  if(core.length<3) return {obj:'', tail:''};
  var rest = core.slice(2);
  var preps=_preps();
  var objTokens=[];
  var tailTokens=[];
  for(var j=0;j<rest.length;j++){
    var w=(rest[j]||'').toLowerCase();
    if(preps[w]){ tailTokens = rest.slice(j); break; }
    objTokens.push(rest[j]);
  }
  return {obj:objTokens.join(' ').trim(), tail:tailTokens.join(' ').trim()};
}

function _splitObjectTrailingPP(objStr){
  var toks = tokenize(objStr||'');
  var endPunc={'.':1,'?':1,'!':1,',':1,':':1,';':1};
  var core=[];
  for(var i=0;i<toks.length;i++) if(!endPunc[toks[i]]) core.push(toks[i]);
  if(core.length<2) return {obj: objStr||'', tail:''};
  var preps=_preps();
  for(var j=1;j<core.length;j++){
    var w=(core[j]||'').toLowerCase();
    if(preps[w]){
      return {obj: core.slice(0,j).join(' ').trim(), tail: core.slice(j).join(' ').trim()};
    }
  }
  return {obj: objStr||'', tail:''};
}

function _svfix_fixQuestionHintMap(map, body, patGuess, lead){
  try{
    var toks = tokenize(body||'');
    // drop trailing punctuation
    while(toks.length && !isWord(toks[toks.length-1])) toks.pop();
    if(toks.length<3) return map;

    var wh={what:1,who:1,when:1,where:1,why:1,how:1,which:1};
    var auxDo={do:1,does:1,did:1};
    var auxBe={am:1,is:1,are:1,was:1,were:1};
    var auxModal={can:1,will:1,shall:1,may:1,might:1,must:1,should:1,could:1,would:1};
    var auxHave={have:1,has:1,had:1};
    function isAux(w){ return !!(auxDo[w]||auxBe[w]||auxModal[w]||auxHave[w]); }

    var det={a:1,an:1,the:1,this:1,that:1,these:1,those:1,my:1,your:1,his:1,her:1,our:1,their:1,some:1,any:1};
    function join(a){return (a&&a.length)? a.join(' '):'';}

    var w0=lower(toks[0]||'');
    var whLead='';
    var auxTok='';
    var start=0;

    if(wh[w0] && toks.length>=4 && isAux(lower(toks[1]||''))){
      whLead = toks[0];
      auxTok = toks[1];
      start = 2;
    } else if(isAux(w0)){
      auxTok = toks[0];
      start = 1;
    } else {
      return map;
    }

    var auxLow = lower(auxTok||'');
    var subjEnd = start+1;
    // allow 2-token subject like "your brother" / "the movie"
    if(subjEnd < toks.length && det[lower(toks[start]||'')] && isWord(toks[subjEnd])) subjEnd = start+2;

    // --- DO/MODAL/HAVE question: Aux + S + V + ... ---
    if(auxDo[auxLow] || auxModal[auxLow] || auxHave[auxLow]){
      if(subjEnd>=toks.length) return map;
      var vIndex = subjEnd;
      if(vIndex>=toks.length) return map;
      var S = join(toks.slice(start, subjEnd));
      var V = toks[vIndex]||'';
      var rest = toks.slice(vIndex+1);

      map.S = S || map.S;
      map.V = V || map.V;
      if(String(patGuess||'')==='2'){
        map.C = join(rest) || map.C;
      } else {
        map.O = join(rest) || map.O;
      }

      // M: wh + aux, plus intro lead
      var mParts=[];
      if(lead) mParts.push(lead);
      if(whLead) mParts.push(whLead+' '+auxTok);
      else mParts.push(auxTok);
      // preserve existing M if meaningful and not duplicate
      if(map.M && map.M!=='—'){
        var cur=String(map.M);
        var merged=mParts.join(' / ');
        if(cur.indexOf(auxTok)===-1 && cur.indexOf(merged)===-1) mParts.push(cur);
      }
      map.M = mParts.filter(function(x){return x && x!=='—';}).join(' / ') || '—';
      return map;
    }

    // --- BE question: V=be, S after it ---
    if(auxBe[auxLow]){
      if(subjEnd>toks.length) return map;
      var S2 = join(toks.slice(start, subjEnd));
      var rest2 = toks.slice(subjEnd);
      map.S = S2 || map.S;
      map.V = auxTok || map.V;
      if(String(patGuess||'')==='2') map.C = join(rest2) || map.C;
      else map.O = join(rest2) || map.O;

      var mParts2=[];
      if(lead) mParts2.push(lead);
      if(whLead) mParts2.push(whLead);
      if(map.M && map.M!=='—'){
        var cur2=String(map.M);
        if(whLead && cur2.indexOf(whLead)===-1) mParts2.push(cur2);
        if(!whLead && lead && cur2.indexOf(lead)===-1) mParts2.push(cur2);
      }
      map.M = mParts2.filter(function(x){return x && x!=='—';}).join(' / ') || '—';
      return map;
    }

    return map;
  } catch(e){
    return map;
  }
}

function buildHintSVM(raw){
  var ex = extractLeadingIntro(raw||'');
  var lead = ex.m;
  var body = ex.rest || '';
  var coreTokens = tokenize(body);
  var endPunc={'.':1,'?':1,'!':1,',':1,':':1,';':1};
  var core=[];
  for(var ii=0;ii<coreTokens.length;ii++) if(!endPunc[coreTokens[ii]]) core.push(coreTokens[ii]);
  var S_sv = core[0]||'—';
  var V_sv = core[1]||'—';
  var tail = core.slice(2).join(' ')||'';
  var M_sv = (lead? lead : '');
  if(tail) M_sv = (M_sv? (M_sv+' / '+tail) : tail);
  if(!M_sv) M_sv='—';
  return ['S='+S_sv,'V='+V_sv,'O(物)=—','C=—','M='+M_sv].join('\n');
}

function buildHintWithM(raw, patGuess, verb, it){
  var ex = extractLeadingIntro(raw||'');
  var lead = ex.m;
  var body = ex.rest || (raw||'');
  if(String(patGuess||'')==='1') return buildHintSVM(raw);

  var base = (typeof buildHintSVOC_Dative==='function') ? buildHintSVOC_Dative(body, patGuess, verb, it) : buildHintSVOC(body, patGuess, verb);
  var map = _hintToMap(base);

  // SVO recovery if O missing
  if(String(patGuess||'')==='3' && (!map.O || map.O==='—')){
    var rec = _simpleObjectForSVO(body);
    if(rec.obj){
      map.O = rec.obj;
      if(rec.tail){
        map.M = (lead? lead : '');
        map.M = (map.M? (map.M+' / '+rec.tail) : rec.tail);
      }
    }
  }

  // SVO cleanup: if O contains trailing PP like "him at the station", split PP into M
  if(String(patGuess||'')==='3' && map.O && map.O!=='—'){
    var sp = _splitObjectTrailingPP(map.O);
    if(sp.tail){
      map.O = sp.obj || map.O;
      var m2 = (lead? lead : '');
      if(map.M && map.M!=='—') m2 = (m2? (m2+' / '+map.M) : map.M);
      m2 = (m2? (m2+' / '+sp.tail) : sp.tail);
      map.M = m2 || '—';
    }
  }

  // Apply intro M if still empty
  if(lead){
    if(!map.M || map.M==='—') map.M = lead;
    else if(map.M.indexOf(lead)===-1) map.M = lead + ' / ' + map.M;
  }

  // Fix yes/no & WH questions: move auxiliary into M and normalize S/V order
  map = _svfix_fixQuestionHintMap(map, body, patGuess, lead);

  map.S = map.S||'—'; map.V = map.V||'—'; map.O = map.O||'—'; map.C = map.C||'—'; map.M = map.M||'—';
  return _mapToHint(map);
}

function buildHintSVOC_Dative(raw, pat, verb, it){
  if(it && it.allowAltInA && raw && raw.replace(/\s/g,'').length){
    var dt=parseDative(tokenize(raw));
    if(dt && dt.kind==='SVOO'){
      return ['S='+dt.S,'V='+dt.V,'O1(人)='+dt.O1,'O2(物)='+dt.O2,'C=—'].join('\n');
    }
    if(dt && dt.kind==='SVO_PREP'){
      return ['S='+dt.S,'V='+dt.V,'O(物)='+dt.O,'('+dt.prep+' '+dt.IO+')','C=—'].join('\n');
    }
  }
  return buildHintSVOC(raw, pat, verb);
}

// === PATCH: Better pattern inference (main clause focus; avoids picking verbs inside relative clauses) ===
(function(){
  function _tok(s){
    return (s||'').match(/[A-Za-z]+'?[A-Za-z]*|\d+|[^\sA-Za-z\d]/g)||[];
  }
  var REL={who:1,which:1,that:1,where:1,when:1,why:1,whom:1,whose:1};
  var PRON={i:1,you:1,he:1,she:1,we:1,they:1,it:1};
  var DET={a:1,an:1,the:1,this:1,that:1,these:1,those:1,my:1,your:1,his:1,her:1,our:1,their:1};
  var LINK={am:1,is:1,are:1,was:1,were:1,be:1,been:1,being:1,seem:1,seems:1,seemed:1,become:1,becomes:1,became:1,remain:1,remains:1,remained:1,look:1,looks:1,looked:1,feel:1,feels:1,felt:1,sound:1,sounds:1,sounded:1,appear:1,appears:1,appeared:1,get:1,gets:1,got:1,stay:1,stays:1,stayed:1,grow:1,grows:1,grew:1,turn:1,turns:1,turned:1};
  var AUX={do:1,does:1,did:1,have:1,has:1,had:1,will:1,would:1,can:1,could:1,may:1,might:1,must:1,should:1,shall:1};
  var DITR={give:1,gave:1,given:1,send:1,sent:1,show:1,showed:1,shown:1,teach:1,taught:1,offer:1,offered:1,tell:1,told:1,buy:1,bought:1};
  var SVOC={make:1,made:1,call:1,called:1,name:1,named:1,elect:1,elected:1,consider:1,considered:1,find:1,found:1,keep:1,kept:1};
  function low(x){return (x||'').toLowerCase();}
  function looksAdj(t){t=low(t);return /^(very|so|too)$/.test(t) ? true : (/ous$|ful$|able$|ible$|ive$|al$|ic$|less$|y$/.test(t));}
  function looksNounish(t){t=low(t);return !!DET[t] || (/tion$|sion$|ment$|ness$|ity$|er$|or$|ist$|ism$|age$|ship$/.test(t));}
  function scoreVerb(toks,i){
    var v=low(toks[i]||'');
    var prev=low(toks[i-1]||'');
    var nxt=low(toks[i+1]||'');
    var sc=i;
    if(PRON[prev]) sc-=1000;
    if(REL[prev]) sc-=200;
    if(LINK[v]){
      if(looksAdj(nxt)) sc+=400;
      else if(looksNounish(nxt) || DET[nxt]) sc+=300;
      else if(/ing$/.test(nxt)) sc+=120;
    }
    if((DITR[v]||SVOC[v]) && (looksNounish(nxt)||DET[nxt]||PRON[nxt])) sc+=150;
    if(i>toks.length-6) sc+=50;
    return sc;
  }
  window.inferPatternFromSentence = function(raw){
    var toks=_tok(raw||'');
    var cand=[];
    for(var i=0;i<toks.length;i++){
      var v=low(toks[i]);
      if(LINK[v]||AUX[v]||DITR[v]||SVOC[v]) cand.push(i);
    }
    if(!cand.length) return {guess:'1',verb:'',why:'動詞が特定できないためSV扱い'};
    var best=cand[0], bestSc=-1e9;
    for(var k=0;k<cand.length;k++){
      var idx=cand[k];
      var sc=scoreVerb(toks,idx);
      if(sc>bestSc){bestSc=sc;best=idx;}
    }
    var verb=low(toks[best]||'');
    var t1=low(toks[best+1]||'');

    if(LINK[verb]){
      if(t1==='being' || t1==='been') return {guess:'1',verb:verb+' '+t1,why:'be + being/been + p.p. は受動（SV）'};
      if(/ed$/.test(t1) && !looksAdj(t1)) return {guess:'1',verb:verb+' '+t1,why:'be + p.p. は受動（SV）'};
      return {guess:'2',verb:verb,why:'be/連結動詞なので後ろは補語(C)'};
    }
    var t2=low(toks[best+2]||'');
    if(SVOC[verb]){
      if((DET[t1]||looksNounish(t1)||PRON[t1]) && (looksAdj(t2)||DET[t2]||looksNounish(t2))) return {guess:'5',verb:verb,why:'Oの後ろに説明(C)が続く（SVOC）'};
      return {guess:'3',verb:verb,why:'目的語(O)を取る動詞'};
    }
    if(DITR[verb]){
      if((DET[t1]||looksNounish(t1)||PRON[t1]) && (DET[t2]||looksNounish(t2)||PRON[t2])) return {guess:'4',verb:verb,why:'目的語が2つ（SVOO）'};
      return {guess:'3',verb:verb,why:'目的語(O)を取る動詞'};
    }
    if(AUX[verb]){
      var j=best+1; while(j<toks.length && low(toks[j])==='not') j++;
      var base=low(toks[j]||'');
      var k2=j+1; while(k2<toks.length && low(toks[k2])==='not') k2++;
      var obj=low(toks[k2]||'');
      if(LINK[base]) return {guess:'2',verb:verb+' '+base,why:'助動詞+be は補語(C)'};
      if(DET[obj]||looksNounish(obj)||PRON[obj]) return {guess:'3',verb:verb+' '+base,why:'助動詞+動詞の後に目的語(O)'};
      return {guess:'1',verb:verb+' '+base,why:'助動詞+自動詞（目的語なし）'};
    }

    if(DET[t1]||looksNounish(t1)||PRON[t1]) return {guess:'3',verb:verb,why:'Vの直後に名詞/代名詞（O）'};
    return {guess:'1',verb:verb,why:'目的語が見えないのでSV'};
  };
})();
</script>

  function onDown(e){
    const tok = e.target && e.target.closest ? e.target.closest(TOK_SEL) : null;
    if(!tok) return;

  }

  function onMove(e){
    if(!activeTok) return;

    const p = pt(e);
    const dx = p.x - startX;
    const dy = p.y - startY;

    if((dx*dx + dy*dy) > (MOVE_CANCEL_PX*MOVE_CANCEL_PX)) moved = true;

    if(!pressActive && timer && moved){
      clearTimeout(timer); timer = null;
      return;
    }

    if(pressActive && isTouchLike(e) && e.cancelable) e.preventDefault();
  }

  function onUp(e){
    if(!activeTok){ clearAll(); return; }

    const elapsed = downAt ? (Date.now() - downAt) : 9999;

    if(!pressActive && !moved && elapsed <= TAP_MAX_MS){

      if(isTouchLike(e) && e.cancelable) e.preventDefault();

      const tok = activeTok;
      markSynthetic(tok);
      try{ tok.click(); }catch(_){ }

    }

    clearAll();
  }

  const bank = document.getElementById('bank');
  const slots = document.getElementById('slots');
  const containers = [bank, slots].filter(Boolean);

  containers.forEach(function(el){
    el.addEventListener('pointerdown', onDown, {passive:false});
    el.addEventListener('pointermove', onMove, {passive:false});
    el.addEventListener('pointerup', onUp, {passive:false});
    el.addEventListener('pointercancel', onUp, {passive:false});

    el.addEventListener('touchstart', onDown, {passive:false});
    el.addEventListener('touchmove', onMove, {passive:false});
    el.addEventListener('touchend', onUp, {passive:false});
    el.addEventListener('touchcancel', onUp, {passive:false});

    el.addEventListener('contextmenu', function(ev){
      if(ev.target && ev.target.closest && ev.target.closest(TOK_SEL)) ev.preventDefault();
    });

    el.addEventListener('click', function(ev){
      const tok = ev.target && ev.target.closest ? ev.target.closest(TOK_SEL) : null;
      if(!tok) return;
      if(isRecentSynthetic(tok) && ev.isTrusted){
        ev.preventDefault();
        ev.stopPropagation();
        if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();
        consumeSynthetic(tok);
      }
    }, true);
  });

  document.addEventListener('selectionchange', function(){
    if(!pressActive) return;
    clearSelection();
  });

  document.addEventListener('pointerup', onUp, {passive:false});
  document.addEventListener('dragstart', onUp, {passive:true});
})();

<script>
/* === HINT2→HINT1 SVOCM OVERRIDE v35-pre1 (統合版: do否定疑問/比較/最上級/重複除去) ===
  目的:
    - HINT1 の S/V/O/C/M が崩れるケースを包括的に補正
    - HINT3 の重複除去 + 正解文型以外の混入を除外

  主な修正対象（これまでの議論で出たもの）:
    1) do/does/did 疑問・否定疑問（Don't you like ...?）
       -> S=you / V=like / M=not
    2) 移動動詞 + 方向副詞（come home early）
       -> SV / M=home early
    3) be + 形容詞比較級（hotter than ...）
       -> SVC / C=hotter / M=than ...
    4) be + more/less + adj（more difficult than ...）
       -> SVC / C=more difficult / M=than ...
    5) be + better/best/worse/worst
       -> SVC / C=better など
    6) the most/least + adj（the most popular in ...）
       -> SVC / C=the most popular / M=in ...
    7) 主語が2語以上の be 文（This restaurant is ...）

(function(){

    if(/(y|ful|ous|able|ible|al|ive|less|ic|ish|ed)$/.test(w)) return true;

      p.V = toks[subj.next];

  function foldDoNeg(p){
    const v=lw(p.V);

  // be going to fold
  function foldBeGoingTo(p){
    const v=lw(p.V);

    }

    const sp=splitAtFirstPrep(rest);
    return ['S='+p.S,'V='+p.V,'O(物)='+(join(sp.head)||'—'),'C=—','M='+(join(M.concat(sp.tail))||'—')].join('\n');
  }

  // HINT3: dedupe + filter by correct pattern
  function normKey(s){
    s = normalizeContractions(s);
    s = s.toLowerCase();
    s = s.replace(/[“”]/g,'"');
    s = s.replace(/[^a-z0-9\s]/g,' ');
    s = s.replace(/\s+/g,' ').trim();
    return s;
  }

  function buildHint3(it){
    const allArr=(it && it.targets && it.targets.length) ? it.targets : [];
    if(!allArr.length) return 'HINT 3（正解例まとめ）: ';

    const correct = String(it.pattern||'');
    const seen = new Set();
    const rows = [];

    for(let i=0;i<allArr.length;i++){
      const s=String(allArr[i]||'');
      const key=normKey(s);
      if(!key || seen.has(key)) continue;
      seen.add(key);
      const inf=window.inferPatternFromSentence(s);
      const pat=String(correct || (inf&&inf.guess) || '');
      rows.push({s, pat});
    }

    let filtered = rows;
    if(correct){
      const keep = rows.filter(r=>String(r.pat)===String(correct));
      if(keep.length) filtered = keep;
    }

    const parts = filtered.map(r=> r.s + ' ：' + (typeof patternLabel==='function' ? patternLabel(String(r.pat)) : String(r.pat)) );
    const header = 'HINT 3（正解例まとめ）: ' + parts.join(' / ');
    const patLine = '正解の文型：' + (typeof patternLabel==='function' ? patternLabel(String(correct)) : String(correct));
    return header + '\n' + patLine;
  }

  function newShowHint(){
    const it=window.pool && window.pool[window.idx];
    if(!it) return;
    window.hintLevel=Math.min(3,(window.hintLevel||0)+1);
    const tgt=(it.targets && it.targets.length) ? it.targets[0] : '';

    if(window.hintLevel===1){
      window.els.statusMsg.textContent = 'HINT 1（S/V/O/C/M）:\n' + buildHint1FromHINT2(tgt);
      window.els.explain.classList.remove('show');
    } else if(window.hintLevel===2){
      window.els.statusMsg.textContent = 'HINT 2（正解）: ' + tgt;
      window.els.explain.classList.remove('show');
    } else {
      window.els.statusMsg.textContent = buildHint3(it);
      window.els.explain.classList.remove('show');
    }
  }

  function replaceHintButton(){
    const btn=document.getElementById('btnHint');
    if(!btn || !btn.parentNode) return;
    const clone=btn.cloneNode(true);
    btn.parentNode.replaceChild(clone, btn);
    clone.addEventListener('click', newShowHint);
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', replaceHintButton);
  else replaceHintButton();
})();


/* HINT1 NEWLINE WRAPPER: convert literal \\n to real newlines */
(function(){
  try{
    var __orig = window.buildHint1FromHINT2;
    if(typeof __orig !== 'function') return;
    window.buildHint1FromHINT2 = function(sentence){
      var r = __orig.call(this, sentence);
      return String(r==null?'':r).replace(/\\\\n/g,'\n');
    };
  }catch(e){}
})();

</script>
