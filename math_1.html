<script>
/* ========= 約分済みを保証する（BigInt分数） ========= */
function bgcd(a,b){
  a = a < 0n ? -a : a;
  b = b < 0n ? -b : b;
  while(b!==0n){ const t=a%b; a=b; b=t; }
  return a;
}
function reduceFrac(n,d){
  if(d===0n) return {n:0n,d:1n};
  if(n===0n) return {n:0n,d:1n};
  if(d<0n){ n=-n; d=-d; }
  const g = bgcd(n,d);
  return {n:n/g, d:d/g};
}
function fracLatex(n,d){
  const r = reduceFrac(n,d);
  if(r.d===1n) return String(r.n);
  return `\\\\frac{${r.n}}{${r.d}}`;
}
function nCrBig(n,r){
  n=BigInt(n); r=BigInt(r);
  if(r<0n || r>n) return 0n;
  r = r > n-r ? n-r : r;
  let num=1n, den=1n;
  for(let k=1n;k<=r;k++){
    num *= (n-r+k);
    den *= k;
    const g = bgcd(num,den);
    num/=g; den/=g;
  }
  return num/den;
}
function nPrBig(n,r){
  n=BigInt(n); r=BigInt(r);
  if(r<0n || r>n) return 0n;
  let x=1n;
  for(let i=0n;i<r;i++) x*=(n-i);
  return x;
}
function normalizeFractionsInText(t){
  return String(t).replace(/FRAC\\((\\-?\\d+),(\\-?\\d+)\\)/g, (_,a,b)=>fracLatex(BigInt(a),BigInt(b)));
}

/* ========= P1〜P22（元教材） ========= */
const PROBLEMS = [
  /* ※ここはアップロードされた math_1.html の P1〜P22 と同型です [1](https://onedrive.live.com?cid=CE4107C842BEBF65&id=CE4107C842BEBF65!s4c1a9e196aa040f4838499728956a2fa) */
  { id:"P1", title:"P1 定義：確率の定義（サイコロ）", prompt:"サイコロを1回投げる。事象A＝「3の倍数が出る」。\\(P(A)\\) を求めよ。",
   steps:[
    {id:"s1", text:"全事象\\(U\\)の要素数：\\(n(U)=6\\)", requires:[]},
    {id:"s2", text:"事象A：\\(3,6\\)なので\\(n(A)=2\\)", requires:["s1"]},
    {id:"s3", text:"\\(P(A)=\\frac{2}{6}=\\frac{1}{3}\\)", requires:["s2"]}
   ]},
  { id:"P2", title:"P2 余事象：少なくとも1回6", prompt:"サイコロを2回投げる。少なくとも1回6が出る確率を求めよ。",
   steps:[
    {id:"s1", text:"余事象：『少なくとも1回6』の余事象は『2回とも6でない』", requires:[]},
    {id:"s2", text:"\\(P(6でない)=\\frac56\\)、独立→\\(\\left(\\frac56\\right)^2\\)", requires:["s1"]},
    {id:"s3", text:"\\(1-\\left(\\frac56\\right)^2=\\frac{11}{36}\\)", requires:["s2"]}
   ]},
  { id:"P3", title:"P3 排反：コイン2回で表1回", prompt:"公平なコインを2回投げる。表がちょうど1回出る確率を求めよ。",
   steps:[
    {id:"s1", text:"\\(HT\\) または \\(TH\\)（排反）", requires:[]},
    {id:"s2", text:"各確率は\\(\\frac14\\)", requires:["s1"]},
    {id:"s3", text:"\\(\\frac14+\\frac14=\\frac12\\)", requires:["s2"]}
   ]},
  { id:"P4", title:"P4 nCr：玉（赤2白1）", prompt:"赤3個・白4個（計7個）から同時に3個。赤2個白1個となる確率を求めよ。",
   steps:[
    {id:"s1", text:"全事象：\\(n(U)={}\\_7\\mathrm{C}\\_3\\)", requires:[]},
    {id:"s2", text:"事象A：\\(n(A)={}\\_3\\mathrm{C}\\_2⋅{}\\_4\\mathrm{C}\\_1\\)", requires:["s1"]},
    {id:"s3", text:"\\(P(A)=\\frac{{}\\_3\\mathrm{C}\\_2⋅{}\\_4\\mathrm{C}\\_1}{{}\\_7\\mathrm{C}\\_3}=\\frac{12}{35}\\)", requires:["s2"]}
   ]},
  { id:"P5", title:"P5 余事象：不良品（少なくとも1個）", prompt:"15個中に不良品2個。3個同時に取り出すとき、少なくとも1個が不良品となる確率。",
   steps:[
    {id:"s1", text:"余事象は『3個とも良品』", requires:[]},
    {id:"s2", text:"\\(P(良品のみ)=\\frac{{}\\_{13}\\mathrm{C}\\_3}{{}\\_{15}\\mathrm{C}\\_3}\\)", requires:["s1"]},
    {id:"s3", text:"1-\\frac{{}\\_{13}\\mathrm{C}\\_3}{{}\\_{15}\\mathrm{C}\\_3}=\\frac{169}{455}", requires:["s2"]}
   ]},
  { id:"P6", title:"P6 条件付き：同時2個（nCr）", prompt:"赤3個・白2個から2個同時。条件『少なくとも1個赤』のもとで『2個とも赤』となる条件付き確率。",
   steps:[
    {id:"s1", text:"\\(P(B\\mid A)=\\frac{P(B)}{P(A)}\\)", requires:[]},
    {id:"s2", text:"\\(P(B)=\\frac{{}\\_3\\mathrm{C}\\_2}{{}\\_5\\mathrm{C}\\_2}=\\frac{3}{10}\\)", requires:["s1"]},
    {id:"s3", text:"\\(P(A)=1-\\frac{{}\\_2\\mathrm{C}\\_2}{{}\\_5\\mathrm{C}\\_2}=\\frac{9}{10}\\)", requires:["s2"]},
    {id:"s4", text:"\\(\\frac{3/10}{9/10}=\\frac{1}{3}\\)", requires:["s3"]}
   ]},
  { id:"P7", title:"P7 反復試行：コイン5回で表2回", prompt:"公平なコインを5回投げる。表がちょうど2回出る確率。",
   steps:[
    {id:"s1", text:"回数の選び方：\\({}\\_5\\mathrm{C}\\_2\\)通り", requires:[]},
    {id:"s2", text:"1つの並びの確率：\\(\\left(\\frac12\\right)^5\\)", requires:["s1"]},
    {id:"s3", text:"{}\\_5\\mathrm{C}\\_2⋅\\left(\\frac12\\right)^5=\\frac{5}{16}", requires:["s2"]}
   ]},
  { id:"P8", title:"P8 余事象：コイン10回で表1回以上", prompt:"公平なコインを10回投げる。表が1回以上出る確率。",
   steps:[
    {id:"s1", text:"余事象は『全部裏』", requires:[]},
    {id:"s2", text:"\\(P(全部裏)=\\left(\\frac12\\right)^{10}\\)", requires:["s1"]},
    {id:"s3", text:"1-\\left(\\frac12\\right)^{10}=\\frac{1023}{1024}", requires:["s2"]}
   ]},
  { id:"P9", title:"P9 nPr：順に引く（条件付き）", prompt:"1〜5のカードから2枚を順に引く（戻さない）。条件『1枚目が奇数』のもとで『2枚目も奇数』となる確率。",
   steps:[
    {id:"s1", text:"全事象：\\({}\\_5\\mathrm{P}\\_2=5⋅4=20\\)", requires:[]},
    {id:"s2", text:"条件A：\\(n(A)=3⋅4=12\\)", requires:["s1"]},
    {id:"s3", text:"条件AかつB：\\(n(A\\cap B)=3⋅2=6\\)", requires:["s2"]},
    {id:"s4", text:"\\(P(B\\mid A)=\\frac{6}{12}=\\frac12\\)", requires:["s3"]}
   ]},
  { id:"P10", title:"P10 期待値：サイコロ", prompt:"公平なサイコロ1回。出目Xの期待値\\(E[X]\\)を求めよ。",
   steps:[
    {id:"s1", text:"\\(P(X=k)=\\frac16\\)", requires:[]},
    {id:"s2", text:"\\(E[X]=\\sum\\_{k=1}^{6} k⋅\\frac16\\)", requires:["s1"]},
    {id:"s3", text:"\\(E[X]=\\frac{7}{2}\\)", requires:["s2"]}
   ]},
  { id:"P11", title:"P11 nPr：AとBが隣り合う（6人）", prompt:"6人（A,B,C,D,E,F）を一列に並べる。AとBが隣り合う確率を求めよ。",
   steps:[
    {id:"s1", text:"全事象：\\(6!=6⋅5⋅4⋅3⋅2⋅1\\)", requires:[]},
    {id:"s2", text:"AとBをかたまりにすると5個を並べる：\\(5!=5⋅4⋅3⋅2⋅1\\)", requires:["s1"]},
    {id:"s3", text:"かたまり内部は2通り（AB/BA）→有利：\\(2⋅5!\\)", requires:["s2"]},
    {id:"s4", text:"確率：\\(\\frac{2⋅5!}{6!}=\\frac{1}{3}\\)", requires:["s3"]}
   ]},
  { id:"P12", title:"P12 nPr：両端が指定2冊（5冊の本）", prompt:"異なる5冊の本を横一列に並べる。特定の2冊が両端に来る確率を求めよ。",
   steps:[
    {id:"s1", text:"全事象：\\(5!=5⋅4⋅3⋅2⋅1\\)", requires:[]},
    {id:"s2", text:"両端2冊の並びは2通り", requires:["s1"]},
    {id:"s3", text:"中央3冊の並び：\\(3!=3⋅2⋅1\\)", requires:["s2"]},
    {id:"s4", text:"確率：\\(\\frac{2⋅3!}{5!}=\\frac{1}{10}\\)", requires:["s3"]}
   ]},
  { id:"P13", title:"P13 3桁（0-4）偶数になる確率", prompt:"0,1,2,3,4 の数字カードから3枚（重複なし）で3桁の整数を作る。偶数となる確率。",
   steps:[
    {id:"s1", text:"全事象：百の位0不可→\\(4⋅4⋅3=48\\)", requires:[]},
    {id:"s2", text:"偶数→一の位は0,2,4で場合分け", requires:["s1"]},
    {id:"s3", text:"一の位0：\\(4⋅3=12\\)。一の位2/4：各\\(3⋅3=9\\)", requires:["s2"]},
    {id:"s4", text:"有利30→\\(\\frac{30}{48}=\\frac{5}{8}\\)", requires:["s3"]}
   ]},
  { id:"P14", title:"P14 nCr：6人から2人（Aを含む）", prompt:"6人から2人を選ぶ。特定の1人（A）が選ばれる確率を求めよ。",
   steps:[
    {id:"s1", text:"全事象：\\({}\\_6\\mathrm{C}\\_2\\)", requires:[]},
    {id:"s2", text:"Aを含む：残り5人から1人→\\({}\\_5\\mathrm{C}\\_1=5\\)", requires:["s1"]},

   ]},

    {id:"s3", text:"\\(\\frac{2}{6}=\\frac{1}{3}\\)", requires:["s2"]}
   ]},
  { id:"P16", title:"P16 独立：3回投げて6が出ない", prompt:"サイコロを3回投げる。1回も6が出ない確率を求めよ。",
   steps:[
    {id:"s1", text:"\\(P(6以外)=\\frac56\\)", requires:[]},

   ]},
  { id:"P17", title:"P17 原因の確率（2つの箱）", prompt:"箱A：赤2白1、箱B：赤1白2。等確率で箱を選び1個引く。赤が出たとき箱Aの確率。",

  { id:"P18", title:"P18 期待値：コインゲーム", prompt:"コイン1回。表+2点、裏-1点。期待値を求めよ。",

  { id:"P19", title:"P19 円順列：円で隣り合う（6人）", prompt:"6人を円形に並べる（回転同一視）。AとBが隣り合う確率。",

    {id:"s4", text:"\\(\\frac{2⋅4!}{5!}=\\frac{2}{5}\\)", requires:["s3"]}
   ]},
  { id:"P20", title:"P20 nPr：1〜6から3枚で3桁、奇数", prompt:"1〜6から異なる3枚を順に並べて3桁の数を作る。奇数となる確率。",

   ]},

/* ========= 追加P23〜P100（偏重＆約分済み統一） ========= */
const C = (n,r)=>`{}\\_${n}\\\\mathrm{C}\\_${r}`;
const P = (n,r)=>`{}\\_${n}\\\\mathrm{P}\\_${r}`;

function addProblem(p){ PROBLEMS.push(p); }

// 超幾何：P(赤=r) = C(R,r)C(W,k-r)/C(N,k)
function hyperProb(N,R,k,r){
  const num = nCrBig(R,r) * nCrBig(N-R, k-r);
  const den = nCrBig(N,k);
  return reduceFrac(num,den);
}
function atLeastOneRed(N,R,k){
  const den = nCrBig(N,k);
  const num0 = nCrBig(N-R,k); // 赤0
  const r0 = reduceFrac(num0,den);
  return reduceFrac(r0.d - r0.n, r0.d);
}

// 逐次（戻さない）で列パターン "RWR" など
function sequentialProb(R,W,seq){
  let num=1n, den=1n;
  let r=BigInt(R), w=BigInt(W), t=r+w;
  for(const ch of seq){
    if(ch==="R"){ num*=r; den*=t; r-=1n; }
    else{ num*=w; den*=t; w-=1n; }
    t-=1n;
  }
  return reduceFrac(num,den);
}

    addCard("P82","P82 トランプ：5枚にキングが1枚以上","トランプ52枚から5枚同時に引く。キングが少なくとも1枚含まれる確率。",
      [
        {id:"s1", text:"余事象：キング0枚（48枚から5枚）", requires:[]},
        {id:"s2", text:"\\(1-\\frac{{}\\_48\\mathrm{C}\\_5}{{}\\_52\\mathrm{C}\\_5}\\)", requires:["s1"]},
        {id:"s3", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s2"]},
      ]);
  }
  // P83: 3枚のスートが全て異なる
  {
    const ans = reduceFrac(nCrBig(4,3)*(13n**3n), C52_3);
    addCard("P83","P83 トランプ：3枚のスートがすべて異なる","トランプ52枚から3枚同時に引く。3枚のスートがすべて異なる確率。",
      [
        {id:"s1", text:"全事象：\\({}\\_52\\mathrm{C}\\_3\\)", requires:[]},
        {id:"s2", text:"有利：\\({}\\_4\\mathrm{C}\\_3⋅13^3\\)", requires:["s1"]},
        {id:"s3", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s2"]},
      ]);
  }
  // P84: 条件付き 1枚目スペード→2枚目スペード（4/17）
  addCard("P84","P84 トランプ：条件付き（1枚目スペード→2枚目スペード）","トランプ52枚から2枚を順に引く（戻さない）。条件『1枚目がスペード』のもとで『2枚目もスペード』の確率。",
    [
      {id:"s1", text:"条件：残り51枚中スペードは12枚", requires:[]},
      {id:"s2", text:"\\(FRAC(12,51)\\)", requires:["s1"]},
      {id:"s3", text:"約分：\\(FRAC(4,17)\\)", requires:["s2"]},
    ]);

  // P85: 7枚で4スート全て含む（包除）
  {
    const T = C52_7;
    const miss = 4n*nCrBig(39,7) - 6n*nCrBig(26,7) + 4n*nCrBig(13,7);
    const fav = T - miss;
    const ans = reduceFrac(fav,T);
    addCard("P85","P85 トランプ：7枚に4スートがすべて含まれる（包除）","トランプ52枚から7枚同時に引く。4つのスートがすべて少なくとも1枚ずつ含まれる確率。",
      [
        {id:"s1", text:"余事象：あるスートが0枚（包除）", requires:[]},
        {id:"s2", text:"余事象：\\(4⋅{}\\_39\\mathrm{C}\\_7-6⋅{}\\_26\\mathrm{C}\\_7+4⋅{}\\_13\\mathrm{C}\\_7\\)", requires:["s1"]},
        {id:"s3", text:`\\(1-\\frac{余事象}{{}\\_52\\mathrm{C}\\_7}=FRAC(${ans.n},${ans.d})\\)`, requires:["s2"]},
      ]);
  }

  // P86: ストレート（10通り×4^5）
  {
    const ans = reduceFrac(10n*(4n**5n), C52_5);
    addCard("P86","P86 トランプ：ストレート（10通り、スート自由）","トランプ52枚から5枚同時に引く。数字が5つ連続となる確率（スート自由、ストレートフラッシュ含む）。",
      [
        {id:"s1", text:"連続の型：10通り", requires:[]},
        {id:"s2", text:"各数字のスートは自由→\\(4^5\\)", requires:["s1"]},
        {id:"s3", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s2"]},
      ]);
  }

  // P87: 少なくとも1枚Aのもとで2枚ともA（1/33）
  addCard("P87","P87 トランプ：条件付き（少なくとも1枚Aのもとで2枚ともA）","トランプ52枚から2枚同時に引く。条件『少なくとも1枚がA』のもとで『2枚ともA』の条件付き確率。",
    [
      {id:"s1", text:"定義：\\(P(B\\midA)=\\frac{P(B)}{P(A)}\\)", requires:[]},
      {id:"s2", text:"\\(P(B)=\\frac{{}\\_4\\mathrm{C}\\_2}{{}\\_52\\mathrm{C}\\_2}\\)", requires:["s1"]},
      {id:"s3", text:"\\(P(A)=1-\\frac{{}\\_48\\mathrm{C}\\_2}{{}\\_52\\mathrm{C}\\_2}\\)", requires:["s2"]},
      {id:"s4", text:"\\(FRAC(1,33)\\)", requires:["s3"]},
    ]);

  // 残りP88〜P100（トランプで埋め）
  const fillers = [
    ["P88","2枚が同じ色（赤/黒）","トランプ52枚から2枚同時に引く。2枚が同じ色（赤同士または黒同士）となる確率。",
      ()=> reduceFrac( 2n*nCrBig(26,2), C52_2 ),
      (ans)=>[
        {id:"s1", text:"有利：\\({}\\_26\\mathrm{C}\\_2+{}\\_26\\mathrm{C}\\_2\\)", requires:[]},
        {id:"s2", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s1"]},
      ]
    ],
    ["P89","2枚が同じスート","トランプ52枚から2枚同時に引く。2枚が同じスートとなる確率。",
      ()=> reduceFrac( 4n*nCrBig(13,2), C52_2 ),
      (ans)=>[
        {id:"s1", text:"有利：\\(4⋅{}\\_13\\mathrm{C}\\_2\\)", requires:[]},
        {id:"s2", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s1"]},
      ]
    ],
    ["P90","5枚がすべて赤","トランプ52枚から5枚同時に引く。5枚がすべて赤（ハート/ダイヤ）となる確率。",
      ()=> reduceFrac( nCrBig(26,5), C52_5 ),
      (ans)=>[
        {id:"s1", text:"赤は26枚", requires:[]},
        {id:"s2", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s1"]},
      ]
    ],
    ["P91","5枚にハートが1枚以上（余事象）","トランプ52枚から5枚同時に引く。ハートが1枚以上含まれる確率。",
      ()=>{
        const r0 = reduceFrac(nCrBig(39,5), C52_5);
        return reduceFrac(r0.d-r0.n, r0.d);
      },
      (ans)=>[
        {id:"s1", text:"余事象：ハート0枚→他39枚から5枚", requires:[]},
        {id:"s2", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s1"]},
      ]
    ],
    ["P92","5枚でAがちょうど1枚","トランプ52枚から5枚同時に引く。Aがちょうど1枚となる確率。",
      ()=> reduceFrac(nCrBig(4,1)*nCrBig(48,4), C52_5),
      (ans)=>[
        {id:"s1", text:"有利：\\({}\\_4\\mathrm{C}\\_1⋅{}\\_48\\mathrm{C}\\_4\\)", requires:[]},
        {id:"s2", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s1"]},
      ]
    ],
    ["P93","5枚でAが0枚","トランプ52枚から5枚同時に引く。Aが0枚となる確率。",
      ()=> reduceFrac(nCrBig(48,5), C52_5),
      (ans)=>[
        {id:"s1", text:"A以外48枚から5枚", requires:[]},
        {id:"s2", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s1"]},
      ]
    ],
    ["P94","5枚でAが1枚以上（余事象）","トランプ52枚から5枚同時に引く。Aが1枚以上含まれる確率。",
      ()=>{
        const r0 = reduceFrac(nCrBig(48,5), C52_5);
        return reduceFrac(r0.d-r0.n,r0.d);
      },
      (ans)=>[
        {id:"s1", text:"余事象：Aが0枚", requires:[]},
        {id:"s2", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s1"]},
      ]
    ],
    ["P95","スリーカード（ちょうど3枚同数）","トランプ52枚から5枚同時に引く。ちょうど1つの数字が3枚現れ、残り2枚は互いに異なる数字となる確率。",
      ()=>{
        const num = 13n*nCrBig(4,3)*nCrBig(12,2)*(4n**2n);
        return reduceFrac(num, C52_5);
      },
      (ans)=>[
        {id:"s1", text:"有利：\\(13⋅{}\\_4\\mathrm{C}\\_3⋅{}\\_12\\mathrm{C}\\_2⋅4^2\\)", requires:[]},
        {id:"s2", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s1"]},
      ]
    ],
    ["P96","5枚がすべて異なる数字（ペアなし）","トランプ52枚から5枚同時に引く。5枚の数字がすべて異なる確率。",
      ()=>{
        const num = nCrBig(13,5)*(4n**5n);
        return reduceFrac(num, C52_5);
      },
      (ans)=>[
        {id:"s1", text:"数字を5種類選ぶ：\\({}\\_13\\mathrm{C}\\_5\\)", requires:[]},
        {id:"s2", text:"スートは自由→\\(4^5\\)", requires:["s1"]},
        {id:"s3", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s2"]},
      ]
    ],
    ["P97","条件付き：1枚目がAのとき2枚目もA","トランプ52枚から2枚を順に引く（戻さない）。条件『1枚目がA』のもとで『2枚目もA』の確率。",
      ()=> reduceFrac(3n,51n),
      (ans)=>[
        {id:"s1", text:"条件：残り51枚中Aは3枚", requires:[]},
        {id:"s2", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s1"]},
      ]
    ],
    ["P98","7枚でAが2枚以上（余事象）","トランプ52枚から7枚同時に引く。Aが2枚以上含まれる確率。",
      ()=>{
        const den = nCrBig(52,7);
        const a0 = nCrBig(48,7);
        const a1 = nCrBig(4,1)*nCrBig(48,6);
        const num = den - (a0 + a1);
        return reduceFrac(num,den);
      },
      (ans)=>[
        {id:"s1", text:"余事象：Aが0枚 または 1枚（排反）", requires:[]},
        {id:"s2", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s1"]},
      ]
    ],
    ["P99","7枚がすべて同一スート","トランプ52枚から7枚同時に引く。7枚がすべて同じスートとなる確率。",
      ()=> reduceFrac(4n*nCrBig(13,7), C52_7),
      (ans)=>[
        {id:"s1", text:"有利：スート4通り×13枚から7枚", requires:[]},
        {id:"s2", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s1"]},
      ]
    ],
    ["P100","7枚にキングが2枚以上（余事象）","トランプ52枚から7枚同時に引く。キングが2枚以上含まれる確率。",
      ()=>{
        const den = nCrBig(52,7);
        const k0 = nCrBig(48,7);
        const k1 = nCrBig(4,1)*nCrBig(48,6);
        const num = den - (k0 + k1);
        return reduceFrac(num,den);
      },
      (ans)=>[
        {id:"s1", text:"余事象：キングが0枚 または 1枚", requires:[]},
        {id:"s2", text:`\\(FRAC(${ans.n},${ans.d})\\)`, requires:["s1"]},
      ]
    ],
  ];

  for(const f of fillers){
    const [id,title,prompt, make, build] = f;
    const ans = make();
    addCard(id, `${id} トランプ：${title}`, prompt, build(ans));
  }
}

/* ========= 元ファイルの「：で分割＋連続必須」ロジック ========= */
function splitOneStepText(stepText){
  const t = String(stepText||'').trim();
  const idx = t.indexOf('：');
  if(idx>0){
    const head = t.slice(0, idx).trim();
    const body = t.slice(idx+1).trim();
    let a=head;
    if(!/を求める$/.test(a)) a = a + 'を求める';
    if(!/[。．]$/.test(a)) a = a + '。';
    return [a, body];
  }
  return [t];
}
function expandSteps(originalSteps){
  const meta=[];
  const lastOf=new Map();
  const letters='abcdefghijklmnopqrstuvwxyz';
  let stepNo=1;
  for(const s of originalSteps){
    const parts = splitOneStepText(s.text);
    const ids = parts.map((_,i)=> parts.length===1 ? s.id : `${s.id}${letters[i]}`);
    const labels = parts.map((_,i)=> parts.length===1 ? `S${stepNo}` : `S${stepNo}${letters[i]}`);
    meta.push({orig:s, parts, ids, labels});
    lastOf.set(s.id, ids[ids.length-1]);
    stepNo++;
  }
  const expanded=[];
  for(const m of meta){
    const {orig, parts, ids, labels} = m;
    for(let i=0;i<parts.length;i++){
      const id = ids[i];
      const immediateAfter = (i>0) ? ids[i-1] : null;
      const baseReq = (orig.requires||[]).map(r => lastOf.get(r) || r);
      const req = immediateAfter ? Array.from(new Set([...baseReq, immediateAfter])) : baseReq;
      expanded.push({id, label:labels[i], text: normalizeFractionsInText(parts[i]), requires:req, immediateAfter});
    }
  }
  return expanded;
}

/* ========= アプリ本体 ========= */
let current=null, currentExpandedSteps=[], poolCards=[], answerCards=[];
const sel=document.getElementById('problemSelect');
const promptEl=document.getElementById('prompt');
const poolEl=document.getElementById('pool');
const answerEl=document.getElementById('answer');
const checkBtn=document.getElementById('checkBtn');
const resetBtn=document.getElementById('resetBtn');
const answerBtn=document.getElementById('answerBtn');
const pill=document.getElementById('pill');
const msg=document.getElementById('msg');
const poolZone=document.getElementById('poolZone');
const answerZone=document.getElementById('answerZone');
const solutionWrap=document.getElementById('solutionWrap');

function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function setStatus(type,text){pill.className='pill'+(type?(' '+type):'');pill.textContent=type==='ok'?'正解':type==='ng'?'不正解':type==='warn'?'途中':'未判定';msg.textContent=text;}
function typesetMath(){ if(window.MathJax && MathJax.typesetPromise){return MathJax.typesetPromise([promptEl,poolEl,answerEl,solutionWrap]).catch(()=>{});} return Promise.resolve(); }

function createCardEl(card){
  const div=document.createElement('div');
  div.className='cardItem';
  div.draggable=true; div.dataset.cardId=card.id; div.dataset.zone=card.zone;
  const badge=document.createElement('div'); badge.className='badge'; badge.textContent=card.label;
  const text=document.createElement('div'); text.className='cardText'; text.textContent=card.text;
  div.appendChild(badge); div.appendChild(text);
  div.addEventListener('dragstart',(e)=>{e.dataTransfer.setData('text/plain',JSON.stringify({id:card.id,from:card.zone}));e.dataTransfer.effectAllowed='move';});
  div.addEventListener('click',()=>moveCard(card.id, card.zone==='pool'?'answer':'pool'));
  return div;
}
function render(){
  poolEl.innerHTML=''; answerEl.innerHTML='';
  poolCards.forEach(c=>poolEl.appendChild(createCardEl(c)));
  answerCards.forEach(c=>answerEl.appendChild(createCardEl(c)));
  return typesetMath();
}
function moveCard(id,toZone){
  let card=null;
  const take=(arr)=>{const idx=arr.findIndex(x=>x.id===id); if(idx>=0){card=arr[idx];arr.splice(idx,1);return true;} return false;};
  take(poolCards) || take(answerCards);
  if(!card) return;
  card.zone=toZone; (toZone==='pool'?poolCards:answerCards).push(card);
  clearMarking(); setStatus('', '移動しました。並べ終えたら「判定する」。'); solutionWrap.style.display='none';
  render();
}
function clearMarking(){[...document.querySelectorAll('.cardItem')].forEach(el=>{el.classList.remove('invalid');el.classList.remove('valid');});}
function buildSolutionBox(){
  const div=document.createElement('div'); div.className='solution';
  const ol=document.createElement('ol');
  currentExpandedSteps.forEach(s=>{const li=document.createElement('li'); li.textContent=s.text; ol.appendChild(li);});
  div.appendChild(ol); return div;
}
function evaluate(){
  const stepIds=new Set(currentExpandedSteps.map(s=>s.id));
  const stepMap=new Map(currentExpandedSteps.map(s=>[s.id,s]));
  const ans=answerCards.map(c=>c.id);
  const extras=ans.filter(id=>!stepIds.has(id));
  const missing=[...stepIds].filter(id=>!ans.includes(id));
  const orderChecks=[]; const placed=new Set(); let firstBad=null;
  for(let idx=0; idx<ans.length; idx++){
    const id = ans[idx];
    if(!stepIds.has(id)){
      orderChecks.push({id,ok:false});
      if(!firstBad) firstBad={id,reason:'不要カード（正答に含まれない）を入れています。'};
      continue;
    }
    const step = stepMap.get(id);
    const req = (step.requires||[]);
    const missReq = req.filter(r=>!placed.has(r));
    let ok = (missReq.length===0);
    if(ok && step.immediateAfter){
      const prev = (idx>0) ? ans[idx-1] : null;
      if(prev !== step.immediateAfter){
        ok = false;
        if(!firstBad) firstBad={id,reason:`連続条件：このカードの直前は ${step.immediateAfter} にしてください。`};
      }
    }
    orderChecks.push({id,ok});
    if(!ok && !firstBad && missReq.length>0) firstBad={id,reason:`このカードの前に必要：${missReq.join(', ')}`};
    placed.add(id);
  }
  const correctSet=extras.length===0 && missing.length===0;
  const correctOrder=correctSet && orderChecks.filter(x=>stepIds.has(x.id)).every(x=>x.ok);
  return {correctSet,correctOrder,missing,extras,firstBad};
}
function enableDrop(zoneEl,toZone){
  zoneEl.addEventListener('dragover',(e)=>{e.preventDefault();zoneEl.classList.add('dropHover');e.dataTransfer.dropEffect='move';});
  zoneEl.addEventListener('dragleave',()=>zoneEl.classList.remove('dropHover'));
  zoneEl.addEventListener('drop',(e)=>{e.preventDefault();zoneEl.classList.remove('dropHover');try{const p=JSON.parse(e.dataTransfer.getData('text/plain'));moveCard(p.id,toZone);}catch(_){}} );
}
function loadProblem(problemId){
  current=PROBLEMS.find(p=>p.id===problemId) || PROBLEMS[0];
  promptEl.textContent=current.prompt;
  currentExpandedSteps = expandSteps(current.steps);
  const cards=[];
  currentExpandedSteps.forEach(s=>cards.push({ id:s.id, label:s.label, text:s.text, zone:'pool' }));
  poolCards=shuffle(cards); answerCards=[];
  solutionWrap.style.display='none'; solutionWrap.innerHTML=''; clearMarking();
  setStatus('', 'カードを並べて「判定する」を押してください。');
  render();
}
function populateSelect(){
  sel.innerHTML='';
  PROBLEMS.forEach(p=>{const opt=document.createElement('option');opt.value=p.id;opt.textContent=p.title;sel.appendChild(opt);});
}
sel.addEventListener('change',()=>loadProblem(sel.value));
resetBtn.addEventListener('click',()=>loadProblem(sel.value));
answerBtn.addEventListener('click',()=>{
  clearMarking();
  setStatus('warn','解答（おすすめの並び）を表示しました。自力で並べてから「判定する」で確認できます。');
  solutionWrap.style.display='block';
  solutionWrap.innerHTML='';
  solutionWrap.appendChild(buildSolutionBox());
  typesetMath();
});
checkBtn.addEventListener('click',()=>{
  clearMarking();
  const r=evaluate();
  if(r.correctOrder){
    setStatus('ok','完璧！');
    solutionWrap.style.display='block'; solutionWrap.innerHTML='';
    solutionWrap.appendChild(buildSolutionBox());
    typesetMath();
  } else if(r.correctSet){
    setStatus('warn','カードはそろっています。順序を調整してください。');
    if(r.firstBad) msg.textContent=`順序ヒント：${r.firstBad.reason}`;
    solutionWrap.style.display='none';
  } else {
    if(r.extras.length>0) setStatus('ng',`誤カードが混ざっています（${r.extras.length}枚）。`);
    else if(r.missing.length>0) setStatus('ng',`正解カードが足りません（${r.missing.length}枚）。`);
    else setStatus('ng','まだ整っていません。');
    solutionWrap.style.display='none';
  }
});
enableDrop(poolZone,'pool');
enableDrop(answerZone,'answer');

// 追加生成→セレクト反映
generateP23toP100();
populateSelect();
sel.value='P23';
loadProblem('P23');
</script>
