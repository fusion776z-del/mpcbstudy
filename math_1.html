<script>
// ==============================
// PROBLEMS：P1〜P100
// [1](https://onedrive.live.com?cid=CE4107C842BEBF65&id=CE4107C842BEBF65!s4c1a9e196aa040f4838499728956a2fa)
// ==============================
const PROBLEMS = [

{ id:"P1", title:"P1 定義：確率の定義（サイコロ）", prompt:"サイコロを1回投げる。事象A＝「3の倍数が出る」。\\(P(A)\\) を求めよ。",
 steps:[
  {id:"s1", text:"全事象\\(U\\)の要素数：\\(n(U)=6\\)", requires:[]},
  {id:"s2", text:"事象A：\\(3,6\\)なので\\(n(A)=2\\)", requires:["s1"]},
  {id:"s3", text:"\\(P(A)=\\frac{2}{6}=\\frac{1}{3}\\)", requires:["s2"]}
 ]},
{ id:"P2", title:"P2 余事象：少なくとも1回6", prompt:"サイコロを2回投げる。少なくとも1回6が出る確率を求めよ。",
 steps:[
  {id:"s1", text:"余事象：『少なくとも1回6』の余事象は『2回とも6でない』", requires:[]},
  {id:"s2", text:"\\(P(6でない)=\\frac56\\)、独立→\\(\\left(\\frac56\\right)^2\\)", requires:["s1"]},
  {id:"s3", text:"\\(1-\\left(\\frac56\\right)^2=\\frac{11}{36}\\)", requires:["s2"]}
 ]},
{ id:"P3", title:"P3 排反：コイン2回で表1回", prompt:"公平なコインを2回投げる。表がちょうど1回出る確率を求めよ。",
 steps:[
  {id:"s1", text:"\\(HT\\) または \\(TH\\)（排反）", requires:[]},
  {id:"s2", text:"各確率は\\(\\frac14\\)", requires:["s1"]},
  {id:"s3", text:"\\(\\frac14+\\frac14=\\frac12\\)", requires:["s2"]}
 ]},
{ id:"P4", title:"P4 nCr：玉（赤2白1）", prompt:"赤3個・白4個（計7個）から同時に3個。赤2個白1個となる確率を求めよ。",
 steps:[
  {id:"s1", text:"全事象：\\(n(U)=7\\mathrm{C}3\\)", requires:[]},
  {id:"s2", text:"事象A：\\(n(A)=3\\mathrm{C}2⋅4\\mathrm{C}1\\)", requires:["s1"]},
  {id:"s3", text:"\\(P(A)=\\frac{3\\mathrm{C}2⋅4\\mathrm{C}1}{7\\mathrm{C}3}=\\frac{12}{35}\\)", requires:["s2"]}
 ]},
{ id:"P5", title:"P5 余事象：不良品（少なくとも1個）", prompt:"15個中に不良品2個。3個同時に取り出すとき、少なくとも1個が不良品となる確率。",
 steps:[
  {id:"s1", text:"余事象は『3個とも良品』", requires:[]},
  {id:"s2", text:"\\(P(良品のみ)=\\frac{13\\mathrm{C}3}{15\\mathrm{C}3}\\)", requires:["s1"]},
  {id:"s3", text:"\\(1-\\frac{\\text{良品だけ（286通り）}}{\\text{全部（455通り）}}=\\frac{169}{455}\\)", requires:["s2"]}
 ]},
{ id:"P6", title:"P6 条件付き：同時2個（nCr）", prompt:"赤3個・白2個から2個同時。条件『少なくとも1個赤』のもとで『2個とも赤』となる条件付き確率。",
 steps:[
  {id:"s1", text:"\\(P(B\\mid A)=\\frac{P(B)}{P(A)}\\)", requires:[]},
  {id:"s2", text:"\\(P(B)=\\frac{3\\mathrm{C}2}{5\\mathrm{C}2}=\\frac{3}{10}\\)", requires:["s1"]},
  {id:"s3", text:"\\(P(A)=1-\\frac{2\\mathrm{C}2}{5\\mathrm{C}2}=\\frac{9}{10}\\)", requires:["s2"]},
  {id:"s4", text:"\\(\\frac{3/10}{9/10}=\\frac{1}{3}\\)", requires:["s3"]}
 ]},
{ id:"P7", title:"P7 反復試行：コイン5回で表2回", prompt:"公平なコインを5回投げる。表がちょうど2回出る確率。",
 steps:[
  {id:"s1", text:"回数の選び方：\\(5\\mathrm{C}2\\)通り", requires:[]},
  {id:"s2", text:"1つの並びの確率：\\(\\left(\\frac12\\right)^5\\)", requires:["s1"]},
  {id:"s3", text:"\\(\\frac{\\text{表が2回出る並びの数}}{\\text{全ての並びの数}}=\\frac{5}{16}\\)", requires:["s2"]}
 ]},
{ id:"P8", title:"P8 余事象：コイン10回で表1回以上", prompt:"公平なコインを10回投げる。表が1回以上出る確率。",
 steps:[
  {id:"s1", text:"余事象は『全部裏』", requires:[]},
  {id:"s2", text:"\\(P(全部裏)=\\left(\\frac12\\right)^{10}\\)", requires:["s1"]},
  {id:"s3", text:"\\(1-\\frac{\\text{全部裏の場合}}{\\text{全部の場合}}=\\frac{1023}{1024}\\)", requires:["s2"]}
 ]},
{ id:"P9", title:"P9 nPr：順に引く（条件付き）", prompt:"1〜5のカードから2枚を順に引く（戻さない）。条件『1枚目が奇数』のもとで『2枚目も奇数』となる確率。",
 steps:[
  {id:"s1", text:"全事象：\\(5\\mathrm{P}2=5⋅4=20\\)", requires:[]},
  {id:"s2", text:"条件A：\\(n(A)=3⋅4=12\\)", requires:["s1"]},
  {id:"s3", text:"条件AかつB：\\(n(A\\cap B)=3⋅2=6\\)", requires:["s2"]},
  {id:"s4", text:"\\(P(B\\mid A)=\\frac{6}{12}=\\frac12\\)", requires:["s3"]}
 ]},

{ id:"P10", title:"P10 期待値：サイコロ",
  prompt:"公平なサイコロ1回。出目Xの期待値\\(E[X]\\)を求めよ。",
  steps:[
    {id:"s1", text:"各目が出る確率はすべて \\(\\frac16\\)", requires:[]},
    {id:"s2",
     text:"\\(E[X]=1\\cdot\\frac16+2\\cdot\\frac16+3\\cdot\\frac16+4\\cdot\\frac16+5\\cdot\\frac16+6\\cdot\\frac16\\)",
     requires:["s1"]},
    {id:"s3",
     text:"\\(E[X]=\\frac{1+2+3+4+5+6}{6}=\\frac{21}{6}=\\frac{7}{2}\\)",
     requires:["s2"]}
  ]
},
{ id:"P11", title:"P11 nPr：AとBが隣り合う（6人）", prompt:"6人（A,B,C,D,E,F）を一列に並べる。AとBが隣り合う確率を求めよ。",
 steps:[
  {id:"s1", text:"全事象：\\(6!=6⋅5⋅4⋅3⋅2⋅1\\)", requires:[]},
  {id:"s2", text:"AとBをかたまりにすると5個を並べる：\\(5!=5⋅4⋅3⋅2⋅1\\)", requires:["s1"]},
  {id:"s3", text:"かたまり内部は2通り（AB/BA）→条件を満たす場合の数：\\(2⋅5!\\)", requires:["s2"]},
  {id:"s4", text:"確率：\\(\\frac{2⋅5!}{6!}=\\frac{1}{3}\\)", requires:["s3"]}
 ]},
{ id:"P12", title:"P12 nPr：両端が指定2冊（5冊の本）", prompt:"異なる5冊の本を横一列に並べる。特定の2冊が両端に来る確率を求めよ。",
 steps:[
  {id:"s1", text:"全事象：\\(5!=5⋅4⋅3⋅2⋅1\\)", requires:[]},
  {id:"s2", text:"両端2冊の並びは2通り", requires:["s1"]},
  {id:"s3", text:"中央3冊の並び：\\(3!=3⋅2⋅1\\)", requires:["s2"]},
  {id:"s4", text:"確率：\\(\\frac{2⋅3!}{5!}=\\frac{1}{10}\\)", requires:["s3"]}
 ]},
{ id:"P13", title:"P13 3桁（0-4）偶数になる確率", prompt:"0,1,2,3,4 の数字カードから3枚（重複なし）で3桁の整数を作る。偶数となる確率。",
 steps:[
  {id:"s1", text:"全事象：百の位0不可→\\(4⋅4⋅3=48\\)", requires:[]},
  {id:"s2", text:"偶数→一の位は0,2,4で場合分け", requires:["s1"]},
  {id:"s3", text:"一の位0：\\(4⋅3=12\\)。一の位2/4：各\\(3⋅3=9\\)", requires:["s2"]},
  {id:"s4", text:"条件を満たす場合の数30→\\(\\frac{30}{48}=\\frac{5}{8}\\)", requires:["s3"]}
 ]},
{ id:"P14", title:"P14 nCr：6人から2人（Aを含む）", prompt:"6人から2人を選ぶ。特定の1人（A）が選ばれる確率を求めよ。",
 steps:[
  {id:"s1", text:"全事象：\\(6\\mathrm{C}2\\)", requires:[]},
  {id:"s2", text:"Aを含む：残り5人から1人→\\(5\\mathrm{C}1=5\\)", requires:["s1"]},
  {id:"s3", text:"\\(\\frac{5}{6\\mathrm{C}2}=\\frac{1}{3}\\)", requires:["s2"]}
 ]},
{ id:"P15", title:"P15 条件付き：和が7", prompt:"サイコロ2個。『和が7』のとき『少なくとも一方が1』となる確率。",
 steps:[
  {id:"s1", text:"和7は6通り", requires:[]},
  {id:"s2", text:"1を含むのは2通り", requires:["s1"]},
  {id:"s3", text:"\\(\\frac{2}{6}=\\frac{1}{3}\\)", requires:["s2"]}
 ]},
{ id:"P16", title:"P16 独立：3回投げて6が出ない", prompt:"サイコロを3回投げる。1回も6が出ない確率を求めよ。",
 steps:[
  {id:"s1", text:"\\(P(6以外)=\\frac56\\)", requires:[]},
  {id:"s2", text:"独立→\\(\\left(\\frac56\\right)^3\\)", requires:["s1"]},
  {id:"s3", text:"\\(\\frac{125}{216}\\)", requires:["s2"]}
 ]},
{ id:"P17", title:"P17 原因の確率（2つの箱）", prompt:"箱A：赤2白1、箱B：赤1白2。等確率で箱を選び1個引く。赤が出たとき箱Aの確率。",
 steps:[
  {id:"s1", text:"\\(P(A)=P(B)=\\frac12\\)", requires:[]},
  {id:"s2", text:"\\(P(赤)=\\frac12⋅\\frac23+\\frac12⋅\\frac13=\\frac12\\)", requires:["s1"]},
  {id:"s3", text:"\\(P(A\\mid 赤)=\\frac{\\frac12⋅\\frac23}{\\frac12}=\\frac{2}{3}\\)", requires:["s2"]}
 ]},
{ id:"P18", title:"P18 期待値：コインゲーム", prompt:"コイン1回。表+2点、裏-1点。期待値を求めよ。",
 steps:[
  {id:"s1", text:"確率は各\\(\\frac12\\)", requires:[]},
  {id:"s2", text:"\\(E=2⋅\\frac12+(-1)⋅\\frac12\\)", requires:["s1"]},
  {id:"s3", text:"\\(E=\\frac12\\)", requires:["s2"]}
 ]},
{ id:"P19", title:"P19 円順列：円で隣り合う（6人）", prompt:"6人を円形に並べる（回転同一視）。AとBが隣り合う確率。",
 steps:[
  {id:"s1", text:"全事象：円順列→\\(5!\\)", requires:[]},
  {id:"s2", text:"ABをかたまり→円で4人を並べる：\\(4!\\)", requires:["s1"]},
  {id:"s3", text:"AB/BAの2通り→条件を満たす場合の数：\\(2⋅4!\\)", requires:["s2"]},
  {id:"s4", text:"\\(\\frac{2⋅4!}{5!}=\\frac{2}{5}\\)", requires:["s3"]}
 ]},
{ id:"P20", title:"P20 nPr：1〜6から3枚で3桁、奇数", prompt:"1〜6から異なる3枚を順に並べて3桁の数を作る。奇数となる確率。",
 steps:[
  {id:"s1", text:"全事象：\\(6\\mathrm{P}3=120\\)", requires:[]},
  {id:"s2", text:"奇数→一の位が1,3,5", requires:["s1"]},
  {id:"s3", text:"条件を満たす場合の数：\\(3⋅5⋅4=60\\)", requires:["s2"]},
  {id:"s4", text:"\\(\\frac{60}{120}=\\frac12\\)", requires:["s3"]}
 ]},
{ id:"P21", title:"P21 重複あり：1〜5を2回（戻す）で両方奇数", prompt:"1〜5のカードから2枚を順に引く（戻してから次を引く＝重複を許す）。2枚とも奇数となる確率を求めよ。",
 steps:[
  {id:"s1", text:"全事象：重複あり→\\(5^2=25\\)", requires:[]},
  {id:"s2", text:"条件を満たす場合の数：奇数3枚→\\(3^2=9\\)", requires:["s1"]},
  {id:"s3", text:"確率：\\(\\frac{9}{25}\\)", requires:["s2"]}
 ]},
{ id:"P22", title:"P22 重複あり：0,1,2で3桁（重複可）偶数", prompt:"0,1,2 の数字カードから3回取り出して（毎回戻す＝重複を許す）3桁の整数を作る。偶数となる確率を求めよ。",

function getDiagramKey(problem){
 const t = `${problem.title} ${problem.prompt}`;

 if(t.includes("サイコロ")) return "DICE";
 if(t.includes("コイン")) return "COIN";
 if(t.includes("赤") || t.includes("白") || t.includes("不良品") || t.includes("箱")) return "BALL";
 if(t.includes("条件") || t.includes("原因")) return "COND";
 if(t.includes("円")) return "CIRCLE";
 if(t.includes("一列") || t.includes("並べる") || t.includes("隣り合う") || t.includes("両端")) return "LINE";
 if(t.includes("トランプ") || t.includes("スート") || t.includes("キング") || t.includes("A")) return "CARD";

 return null;
}

// --- 以下は元ファイルのロジックそのまま（：分割、連続性判定、UI） --- [1](https://onedrive.live.com?cid=CE4107C842BEBF65&id=CE4107C842BEBF65!s4c1a9e196aa040f4838499728956a2fa)
function splitOneStepText(stepText){
  const t = String(stepText || '').trim();
  const idx = t.indexOf('：');
  if(idx>0){
    const head = t.slice(0, idx).trim();
    const body = t.slice(idx+1).trim();
    let a = head;
    if(!/を求める$/.test(a)) a = a + 'を求める';
    if(!/[。．]$/.test(a)) a = a + '。';
    return [a, body];
  }
  return [t];
}
function expandSteps(originalSteps){
  const meta=[];
  const lastOf=new Map();
  const letters='abcdefghijklmnopqrstuvwxyz';
  let stepNo=1;
  for(const s of originalSteps){
    const parts = splitOneStepText(s.text);
    const ids = parts.map((_,i)=> parts.length===1 ? s.id : `${s.id}${letters[i]}`);
    const labels = parts.map((_,i)=> parts.length===1 ? `S${stepNo}` : `S${stepNo}${letters[i]}`);
    meta.push({orig:s, parts, ids, labels});
    lastOf.set(s.id, ids[ids.length-1]);
    stepNo++;
  }
  const expanded=[];
  for(const m of meta){
    const {orig, parts, ids, labels} = m;
    for(let i=0;i<parts.length;i++){
      const id = ids[i];
      const immediateAfter = (i>0) ? ids[i-1] : null;
      const baseReq = (orig.requires||[]).map(r => lastOf.get(r) || r);
      const req = immediateAfter ? Array.from(new Set([...baseReq, immediateAfter])) : baseReq;
      expanded.push({id, label: labels[i], text: parts[i], requires: req, immediateAfter});
    }
  }
  return expanded;
}

function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function typesetMath(){ if(window.MathJax && MathJax.typesetPromise){return MathJax.typesetPromise([promptEl,poolEl,answerEl,solutionWrap]).catch(()=>{});} return Promise.resolve(); }

function getNextProblemId(){
  const idx = PROBLEMS.findIndex(p => p.id === current.id);
  if(idx < 0 || idx === PROBLEMS.length - 1) return null;
  return PROBLEMS[idx + 1].id;
}

function createCardEl(card){
  const div=document.createElement('div');
  div.className='cardItem';
  div.draggable=true; div.dataset.cardId=card.id; div.dataset.zone=card.zone;
  const badge=document.createElement('div'); badge.className='badge'; badge.textContent=card.label;
  const text=document.createElement('div'); text.className='cardText'; text.textContent=card.text;
  div.appendChild(badge); div.appendChild(text);
  div.addEventListener('dragstart',(e)=>{e.dataTransfer.setData('text/plain',JSON.stringify({id:card.id,from:card.zone}));e.dataTransfer.effectAllowed='move';});
  div.addEventListener('click',()=>moveCard(card.id, card.zone==='pool'?'answer':'pool'));
  return div;
}
function render(){
  poolEl.innerHTML=''; answerEl.innerHTML='';
  poolCards.forEach(c=>poolEl.appendChild(createCardEl(c)));
  answerCards.forEach(c=>answerEl.appendChild(createCardEl(c)));
  return typesetMath();
}
function moveCard(id,toZone){
  let card=null;
  const take=(arr)=>{const idx=arr.findIndex(x=>x.id===id); if(idx>=0){card=arr[idx];arr.splice(idx,1);return true;} return false;};
  take(poolCards) || take(answerCards);
  if(!card) return;
  card.zone=toZone; (toZone==='pool'?poolCards:answerCards).push(card);
  setStatus('', '移動しました。並べ終えたら「判定する」。'); solutionWrap.style.display='none';
  render();
}
function buildSolutionBox(){
  const div=document.createElement('div'); div.className='solution';
  const ol=document.createElement('ol');
  currentExpandedSteps.forEach(s=>{const li=document.createElement('li'); li.textContent=s.text; ol.appendChild(li);});
  div.appendChild(ol); return div;
}
function evaluate(){
  const stepIds=new Set(currentExpandedSteps.map(s=>s.id));
  const stepMap=new Map(currentExpandedSteps.map(s=>[s.id,s]));
  const ans=answerCards.map(c=>c.id);
  const extras=ans.filter(id=>!stepIds.has(id));
  const missing=[...stepIds].filter(id=>!ans.includes(id));
  const orderChecks=[]; const placed=new Set(); let firstBad=null;
  for(let idx=0; idx<ans.length; idx++){
    const id = ans[idx];
    if(!stepIds.has(id)){
      orderChecks.push({id,ok:false});
      if(!firstBad) firstBad={id,reason:'不要カード（正答に含まれない）を入れています。'};
      continue;
    }
    const step = stepMap.get(id);
    const req = (step.requires||[]);
    const missReq = req.filter(r=>!placed.has(r));
    let ok = (missReq.length===0);
    if(ok && step.immediateAfter){
      const prev = (idx>0) ? ans[idx-1] : null;
      if(prev !== step.immediateAfter){
        ok = false;
        if(!firstBad) firstBad={id,reason:`連続条件：このカードの直前は ${step.immediateAfter} にしてください。`};
      }
    }
    orderChecks.push({id,ok});
    if(!ok && !firstBad && missReq.length>0) firstBad={id,reason:`このカードの前に必要：${missReq.join(', ')}`};
    placed.add(id);
  }
  const correctSet=extras.length===0 && missing.length===0;
  const correctOrder=correctSet && orderChecks.filter(x=>stepIds.has(x.id)).every(x=>x.ok);
  return {correctSet,correctOrder,missing,extras,firstBad};
}
function enableDrop(zoneEl,toZone){
  zoneEl.addEventListener('dragover',(e)=>{e.preventDefault();zoneEl.classList.add('dropHover');e.dataTransfer.dropEffect='move';});
  zoneEl.addEventListener('dragleave',()=>zoneEl.classList.remove('dropHover'));
  zoneEl.addEventListener('drop',(e)=>{e.preventDefault();zoneEl.classList.remove('dropHover');try{const p=JSON.parse(e.dataTransfer.getData('text/plain'));moveCard(p.id,toZone);}catch(_){}} );
}
function loadProblem(problemId){
  current=PROBLEMS.find(p=>p.id===problemId) || PROBLEMS[0];
  promptEl.textContent=current.prompt;
renderDiagram(current);
  currentExpandedSteps = expandSteps(current.steps);
  const cards=[];
  currentExpandedSteps.forEach(s=>cards.push({ id:s.id, label:s.label, text:s.text, zone:'pool' }));
  poolCards=shuffle(cards); answerCards=[];
  solutionWrap.style.display='none'; solutionWrap.innerHTML='';
  setStatus('', 'カードを並べて「判定する」を押してください。');
  render();
}
function populateSelect(){
  sel.innerHTML='';
  PROBLEMS.forEach(p=>{const opt=document.createElement('option');opt.value=p.id;opt.textContent=p.title;sel.appendChild(opt);});
}
sel.addEventListener('change',()=>loadProblem(sel.value));
resetBtn.addEventListener('click',()=>loadProblem(sel.value));
answerBtn.addEventListener('click',()=>{
  setStatus('warn','解答（おすすめの並び）を表示しました。自力で並べてから「判定する」で確認できます。');
  solutionWrap.style.display='block';
  solutionWrap.innerHTML='';
  solutionWrap.appendChild(buildSolutionBox());
  typesetMath();
});
checkBtn.addEventListener('click',()=>{
  const r=evaluate();
  if(r.correctOrder){
    setStatus('ok','完璧！');
    showNextButton();
    solutionWrap.style.display='block'; solutionWrap.innerHTML='';
    solutionWrap.appendChild(buildSolutionBox());
    typesetMath();
  } else if(r.correctSet){
    setStatus('warn','カードはそろっています。順序を調整してください。');
    hideNextButton();
    if(r.firstBad) msg.textContent=`順序ヒント：${r.firstBad.reason}`;
    solutionWrap.style.display='none';
  } else {
    hideNextButton();
    if(r.extras.length>0) setStatus('ng',`誤カードが混ざっています（${r.extras.length}枚）。`);
    else if(r.missing.length>0) setStatus('ng',`正解カードが足りません（${r.missing.length}枚）。`);
    else setStatus('ng','まだ整っていません。');
    solutionWrap.style.display='none';
  }

  });

});
