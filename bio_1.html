<head>

  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    :root{--bg:#0b1020;--text:#e9ecff;--muted:#aab2dd;--accent:#7c5cff;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444;}
    *{box-sizing:border-box}
    body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
      background:radial-gradient(1200px 800px at 20% 10%,#1a2450 0%,var(--bg) 55%),var(--bg);color:var(--text)}
    header{padding:20px 18px 8px;max-width:1200px;margin:0 auto}
    h1{margin:0 0 6px;font-size:20px;letter-spacing:.3px}
    .sub{color:var(--muted);font-size:13px;line-height:1.7}
    main{max-width:1200px;margin:0 auto;padding:12px 18px 28px;display:grid;grid-template-columns:360px 1fr;gap:16px}
    @media (max-width:980px){main{grid-template-columns:1fr}}
    .panel{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);
      border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden}
    .panel h2{margin:0;padding:14px 14px 10px;font-size:14px;color:#dfe4ff;letter-spacing:.2px}
    .panel .body{padding:0 14px 14px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    label{font-size:12px;color:var(--muted)}
    select,button{border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.20);color:var(--text);padding:10px 10px;font-size:13px}
    select{width:100%}
    button{cursor:pointer;transition:.15s transform,.15s background,.15s border}
    button:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.22)}
    .primary{background:linear-gradient(135deg,rgba(124,92,255,.95),rgba(124,92,255,.55));border-color:rgba(124,92,255,.8)}
    .ghost{background:rgba(0,0,0,.10)}
    .prompt{white-space:pre-wrap;padding:14px;border-radius:14px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08);line-height:1.7;font-size:14px}
    .board{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px}
    @media (max-width:980px){.board{grid-template-columns:1fr}}
    .zone{background:rgba(0,0,0,.18);border:1px dashed rgba(255,255,255,.18);border-radius:18px;min-height:260px;padding:12px}
    .zoneHeader{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .zoneTitle{font-size:13px;color:#dfe4ff}
    .zoneHint{font-size:12px;color:var(--muted)}
    .cardItem{user-select:none;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.10);
      border-radius:16px;padding:10px 10px 10px 12px;margin:10px 0;display:flex;gap:10px;align-items:flex-start;cursor:grab}
    .cardItem:active{cursor:grabbing}
    .badge{min-width:32px;height:22px;border-radius:999px;background:rgba(124,92,255,.20);border:1px solid rgba(124,92,255,.35);
      display:flex;align-items:center;justify-content:center;font-size:11px;color:#d9d2ff;margin-top:2px}
    .cardText{font-size:13px;line-height:1.6;color:#eef1ff}
    .cardItem.distractor .badge{background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.35);color:#ffe8b5}
    .cardItem.invalid{border-color:rgba(239,68,68,.7);box-shadow:0 0 0 1px rgba(239,68,68,.35) inset}
    .cardItem.valid{border-color:rgba(34,197,94,.65);box-shadow:0 0 0 1px rgba(34,197,94,.25) inset}
    .dropHover{outline:2px solid rgba(124,92,255,.55);outline-offset:2px}
    .status{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:10px;align-items:flex-start}
    .pill{padding:6px 10px;border-radius:999px;font-size:12px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.20);color:var(--muted)}
    .pill.ok{border-color:rgba(34,197,94,.55);color:#bff3d1}
    .pill.ng{border-color:rgba(239,68,68,.55);color:#ffd0d0}
    .pill.warn{border-color:rgba(245,158,11,.55);color:#ffe7c2}
    .msg{font-size:13px;line-height:1.6;color:#eef1ff;flex:1}
    .solution{margin-top:10px;padding:12px;border-radius:14px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.08)}
    .solution ol{margin:8px 0 0 20px}
    .solution li{margin:6px 0;line-height:1.6;color:#eef1ff}
    .footer{max-width:1200px;margin:0 auto;padding:0 18px 22px;color:var(--muted);font-size:12px;line-height:1.6}
    .mjx-container{margin:0 .08em}

    /* 固定：常に左上に表示される『入口へ戻る』ボタン */
    .fixedBack{
      position:fixed;
      top: calc(12px + env(safe-area-inset-top));
      left: calc(12px + env(safe-area-inset-left));
      z-index: 9999;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.45);
      color: var(--text);
      text-decoration:none;
      font-weight:800;
      font-size:13px;
      letter-spacing:.02em;
      backdrop-filter: blur(10px) saturate(1.2);
      -webkit-backdrop-filter: blur(10px) saturate(1.2);
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
      transition:.15s transform,.15s background,.15s border-color;
    }
    .fixedBack:hover{ transform: translateY(-1px); background: rgba(0,0,0,.55); border-color: rgba(255,255,255,.26); }
    .fixedBack:active{ transform: translateY(0); }
    @media (prefers-reduced-motion: reduce){
      .fixedBack{ transition:none; }
      .fixedBack:hover{ transform:none; }
    }

    /* 正解時のみ出す「次の問題へ」ボタン */
    #nextWrap{display:flex; align-items:center}
    a.nextBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      border:1px solid rgba(124,92,255,.8);
      background:linear-gradient(135deg,rgba(124,92,255,.95),rgba(124,92,255,.55));
      color:#e9ecff;
      padding:10px 12px;
      font-size:13px;
      text-decoration:none;
      white-space:nowrap;
    }
    a.nextBtn:hover{transform:translateY(-1px)}

    /* ガイドカードは薄く強調（ラベルは S1 のまま） */
    .cardItem.guide{
      border-color: rgba(124,92,255,.45);
      background: linear-gradient(180deg,rgba(124,92,255,.14),rgba(255,255,255,.03));
    }
    .cardItem.guide .badge{
      background: rgba(124,92,255,.28);
      border-color: rgba(124,92,255,.55);
      color:#efeaff;
    }
  </style>
</head>

<body>
  <a class="fixedBack" href="index.html" aria-label="入口（index.html）へ戻る">← 入口へ戻る</a>

  <header>
    <h1>生物基礎：並べ替え学習（Parsons風）</h1>
    <div class="sub">
      カードをドラッグ／クリックで移動し、正しい手順・説明の順に並べ替えます。<br>
      追加：細胞／代謝／酵素、細胞小器官（核・ミトコンドリア・葉緑体など）、エネルギー（呼吸・光合成）を各20問ずつ。
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>問題</h2>
      <div class="body">
        <div class="row" style="margin-bottom:10px"><label for="problemSelect">問題を選択</label></div>
        <select id="problemSelect"></select>
        <div style="height:10px"></div>
        <div class="prompt" id="prompt"></div>
        <div style="height:12px"></div>
        <div class="row">
          <button class="primary" id="checkBtn">判定する</button>
          <button class="ghost" id="answerBtn">解答</button>
          <button class="ghost" id="resetBtn">リセット</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>並べ替え</h2>
      <div class="board">
        <div class="zone" id="poolZone">
          <div class="zoneHeader">
            <div class="zoneTitle">カード（シャッフル）</div>
            <div class="zoneHint">ドラッグ / クリックで移動</div>
          </div>
          <div id="pool"></div>
        </div>
        <div class="zone" id="answerZone">
          <div class="zoneHeader">
            <div class="zoneTitle">解答エリア</div>
            <div class="zoneHint">上から順に評価</div>
          </div>
          <div id="answer"></div>
        </div>
      </div>

      <div class="status">
        <div class="pill" id="pill">未判定</div>
        <div class="msg" id="msg">カードを並べて「判定する」を押してください。</div>
        <div id="nextWrap"></div>
      </div>

      <div class="body"><div id="solutionWrap" style="display:none"></div></div>
    </section>
  </main>

  <div class="footer">
    <div>
      使い方：カードは「上から順に」評価されます。必要な前提（依存関係）が先に置かれていないと不正解になります。<br>
      ※ミクロメーター問題（P1〜P20）も残してあります。
    </div>
  </div>

<script>
/* =========================
   問題データ（PROBLEMSに追加）
   ========================= */
const PROBLEMS = [
  /* ===== 既存：ミクロメーター（P1〜P20） ===== */
  { id:"P1", title:"P1 読み取り：0.5mmあり", prompt:"ミクロメーターで、スリーブ（本尺）が \\(7.5\\,\\mathrm{mm}\\) まで見えており、シンブル（回転目盛）が 23 を指している。観測値を求めよ（最小目盛 \\(0.01\\,\\mathrm{mm}\\)）。",
    steps:[
      {id:"s1", text:"最小目盛は 1目盛 \\(=0.01\\,\\mathrm{mm}\\) である。", requires:[]},
      {id:"s2", text:"回転目盛 23 は \\(0.01\\times 23=0.23\\,\\mathrm{mm}\\) に対応する。", requires:["s1"]},
      {id:"s3", text:"観測値は \\(7.5+0.23=7.73\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P2", title:"P2 読み取り：整数mm", prompt:"本尺が \\(12.0\\,\\mathrm{mm}\\)、回転目盛が 7。観測値を求めよ。",
    steps:[
      {id:"s1", text:"回転目盛 7 は \\(0.01\\times 7=0.07\\,\\mathrm{mm}\\) である。", requires:[]},
      {id:"s2", text:"観測値は \\(12.0+0.07=12.07\\,\\mathrm{mm}\\) である。", requires:["s1"]},
      {id:"s3", text:"単位まで含めて \\(12.07\\,\\mathrm{mm}\\) と書く。", requires:["s2"]}
    ]},
  { id:"P3", title:"P3 読み取り：0.5mmなし", prompt:"本尺が \\(4.0\\,\\mathrm{mm}\\)、回転目盛が 38。観測値を求めよ。",
    steps:[
      {id:"s1", text:"回転目盛 38 は \\(0.01\\times 38=0.38\\,\\mathrm{mm}\\) である。", requires:[]},
      {id:"s2", text:"観測値は \\(4.0+0.38=4.38\\,\\mathrm{mm}\\) である。", requires:["s1"]},
      {id:"s3", text:"答えは \\(4.38\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P4", title:"P4 読み取り：本尺13.5mm", prompt:"本尺が \\(13.5\\,\\mathrm{mm}\\)、回転目盛が 2。観測値を求めよ。",
    steps:[
      {id:"s1", text:"回転目盛 2 は \\(0.01\\times 2=0.02\\,\\mathrm{mm}\\) である。", requires:[]},
      {id:"s2", text:"観測値は \\(13.5+0.02=13.52\\,\\mathrm{mm}\\) である。", requires:["s1"]},
      {id:"s3", text:"答えは \\(13.52\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P5", title:"P5 読み取り：最大付近", prompt:"本尺が \\(24.0\\,\\mathrm{mm}\\)、回転目盛が 49。観測値を求めよ。",
    steps:[
      {id:"s1", text:"回転目盛 49 は \\(0.01\\times 49=0.49\\,\\mathrm{mm}\\) である。", requires:[]},
      {id:"s2", text:"観測値は \\(24.0+0.49=24.49\\,\\mathrm{mm}\\) である。", requires:["s1"]},
      {id:"s3", text:"答えは \\(24.49\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P6", title:"P6 単位換算：mm→cm", prompt:"P1の観測値 \\(7.73\\,\\mathrm{mm}\\) を \\(\\mathrm{cm}\\) で表せ。",
    steps:[
      {id:"s1", text:"\\(1\\,\\mathrm{cm}=10\\,\\mathrm{mm}\\) を用いて換算する。", requires:[]},
      {id:"s2", text:"\\(7.73\\,\\mathrm{mm}=0.773\\,\\mathrm{cm}\\) である。", requires:["s1"]},
      {id:"s3", text:"答えは \\(0.773\\,\\mathrm{cm}\\) である。", requires:["s2"]}
    ]},
  { id:"P7", title:"P7 単位換算：mm→μm", prompt:"観測値が \\(0.84\\,\\mathrm{mm}\\) のとき、 \\(\\mu\\mathrm{m}\\) で表せ。",
    steps:[
      {id:"s1", text:"\\(1\\,\\mathrm{mm}=1000\\,\\mu\\mathrm{m}\\) を用いる。", requires:[]},
      {id:"s2", text:"\\(0.84\\times 1000=840\\,\\mu\\mathrm{m}\\) と計算する。", requires:["s1"]},
      {id:"s3", text:"答えは \\(840\\,\\mu\\mathrm{m}\\) である。", requires:["s2"]}
    ]},
  { id:"P8", title:"P8 零点誤差（＋）：補正", prompt:"ミクロメーターを閉じたとき \\(0.03\\,\\mathrm{mm}\\) を示した（＋の零点誤差）。ある物体の観測値が \\(5.62\\,\\mathrm{mm}\\) だった。真の長さを求めよ。",
    steps:[
      {id:"s1", text:"＋の零点誤差では真値は 観測値−誤差 で補正する。", requires:[]},
      {id:"s2", text:"\\(5.62-0.03=5.59\\,\\mathrm{mm}\\) と計算する。", requires:["s1"]},
      {id:"s3", text:"答えは \\(5.59\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P9", title:"P9 零点誤差（−）：補正", prompt:"閉じたとき \\(-0.02\\,\\mathrm{mm}\\) を示した（−の零点誤差）。観測値が \\(10.18\\,\\mathrm{mm}\\) の真値を求めよ。",
    steps:[
      {id:"s1", text:"−の零点誤差では真値は 観測値＋誤差 で補正する。", requires:[]},
      {id:"s2", text:"\\(10.18+0.02=10.20\\,\\mathrm{mm}\\) と計算する。", requires:["s1"]},
      {id:"s3", text:"答えは \\(10.20\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P10", title:"P10 読み取り→補正（＋）", prompt:"本尺が \\(8.0\\,\\mathrm{mm}\\)、回転目盛が 41。零点誤差が +0.04 mm。真値を求めよ。",
    steps:[
      {id:"s1", text:"観測値は \\(8.0+0.01\\times 41=8.41\\,\\mathrm{mm}\\) である。", requires:[]},
      {id:"s2", text:"＋誤差なので \\(8.41-0.04=8.37\\,\\mathrm{mm}\\) に補正する。", requires:["s1"]},
      {id:"s3", text:"答えは \\(8.37\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P11", title:"P11 読み取り→補正（−）", prompt:"本尺が \\(16.5\\,\\mathrm{mm}\\)、回転目盛が 9。零点誤差が −0.03 mm。真値を求めよ。",
    steps:[
      {id:"s1", text:"観測値は \\(16.5+0.09=16.59\\,\\mathrm{mm}\\) である。", requires:[]},
      {id:"s2", text:"−誤差なので \\(16.59+0.03=16.62\\,\\mathrm{mm}\\) に補正する。", requires:["s1"]},
      {id:"s3", text:"答えは \\(16.62\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P12", title:"P12 逆算：回転目盛を求める", prompt:"観測値が \\(6.28\\,\\mathrm{mm}\\)、本尺が \\(6.0\\,\\mathrm{mm}\\) まで見えている。回転目盛 \\(T\\) を求めよ。",
    steps:[
      {id:"s1", text:"回転分は \\(6.28-6.0=0.28\\,\\mathrm{mm}\\) である。", requires:[]},
      {id:"s2", text:"\\(0.28=0.01T\\) より \\(T=28\\) と求まる。", requires:["s1"]},
      {id:"s3", text:"回転目盛は 28 である。", requires:["s2"]}
    ]},
  { id:"P13", title:"P13 逆算：本尺0.5の判定", prompt:"観測値が \\(9.76\\,\\mathrm{mm}\\)、回転目盛が 26。見えている本尺 \\(S\\) は \\(9.5\\,\\mathrm{mm}\\) か \\(9.0\\,\\mathrm{mm}\\) か。",
    steps:[
      {id:"s1", text:"回転分は \\(0.01\\times 26=0.26\\,\\mathrm{mm}\\) である。", requires:[]},
      {id:"s2", text:"本尺は \\(9.76-0.26=9.50\\,\\mathrm{mm}\\) と逆算できる。", requires:["s1"]},
      {id:"s3", text:"したがって本尺は \\(9.5\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P14", title:"P14 最小目盛：50等分", prompt:"シンブルが1回転で \\(0.50\\,\\mathrm{mm}\\) 進み、目盛が 50 等分されている。最小目盛を求めよ。",
    steps:[
      {id:"s1", text:"最小目盛は 1回転の進み ÷ 分割数 で求める。", requires:[]},
      {id:"s2", text:"\\(0.50\\div 50=0.01\\,\\mathrm{mm}\\) と計算する。", requires:["s1"]},
      {id:"s3", text:"最小目盛は \\(0.01\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P15", title:"P15 丸め：0.01mm単位", prompt:"観測値が \\(3.245\\,\\mathrm{mm}\\) と計算された。ミクロメーターの最小目盛が \\(0.01\\,\\mathrm{mm}\\) のとき、適切に丸めて答えよ。",
    steps:[
      {id:"s1", text:"最小目盛が \\(0.01\\,\\mathrm{mm}\\) なので小数第2位まで示す。", requires:[]},
      {id:"s2", text:"\\(3.245\\) は四捨五入して \\(3.25\\,\\mathrm{mm}\\) となる。", requires:["s1"]},
      {id:"s3", text:"答えは \\(3.25\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P16", title:"P16 読み取り：本尺0.5＋回転0", prompt:"本尺が \\(2.5\\,\\mathrm{mm}\\)、回転目盛が 0。観測値を求めよ。",
    steps:[
      {id:"s1", text:"回転分は \\(0.01\\times 0=0.00\\,\\mathrm{mm}\\) である。", requires:[]},
      {id:"s2", text:"観測値は \\(2.5+0.00=2.50\\,\\mathrm{mm}\\) である。", requires:["s1"]},
      {id:"s3", text:"答えは \\(2.50\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P17", title:"P17 読み取り：境界注意", prompt:"本尺が \\(9.0\\,\\mathrm{mm}\\) までで、0.5mm線は見えていない。回転目盛が 49。観測値を求めよ。",
    steps:[
      {id:"s1", text:"0.5mm線が見えていないので本尺は \\(9.0\\,\\mathrm{mm}\\) のままである。", requires:[]},
      {id:"s2", text:"回転分は \\(0.01\\times 49=0.49\\,\\mathrm{mm}\\) である。", requires:["s1"]},
      {id:"s3", text:"観測値は \\(9.0+0.49=9.49\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P18", title:"P18 差：2つの測定値の差", prompt:"2回の観測値がそれぞれ \\(12.34\\,\\mathrm{mm}\\) と \\(12.08\\,\\mathrm{mm}\\)。差（大きい−小さい）を求めよ。",
    steps:[
      {id:"s1", text:"差は大きい値から小さい値を引いて求める。", requires:[]},
      {id:"s2", text:"\\(12.34-12.08=0.26\\,\\mathrm{mm}\\) と計算する。", requires:["s1"]},
      {id:"s3", text:"答えは \\(0.26\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P19", title:"P19 平均：3回測定の平均", prompt:"同じものを3回測り、\\(5.61,\\ 5.63,\\ 5.62\\,\\mathrm{mm}\\) だった。平均値を求めよ。",
    steps:[
      {id:"s1", text:"平均は合計を回数で割って求める。", requires:[]},
      {id:"s2", text:"\\(\\frac{5.61+5.63+5.62}{3}=\\frac{16.86}{3}=5.62\\,\\mathrm{mm}\\) である。", requires:["s1"]},
      {id:"s3", text:"答えは \\(5.62\\,\\mathrm{mm}\\) である。", requires:["s2"]}
    ]},
  { id:"P20", title:"P20 補正の逆：零点誤差を求める", prompt:"ある物体の真値が \\(8.20\\,\\mathrm{mm}\\) と分かっている。ミクロメーターの観測値は \\(8.23\\,\\mathrm{mm}\\)。零点誤差（＋か−かも含めて）を求めよ。",
    steps:[

const DEFAULT_GUIDE = "カードは『前提→理由→結論』の流れになりやすい。用語の定義→しくみ→結果の順で並べる。";

const GUIDE_TEMPLATES = [
  /* 既存：ミクロメーター系 */
  { match: /読み取り/, text: "本尺S（0.5mm線の有無に注意）＋0.01T。単位は mm。" },
  { match: /単位換算/, text: "換算：1cm=10mm、1mm=1000μm。桁を間違えない。" },
  { match: /零点誤差|補正/, text: "補正：＋誤差→真値=観測値−誤差、−誤差→真値=観測値＋誤差。" },
  { match: /逆算/, text: "観測値L=S+0.01T。未知（S or T）を引き算で逆算。" },
  { match: /丸め/, text: "最小目盛0.01mmなら小数第2位まで。四捨五入の桁に注意。" },
  { match: /差|平均/, text: "差は引く。平均は合計÷回数。単位は mm のまま。" },

  /* 追加：生物系テンプレ */
  { match: /A\d+|細胞|代謝|酵素/, text: "定義→構造/条件→はたらき→結果 の順を意識。酵素は『活性部位・最適条件・阻害』が鍵。" },
  { match: /B\d+|核|ミトコンドリア|葉緑体|小器官|ゴルジ|小胞体|リソソーム/, text: "小器官は『場所（構造）→役割→他とのつながり』で並べると整理しやすい。" },
  { match: /C\d+|呼吸|光合成|ATP|電子伝達|解糖|TCA|カルビン|発酵/, text: "反応は『前段→中段→後段』の順。呼吸は解糖→TCA→電子伝達、光合成は光反応→カルビン回路。" }
];

function pickGuide(problem){
  const t = problem.title || "";
  const found = GUIDE_TEMPLATES.find(x => x.match.test(t));
  return found ? found.text : DEFAULT_GUIDE;
}

/* =========================
   冗長ステップ削除（安全な自動整理）
   ========================= */
function extractMathBlocks(text){
  const s = String(text || "");
  const blocks = [];
  const re = /\\\((.+?)\\\)/g;
  let m;
  while((m = re.exec(s)) !== null){
    blocks.push(m[1].trim());
  }
  return blocks;
}
function extractNumbers(text){
  const s = String(text || "");
  return (s.match(/[-+]?\d+(?:\.\d+)?/g) || []);
}
function isRedundantTailStep(stepText){
  const t = String(stepText || "").trim();
  return /^(答|解答|単位まで書く|単位まで書くこと|結論)\s*[:：]/.test(t);
}
function simplifySteps(steps){
  const arr = (steps || []).slice();
  if(arr.length <= 1) return arr;

  const referenced = new Set();
  for(const s of arr){
    for(const r of (s.requires || [])) referenced.add(r);
  }

  const keep = [];
  for(let i=0;i<arr.length;i++){
    const s = arr[i];
    if(!referenced.has(s.id) && isRedundantTailStep(s.text) && i>0){
      const prev = arr[i-1];
      const m1 = extractMathBlocks(s.text);
      const m0 = extractMathBlocks(prev.text);
      const sameMath = (m1.length>0 && m0.length>0 && m1.join("\n") === m0.join("\n"));

      const n1 = extractNumbers(s.text);
      const n0 = extractNumbers(prev.text);
      const allNumsContained = (n1.length>0 && n1.every(x => n0.includes(x)));

      const after = String(s.text).split(/[:：]/).slice(1).join(':').trim();
      const contained = after && String(prev.text).includes(after);

      if(sameMath || allNumsContained || contained){
        continue;
      }
    }
    keep.push(s);
  }
  return keep;
}

/* =========================
   「：」分割＋連続条件判定
   ========================= */
function splitOneStepText(stepText){
  const t = String(stepText || '').trim();
  const idx = t.indexOf('：');
  if(idx>0){
    const head = t.slice(0, idx).trim();
    const NO_SPLIT_HEADS = new Set(["ガイド","答","解答","単位まで書く","単位まで書くこと","結論"]);
    if(NO_SPLIT_HEADS.has(head)) return [t];
    const body = t.slice(idx+1).trim();
    let a = head;
    if(!/を求める$/.test(a)) a = a + 'を求める';
    if(!/[。．]$/.test(a)) a = a + '。';
    return [a, body];
  }
  return [t];
}
function expandSteps(originalSteps){
  const meta=[];
  const lastOf=new Map();
  const letters='abcdefghijklmnopqrstuvwxyz';
  let stepNo=1;

  for(const s of originalSteps){
    const parts = splitOneStepText(s.text);
    const ids = parts.map((_,i)=> parts.length===1 ? s.id : `${s.id}${letters[i]}`);
    const labels = parts.map((_,i)=> parts.length===1 ? `S${stepNo}` : `S${stepNo}${letters[i]}`);
    meta.push({orig:s, parts, ids, labels});
    lastOf.set(s.id, ids[ids.length-1]);
    stepNo++;
  }

  const expanded=[];
  for(const m of meta){
    const {orig, parts, ids, labels} = m;
    for(let i=0;i<parts.length;i++){
      const id = ids[i];
      const immediateAfter = (i>0) ? ids[i-1] : null;
      const baseReq = (orig.requires || []).map(r => lastOf.get(r) || r);
      const req = immediateAfter ? Array.from(new Set([...baseReq, immediateAfter])) : baseReq;
      expanded.push({id, label: labels[i], text: parts[i], requires: req, immediateAfter, origId: orig.id});
    }
  }
  return expanded;
}

/* =========================
   アプリ共通
   ========================= */
let current=null, currentExpandedSteps=[], poolCards=[], answerCards=[];
const sel=document.getElementById('problemSelect');
const promptEl=document.getElementById('prompt');
const poolEl=document.getElementById('pool');
const answerEl=document.getElementById('answer');
const checkBtn=document.getElementById('checkBtn');
const resetBtn=document.getElementById('resetBtn');
const answerBtn=document.getElementById('answerBtn');
const pill=document.getElementById('pill');
const msg=document.getElementById('msg');
const poolZone=document.getElementById('poolZone');
const answerZone=document.getElementById('answerZone');
const solutionWrap=document.getElementById('solutionWrap');
const nextWrap=document.getElementById('nextWrap');

function escapeHTML(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function setStatus(type,text){
  pill.className='pill'+(type?(' '+type):'');
  pill.textContent=type==='ok'?'正解':type==='ng'?'不正解':type==='warn'?'途中':'未判定';
  msg.textContent=text;
}
function typesetMath(){
  if(window.MathJax && MathJax.typesetPromise){
    return MathJax.typesetPromise([promptEl,poolEl,answerEl,solutionWrap]).catch(()=>{});
  }
  return Promise.resolve();
}

function getNextProblemId(){
  const idx = PROBLEMS.findIndex(p => p.id === current.id);
  if(idx < 0 || idx === PROBLEMS.length - 1) return null;
  return PROBLEMS[idx + 1].id;
}
function showNextButton(){
  nextWrap.innerHTML = '';
  const nextId = getNextProblemId();
  if(!nextId) return;
  const a = document.createElement('a');
  a.href = `?p=${encodeURIComponent(nextId)}`;
  a.className = 'nextBtn';
  a.textContent = '次の問題へ';
  a.addEventListener('click', (e) => {
    e.preventDefault();
    sel.value = nextId;
    loadProblem(nextId);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  nextWrap.appendChild(a);
}
function hideNextButton(){ nextWrap.innerHTML=''; }

function createCardEl(card){
  const div=document.createElement('div');
  const isGuide = (card.origId === "g0");
  div.className='cardItem'
    + (card.kind==='distractor'?' distractor':'')
    + (isGuide ? ' guide' : '');
  div.draggable=true; div.dataset.cardId=card.id; div.dataset.zone=card.zone;

  const badge=document.createElement('div');
  badge.className='badge';
  badge.textContent = card.label;

  const text=document.createElement('div');
  text.className='cardText';
  text.textContent=card.text;

  div.appendChild(badge); div.appendChild(text);
  div.addEventListener('dragstart',(e)=>{
    e.dataTransfer.setData('text/plain',JSON.stringify({id:card.id,from:card.zone}));
    e.dataTransfer.effectAllowed='move';
  });
  div.addEventListener('click',()=>moveCard(card.id, card.zone==='pool'?'answer':'pool'));
  return div;
}
function render(){
  poolEl.innerHTML=''; answerEl.innerHTML='';
  poolCards.forEach(c=>poolEl.appendChild(createCardEl(c)));
  answerCards.forEach(c=>answerEl.appendChild(createCardEl(c)));
  return typesetMath();
}
function clearMarking(){
  [...document.querySelectorAll('.cardItem')].forEach(el=>{
    el.classList.remove('invalid');
    el.classList.remove('valid');
  });
}
function moveCard(id,toZone){
  let card=null;
  const take=(arr)=>{
    const idx=arr.findIndex(x=>x.id===id);
    if(idx>=0){card=arr[idx];arr.splice(idx,1);return true;}
    return false;
  };
  take(poolCards); take(answerCards);
  if(!card) return;
  card.zone=toZone;
  (toZone==='pool'?poolCards:answerCards).push(card);
  clearMarking();
  hideNextButton();
  setStatus('', '移動しました。並べ終えたら「判定する」。');
  solutionWrap.style.display='none';
  render();
}
function buildSolutionBox(){
  const div=document.createElement('div'); div.className='solution';
  const ol=document.createElement('ol');
  currentExpandedSteps.forEach(s=>{
    const li=document.createElement('li');
    li.textContent=s.text;
    ol.appendChild(li);
  });
  div.appendChild(ol);
  return div;
}
function evaluate(){
  const stepIds=new Set(currentExpandedSteps.map(s=>s.id));
  const stepMap=new Map(currentExpandedSteps.map(s=>[s.id,s]));
  const ans=answerCards.map(c=>c.id);

  const seen=new Set(); const dup=[];
  for(const id of ans){ if(seen.has(id)) dup.push(id); seen.add(id); }

  const extras=ans.filter(id=>!stepIds.has(id));
  const missing=[...stepIds].filter(id=>!ans.includes(id));

  const orderChecks=[]; const placed=new Set(); let firstBad=null;
  for(let idx=0; idx<ans.length; idx++){
    const id = ans[idx];

    if(!stepIds.has(id)){
      orderChecks.push({id,ok:false,missingReq:[]});
      if(!firstBad) firstBad={id,reason:'不要カード（正答に含まれない）を入れています。'};
      continue;
    }

    const step = stepMap.get(id);
    const req = (step.requires || []);
    const missReq = req.filter(r=>!placed.has(r));
    let ok = (missReq.length===0);

    if(ok && step.immediateAfter){
      const prev = (idx>0) ? ans[idx-1] : null;
      if(prev !== step.immediateAfter){
        ok = false;
        if(!firstBad) firstBad={id,reason:`連続条件：このカードの直前は ${step.immediateAfter} にしてください。`};
      }
    }

    orderChecks.push({id,ok,missingReq:missReq});
    if(!ok && !firstBad && missReq.length>0) firstBad={id,reason:`このカードの前に必要：${missReq.join(', ')}`};
    placed.add(id);
  }

  const correctSet = extras.length===0 && missing.length===0 && dup.length===0;
  const correctOrder = correctSet && orderChecks.filter(x=>stepIds.has(x.id)).every(x=>x.ok);

  const total=currentExpandedSteps.length;
  const okCount=orderChecks.filter(x=>stepIds.has(x.id)&&x.ok).length;
  const progress=total?Math.round((okCount/total)*100):0;

  return {correctSet,correctOrder,missing,extras,dup,firstBad,progress,orderChecks};
}

function enableDrop(zoneEl,toZone){
  zoneEl.addEventListener('dragover',(e)=>{
    e.preventDefault();
    zoneEl.classList.add('dropHover');
    e.dataTransfer.dropEffect='move';
  });
  zoneEl.addEventListener('dragleave',()=>zoneEl.classList.remove('dropHover'));
  zoneEl.addEventListener('drop',(e)=>{
    e.preventDefault();
    zoneEl.classList.remove('dropHover');
    try{
      const p=JSON.parse(e.dataTransfer.getData('text/plain'));
      moveCard(p.id,toZone);
    }catch(_){}
  });
}

function loadProblem(problemId){
  current = PROBLEMS.find(p=>p.id===problemId) || PROBLEMS[0];
  sel.value = current.id;

  promptEl.innerHTML = escapeHTML(current.prompt).replaceAll('\r\n','\n').replaceAll('\n','<br>');

  const trimmed = simplifySteps(current.steps || []);
  const guideStep = { id:"g0", text:`ガイド：${pickGuide(current)}`, requires:[] };
  const stepsWithGuide = [guideStep, ...trimmed];

  currentExpandedSteps = expandSteps(stepsWithGuide);

  const cards=[];
  currentExpandedSteps.forEach(s=>{
    cards.push({
      id:s.id,
      origId: s.origId,
      kind:'step',
      label:s.label,
      text:s.text,
      requires:s.requires || [],
      zone:'pool'
    });
  });

  poolCards=shuffle(cards);
  answerCards=[];
  solutionWrap.style.display='none';
  solutionWrap.innerHTML='';
  clearMarking();
  hideNextButton();
  setStatus('', 'カードを並べて「判定する」を押してください。');
  render();
}

function populateSelect(){
  sel.innerHTML='';
  PROBLEMS.forEach(p=>{
    const opt=document.createElement('option');
    opt.value=p.id;
    opt.textContent=p.title;
    sel.appendChild(opt);
  });
}
function getParamP(){
  try{ return new URL(window.location.href).searchParams.get('p'); }
  catch(_){ return null; }
}

sel.addEventListener('change',()=>loadProblem(sel.value));
resetBtn.addEventListener('click',()=>loadProblem(sel.value));
answerBtn.addEventListener('click',()=>{
  clearMarking();
  hideNextButton();
  setStatus('warn','解答（おすすめの並び）を表示しました。自力で並べてから「判定する」で確認できます。');
  solutionWrap.style.display='block';
  solutionWrap.innerHTML='';
  solutionWrap.appendChild(buildSolutionBox());
  typesetMath();
});
checkBtn.addEventListener('click',()=>{
  clearMarking();
  const r=evaluate();
  if(r.correctOrder){
    setStatus('ok','完璧！');
    showNextButton();
    solutionWrap.style.display='block';
    solutionWrap.innerHTML='';
    solutionWrap.appendChild(buildSolutionBox());
    typesetMath();
  } else if(r.correctSet){
    setStatus('warn',`カードはそろっています。順序を調整（進捗 ${r.progress}%）。`);
    hideNextButton();
    if(r.firstBad) msg.textContent=`順序ヒント：${r.firstBad.reason}`;
    solutionWrap.style.display='none';
  } else {
    hideNextButton();
    if(r.extras.length>0) setStatus('ng',`誤カードが混ざっています（${r.extras.length}枚）。`);
    else if(r.missing.length>0) setStatus('ng',`正解カードが足りません（${r.missing.length}枚）。`);
    else setStatus('ng','まだ整っていません。');
    solutionWrap.style.display='none';
  }

  const target = pill.closest('.status') || pill;
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  target.scrollIntoView({ behavior: reduce ? 'auto' : 'smooth', block: 'start' });
});

enableDrop(poolZone,'pool');
enableDrop(answerZone,'answer');

populateSelect();
loadProblem(getParamP() || 'P1');
</script>
</body>
</html>
