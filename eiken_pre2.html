<style>
:root{--bg1:#050611;--bg2:#0c1330;--ink:#eaf2ff;--muted:rgba(234,242,255,.72);--glass:rgba(9,12,24,.74);--warn:#ff5a7a;--gold:#ffd86b;--ok:#7cffc5;--btnIdle:.32;--btnTouch:.14;--fade:120ms;}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;min-height:100vh;display:grid;place-items:center;color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 12% 14%, rgba(124,255,197,.12), transparent 30%),radial-gradient(circle at 82% 22%, rgba(189,163,255,.10), transparent 28%),radial-gradient(circle at 62% 84%, rgba(255,216,107,.10), transparent 30%),linear-gradient(180deg,var(--bg1),var(--bg2) 55%,var(--bg1));padding:max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));overflow-x:hidden;}
.frame{width:100%;max-width:375px;padding:14px;border-radius:28px;background:var(--glass);backdrop-filter:blur(10px) saturate(1.15);border:1px solid rgba(124,255,197,.20);box-shadow:0 22px 70px rgba(0,0,0,.52),0 0 40px rgba(124,255,197,.08);position:relative;}
.topbar{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 12px;border-radius:18px;background:rgba(10,16,34,.30);border:1px solid rgba(124,255,197,.14);}
.topcenter{display:flex;justify-content:center;align-items:center;}
.topright{display:flex;justify-content:flex-end;align-items:center;gap:10px;flex-wrap:wrap;}
.topspacer{min-height:1px;}
.brand{display:flex;flex-direction:column;gap:2px;min-width:200px}.brand .t{font-weight:900;letter-spacing:.08em;font-size:14px}.brand .s{font-size:11px;color:var(--muted);letter-spacing:.06em}
.controls{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.seg{display:flex;overflow:hidden;border-radius:14px;border:1px solid rgba(124,255,197,.16);background:rgba(10,16,34,.18)}
.seg button{appearance:none;border:0;padding:10px 12px;background:transparent;color:rgba(255,255,255,.86);font-weight:900;letter-spacing:.06em;cursor:pointer;opacity:.75}
.seg button.active{background:rgba(124,255,197,.14);opacity:1}
.sel{display:flex;gap:8px;align-items:center;padding:8px 10px;border-radius:14px;border:1px solid rgba(124,255,197,.14);background:rgba(10,16,34,.18);color:rgba(255,255,255,.86);font-weight:800;letter-spacing:.04em}
.sel.bad{border-color:rgba(255,90,122,.55);background:rgba(255,90,122,.08)}.sel.good{border-color:rgba(124,255,197,.45);background:rgba(124,255,197,.08)}
select{max-width:100%;
  background:#d9d9d9; /* 灰色で見やすく */
  color:#111;
  border:1px solid #bdbdbd;
  border-radius:10px;
  outline:none;
  font-weight:900;
  letter-spacing:.06em;
  cursor:pointer;
  padding:6px 10px;
  appearance:none;
}
select:focus{box-shadow:0 0 0 2px rgba(255,216,107,.35);}
select option{background:#f3f3f3;color:#111;}
.card{margin-top:12px;border-radius:18px;background:rgba(10,16,34,.28);border:1px solid rgba(124,255,197,.12);box-shadow:0 10px 26px rgba(0,0,0,.25);padding:12px}
.prompt{display:grid;gap:8px}.prompt .meta{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.chip{font-size:11px;letter-spacing:.06em;padding:6px 10px;border-radius:999px;border:1px solid rgba(189,163,255,.20);background:rgba(189,163,255,.10);color:rgba(234,242,255,.86);display:inline-flex;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chip.gold{border-color:rgba(255,216,107,.20);background:rgba(255,216,107,.08)}.chip.warn{border-color:rgba(255,90,122,.22);background:rgba(255,90,122,.08)}

.btn{flex:1;min-width:120px;padding:12px 14px;border-radius:18px;border:1px solid rgba(124,255,197,.18);background:rgba(10,16,34,.26);color:rgba(255,255,255,.92);font-weight:900;letter-spacing:.06em;cursor:pointer;opacity:.82}

.explain{margin-top:10px;border-radius:18px;padding:12px;border:1px solid rgba(255,216,107,.18);background:rgba(255,216,107,.06);display:none;gap:10px}
.explain.show{display:grid}.explain h3{margin:0;font-size:13px;letter-spacing:.06em}.explain .p{color:rgba(234,242,255,.86);font-size:12.5px;line-height:1.55}.explain .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:rgba(234,242,255,.82)}
.diag{position:absolute;right:10px;top:10px;max-width:72ch;padding:9px 10px;border-radius:14px;background:rgba(0,0,0,.62);border:1px solid rgba(255,90,122,.45);color:rgba(255,255,255,.92);font:12px ui-monospace,SFMono-Regular,Menlo,monospace;display:none;pointer-events:none;white-space:pre-wrap;z-index:50}


@media (max-width: 420px){

/* === Exam Clean UI Overrides === */
/* BANK & slots text to white */
.bank, .bank *{color:#ffffff;}
.slots, .slots *{color:#ffffff;}
.bank .tok, .slots .tok{opacity:1;}

/* Hide decorative chips (MODE / GRADE / SHELF / FOCUS) */
#chipMode, #chipGrade, #chipSkill, #chipFocus{display:none !important;}

/* Hide instructional helper text */
.scene{display:none;}


/* Fixed-grade build */
#gradeWrap{display:none !important;}

/* === EXIT: back to index.html (sticky) === */
.index-exit{position:sticky;top:0;z-index:1000;display:flex;justify-content:center;padding:10px;
background:linear-gradient(180deg,rgba(5,6,17,.95),rgba(5,6,17,.75) 60%,rgba(5,6,17,0));}
.index-exit a{text-decoration:none;font-weight:900;letter-spacing:.08em;padding:10px 18px;
border-radius:18px;color:#eaf2ff;border:1px solid rgba(124,255,197,.35);
background:rgba(10,16,34,.65);backdrop-filter:blur(8px);
box-shadow:0 6px 20px rgba(0,0,0,.35);} 
.index-exit a:active{transform:scale(.97);} 

/* === In-frame Grade header (top of frame) === */
.grade-inframe{display:flex;justify-content:center;align-items:center;margin:2px 0 10px 0;}
.grade-inframe .badge{font-weight:900;letter-spacing:.12em;padding:9px 22px;border-radius:22px;
  color:#ffd86b;border:1px solid rgba(255,216,107,.45);background:rgba(10,16,34,.55);
  box-shadow:0 6px 18px rgba(0,0,0,.35);} 

/* Hide old right-aligned grade badge inside topbar */
#gradeBadge{display:none !important;}


/* === Drag & Drop UX === */
.drag-ghost{box-shadow:0 12px 28px rgba(0,0,0,.45);opacity:.92;}
/* === Insert marker for drag & drop === */
.drop-marker{width:0;border-left:3px solid var(--gold);height:34px;margin:0 2px;border-radius:3px;align-self:center;opacity:.95;}
.slots.drag-over{border-color:rgba(255,216,107,.55);}
/* === SHELF dropdown moved under topbar (no overflow) === */
.shelf-row{display:flex;flex-direction:column;gap:8px;margin:12px 0 0 0;}
#skillWrap{width:100%;justify-content:space-between;flex-wrap:wrap;}
#skillWrap span{white-space:nowrap;}
#skillWrap select{flex:1;min-width:0;}



/* === PATCH: Long-press ready (scale+float) & disable native selection/callout === */
/* Prevent iOS/Android text range selection & callout while interacting with tokens */
.bank, .slots { -webkit-user-select: none; user-select: none; }
.tok {
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-drag: none;
  touch-action: none; /* stop browser panning/selection on long-press */
}

/* Visual feedback exactly at long-press activation (before dragging) */
.tok.press-ready{
  opacity: 1;
  transform: scale(1.12) translateY(-2px);
  box-shadow: 0 18px 42px rgba(0,0,0,.55), 0 0 0 1px rgba(255,216,107,.22) inset;
  border-color: rgba(255,216,107,.50);
  background: rgba(255,216,107,.12);
  position: relative;
  z-index: 10;
}

#statusMsg{white-space:pre-line;}

// === PATCH: HINT1 表示バグ防止（S/V/O/C/M を必ず改行＆固定ラベルに正規化） ===
function __canonHint1(h){
  h = String(h||'');
  var lines = h.split('\n');
  var map = {};
  var extras = [];
  for(var i=0;i<lines.length;i++){
    var ln = (lines[i]||'').trim();
    if(!ln) continue;
    var mm = ln.match(/^([^=]+)=(.*)$/);
    if(mm){
      var k = (mm[1]||'').trim();
      var v = (mm[2]||'').trim();
      map[k] = v || '—';
    } else {
      extras.push(ln);
    }
  }
  if(map['O'] && !map['O(物)']) map['O(物)'] = map['O'];
  if(map['O2(物)'] && !map['O(物)']) map['O(物)'] = map['O2(物)'];
  if(map['O1(人)'] && !map['O(人)']) map['O(人)'] = map['O1(人)'];
  if(map['M(おまけ)'] && !map['M']) map['M'] = map['M(おまけ)'];
  if(extras.length){
    var ex = extras.join(' / ');
    if(map['M'] && map['M']!=='—') map['M'] = map['M'] + ' / ' + ex;
    else map['M'] = ex;
  }
  var S = map['S'] || '—';
  var V = map['V'] || '—';
  var O_person = map['O(人)'] || map['O1(人)'] || '—';
  var O_obj = map['O(物)'] || map['O2(物)'] || map['O'] || '—';
  var C = map['C'] || '—';
  var Mv = map['M'] || '—';
  var outLines = ['S='+S, 'V='+V];
  if(O_person !== '—') outLines.push('O(人)='+O_person);
  outLines.push('O(物)='+O_obj);
  outLines.push('C='+C);
  outLines.push('M='+Mv);
  return outLines.join('\n');

function isWord(t){return /^[A-Za-z]+$/.test(t||'');}
function lower(t){return (t||'').toLowerCase();}
function pickVerb(tokens){
  var skip={'i':1,'you':1,'he':1,'she':1,'it':1,'we':1,'they':1,'my':1,'your':1,'his':1,'her':1,'our':1,'their':1,'the':1,'a':1,'an':1,'this':1,'that':1,'these':1,'those':1};
  for(var i=0;i<tokens.length;i++){
    var t=lower(tokens[i]);
    if(!isWord(t)) continue;
    if(skip[t]) continue;
    return t;
  }
  return '';
}
function looksAdj(t){
  t=lower(t);
  if(!t) return false;
  var common={'happy':1,'sad':1,'tired':1,'late':1,'open':1,'closed':1,'clean':1,'boring':1,'interesting':1,'nervous':1,'reliable':1,'reasonable':1,'uncertain':1,'aware':1,'quiet':1,'effective':1,'active':1};

}
function looksNounStart(t){
  t=lower(t);
  if(!t) return false;
  if(t==='a'||t==='an'||t==='the') return true;
  if(t==='me'||t==='him'||t==='her'||t==='us'||t==='them'||t==='it'||t==='you') return true;

}
function isPrepTok(t){

}

}
function inferPatternFromSentence(raw){
  var tokens=tokenize(raw);
  while(tokens.length && !isWord(tokens[tokens.length-1])) tokens.pop();
  if(tokens.length<2) return {guess:'1',verb:'',why:'短すぎ'};

  // Robust verb index: prefer finite verb-like token; avoid DET + -ing noun trap when next is finite
  var DET={a:1,an:1,the:1,this:1,that:1,these:1,those:1,my:1,your:1,his:1,her:1,our:1,their:1,some:1,any:1,no:1,each:1,every:1};
  var AUX={am:1,is:1,are:1,was:1,were:1,be:1,been:1,being:1,do:1,does:1,did:1,have:1,has:1,had:1,can:1,will:1,shall:1,may:1,might:1,must:1,should:1,could:1,would:1};
  function isFiniteVerbLike(tok){
    var w=lower(tok||'');
    if(!w) return false;
    if(AUX[w]) return true;
    if(/^[a-z]+(s|es|ied)$/.test(w)) return true;
    if(/^[a-z]+ed$/.test(w)) return true;
    var irr={went:1,came:1,saw:1,made:1,gave:1,took:1,found:1,kept:1,told:1,sent:1,taught:1,became:1,began:1,left:1,felt:1,got:1,knew:1,thought:1,said:1,held:1,brought:1,wrote:1,read:1,spoke:1,drove:1,ran:1,built:1,chose:1,ate:1,drank:1,slept:1,met:1,fell:1,grew:1};
    return !!irr[w];
  }

    for(var i=1;i<toks.length;i++){
      var w=lower(toks[i]||'');
      if(/ing$/.test(w) && DET[lower(toks[i-1]||'')] && i+1<toks.length && isFiniteVerbLike(toks[i+1])) continue;
      if(isFiniteVerbLike(toks[i])) return i;
    }
    var v=pickVerb(toks.slice(1));
    if(!v) v=pickVerb(toks);
    if(v){
      var lv=lower(v);
      for(var j=0;j<toks.length;j++){ if(lower(toks[j])===lv) return j; }
    }
    return 1;
  }

  var vIndex = pickVerbIndexRobust(tokens);
  var verb = lower(tokens[vIndex]||'');
  var t1=lower(tokens[vIndex+1]||'');
  var t2=lower(tokens[vIndex+2]||'');

  // 상태(보어)계 동사 + 형용사(또는 보어) => SVC
  var link={am:1,is:1,are:1,was:1,were:1,be:1,become:1,became:1,seem:1,seems:1,look:1,looks:1,feel:1,feels:1,remain:1,remains:1,stay:1,stays:1,sound:1,sounds:1,taste:1,tastes:1,smell:1,smells:1,appear:1,appears:1,get:1,got:1,turn:1,turned:1,grow:1,grew:1};
  // NEW: 상태변화 동사(링킹처럼 쓰이는) 추가
  var linklike={fall:1,fell:1,fallen:1,go:1,went:1};
  // 자주 쓰는 보어 형용사(looksAdj가 약할 때 보강)
  var compAdj={asleep:1,awake:1,alone:1,afraid:1,open:1,closed:1};

  var ditrans={give:1,gave:1,send:1,sent:1,show:1,showed:1,teach:1,taught:1,tell:1,told:1,lend:1,lent:1,buy:1,bought:1,make:1,made:1,cook:1,cooked:1,get:1,got:1,find:1,found:1,offer:1,offered:1,bring:1,brought:1,write:1,wrote:1};
  var svoc={make:1,made:1,call:1,called:1,name:1,named:1,keep:1,kept:1,find:1,found:1,consider:1,considered:1,elect:1,elected:1,leave:1,left:1};

  if(link[verb] || linklike[verb]){
    if(looksAdj(t1) || compAdj[t1] || looksNounStart(t1)){
      return {guess:'2',verb:verb,why:'状態系/状態変化V + 보어(C)'};
    }
  }

  // SVOC first
  if(svoc[verb]){
    if(looksNounStart(t1) && (looksAdj(t2) || looksNounStart(t2))) return {guess:'5',verb:verb,why:'Oの後ろに説明（C）が来ている（O=C / OがCの状態）'};
  }

  // Ditransitive alternation
  if(ditrans[verb]){
    var isPerson=(t1==='me'||t1==='him'||t1==='her'||t1==='us'||t1==='them'||t1==='you');
    if(isPerson) return {guess:'4',verb:verb,why:'V直後が受け手（人）なのでSVOO（人→物）'};
    var pp=findToForAfter(tokens, vIndex+1);
    if(pp) return {guess:'3',verb:verb,why:'後ろに '+pp.prep+' がある（物 + '+pp.prep+' + 人）なのでSVO'};
    if(looksNounStart(t1) && looksNounStart(t2) && !isPrepTok(t2)) return {guess:'4',verb:verb,why:'to/for が無く、名詞が続くのでSVOO寄り'};
  }

  if(isPrepTok(t1)) return {guess:'1',verb:verb,why:'Vの直後が前置詞で、目的語(O)を直接取っていない（修飾語）'};
  if(looksNounStart(t1)) return {guess:'3',verb:verb,why:'Vの直後に名詞/代名詞が来て「何を？」が成立（O）'};
  return {guess:'1',verb:verb,why:'S+Vで一旦成立しそう（残りは修飾語の可能性）'};
}

function splitSVOC(raw, pat, verb){
  var tokens=tokenize(raw);
  while(tokens.length && !isWord(tokens[tokens.length-1])) tokens.pop();
  if(!tokens.length) return {S:'',V:'',O:'',C:'',M:'',pat:String(pat||'')};

  var v=verb||pickVerb(tokens.slice(1))||pickVerb(tokens);
  var vIndex=-1;
  for(var i=0;i<tokens.length;i++){ if(lower(tokens[i])===v){ vIndex=i; break; } }
  if(vIndex<0) vIndex=1;

  var S=tokens.slice(0,vIndex).join(' ');
  var V=tokens[vIndex]||'';
  var rest=tokens.slice(vIndex+1);

  var det={a:1,an:1,the:1,my:1,your:1,his:1,her:1,our:1,their:1,this:1,that:1,these:1,those:1,some:1,any:1};
  function join(a){return (a&&a.length)? a.join(' '):'';}

  var O='',C='',M='';
  pat=String(pat||'');

  if(pat==='1'){
    M=join(rest);
  } else if(pat==='2'){
    // SVC: split Complement (C) vs Modifier (M)
    // C = adjective/noun, M = PP / than-phrase / to-phrase
    var preps={in:1,on:1,at:1,for:1,to:1,with:1,of:1,about:1,from:1,by:1,after:1,before:1,under:1,over:1,near:1,around:1,into:1,onto:1,between:1,among:1,during:1,than:1};

    // Special-case: "used to be ..." often yields rest starting with "to be ..."
    // In that case, treat the complement as starting after "to be".
    var startIdx=0;
    if(rest.length>=2 && lower(rest[0])==='to' && lower(rest[1])==='be'){
      startIdx=2;
    }

    var pIdx=-1;
    for(var k=startIdx+1;k<rest.length;k++){
      if(preps[lower(rest[k])]){ pIdx=k; break; }
    }

    if(pIdx>startIdx){
      C=join(rest.slice(startIdx,pIdx));
      M=join(rest.slice(pIdx));
    } else {
      C=join(rest.slice(startIdx));
    }
  } else if(pat==='3'){
    O=join(rest);
  } else if(pat==='4'){
    // SVOO: IO + DO (rough)
    var cut=-1;
    for(var j=1;j<rest.length;j++){
      if(det[lower(rest[j])]){ cut=j; break; }
    }
    if(cut<0) cut=Math.min(1, rest.length);
    var io=rest.slice(0,cut);
    var doo=rest.slice(cut);
    O=join(io);
    C=join(doo); // used as O(物)
  } else if(pat==='5'){
    // SVOC: O then C (rough)
    var oEnd=1;
    if(rest.length>=2 && det[lower(rest[0])]) oEnd=2;
    var obj=rest.slice(0,oEnd);
    var comp=rest.slice(oEnd);
    O=join(obj);
    C=join(comp);
  } else {
    O=join(rest);
  }

  return {S:S,V:V,O:O,C:C,M:M,pat:pat,verb:v};
}

function buildHintSVOC(raw, patGuess, verb){
  var sp=splitSVOC(raw, patGuess, verb);
  var lines=[];
  lines.push('S='+(sp.S||'—'));
  lines.push('V='+(sp.V||'—'));
  if(sp.pat==='4'){
    lines.push('O(人)='+(sp.O||'—'));
    lines.push('O(物)='+(sp.C||'—'));
  } else {
    lines.push('O='+(sp.O||'—'));
    lines.push('C='+(sp.C||'—'));
  }
  if(sp.pat==='1' && sp.M){ lines.push('M(おまけ)='+sp.M); }
  return lines.join('\n');
}



// === PATCH: Strict O1/O2 for SVOO⇄SVO(to/for) rescue items (allowAltInA=true) ===
function parseDative(tokens){
  var endPunc={'.':1,'?':1,'!':1,',':1,':':1,';':1};
  var core=[];
  for(var i=0;i<tokens.length;i++){
    var t=tokens[i];
    if(!endPunc[t]) core.push(t);
  }
  var preps={'to':1,'for':1};
  var S=core[0]||'';
  var V=core[1]||'';
  var afterV=core.slice(2);

  // SVO: 物 + to/for + 人
  var prepPos=-1;
  for(var j=0;j<afterV.length;j++){
    var w=(afterV[j]||'').toLowerCase();
    if(preps[w]){ prepPos=j; break; }
  }
  if(prepPos!==-1){
    var O=afterV.slice(0, prepPos);
    var prep=afterV[prepPos];
    var IO=afterV.slice(prepPos+1);
    if(O.length && IO.length){
      return {kind:'SVO_PREP', S:S, V:V, O:O.join(' '), prep:prep, IO:IO.join(' ')};
    }
  }

  // SVOO: 人 + 物
  var objPron={'me':1,'him':1,'her':1,'us':1,'them':1,'you':1};
  if(afterV.length>=2){
    var first=afterV[0];
    var firstLow=(first||'').toLowerCase();
    var looksPerson=!!objPron[firstLow] || (/^[A-Z]/.test(first));
    if(looksPerson){
      var O1=first;
      var O2=afterV.slice(1).join(' ');
      if(O2){ return {kind:'SVOO', S:S, V:V, O1:O1, O2:O2}; }
    }
  }
  return null;
}

function _hintToMap(hintText){
  var lines = String(hintText||'').split(/\n/);
  var map = {S:'—',V:'—',O:'—',C:'—',M:'—'};
  for(var i=0;i<lines.length;i++){
    var ln = lines[i];
    if(!ln) continue;
    var m;
    if((m=/^S\s*=\s*(.*)$/.exec(ln))) map.S = (m[1]||'—');
    else if((m=/^V\s*=\s*(.*)$/.exec(ln))) map.V = (m[1]||'—');
    else if((m=/^O\(.*?\)\s*=\s*(.*)$/.exec(ln))) map.O = (m[1]||'—');
    else if((m=/^O\s*=\s*(.*)$/.exec(ln))) map.O = (m[1]||'—');
    else if((m=/^C\s*=\s*(.*)$/.exec(ln))) map.C = (m[1]||'—');
    else if((m=/^M\s*=\s*(.*)$/.exec(ln))) map.M = (m[1]||'—');
  }
  return map;
}

function extractLeadingIntro(raw){
  var toks = tokenize(raw||'');
  if(!toks || !toks.length) return {m:'', rest: raw||''};
  var comma=-1;
  for(var i=0;i<toks.length;i++){ if(toks[i]===','){ comma=i; break; } }
  if(comma<=0) return {m:'', rest: raw||''};

  var first = toks[0]||'';
  var firstLow = first.toLowerCase();

  var startsPart = false;
  if(/ing$/.test(firstLow)) startsPart = true;
  if(/ed$/.test(firstLow) || /en$/.test(firstLow)) startsPart = true;
  var partStarters = {having:1, being:1, given:1, looking:1, considering:1, facing:1, resisting:1, surrounded:1, confronted:1};
  if(partStarters[firstLow]) startsPart = true;

  var clauseStarters = {when:1, if:1, because:1, although:1, though:1, while:1, as:1, since:1, before:1, after:1, until:1, once:1, unless:1, whereas:1, whenever:1, wherever:1};
  var startsClause = !!clauseStarters[firstLow];

  var prepStarters = {in:1,on:1,at:1,by:1,for:1,with:1,from:1,to:1,of:1,about:1,into:1,onto:1,over:1,under:1,between:1,among:1,around:1,across:1,through:1,throughout:1,within:1,without:1,along:1,near:1,beside:1,behind:1,beyond:1,against:1,after:1,before:1,during:1,until:1,regarding:1,concerning:1,despite:1,via:1};
  var startsPrep = !!prepStarters[firstLow];

  var startsInf = (firstLow==='to');
  var startsFallback = _isLikelySubjectToken(toks[comma+1]||'');

  if(!startsPart && !startsClause && !startsPrep && !startsInf && !startsFallback) return {m:'', rest: raw||''};

  var mTokens = toks.slice(0, comma+1);
  var restTokens = toks.slice(comma+1);
  var m = _detok(mTokens).replace(/\s*,$/,'').trim();
  var rest = _detok(restTokens).trim();
  return {m:m, rest:rest};
}

function _simpleObjectForSVO(raw){
  var toks = tokenize(raw||'');
  var endPunc={'.':1,'?':1,'!':1,',':1,':':1,';':1};
  var core=[];
  for(var i=0;i<toks.length;i++) if(!endPunc[toks[i]]) core.push(toks[i]);
  if(core.length<3) return {obj:'', tail:''};
  var rest = core.slice(2);
  var preps=_preps();
  var objTokens=[];
  var tailTokens=[];
  for(var j=0;j<rest.length;j++){
    var w=(rest[j]||'').toLowerCase();
    if(preps[w]){ tailTokens = rest.slice(j); break; }
    objTokens.push(rest[j]);
  }
  return {obj:objTokens.join(' ').trim(), tail:tailTokens.join(' ').trim()};
}

function _splitObjectTrailingPP(objStr){
  var toks = tokenize(objStr||'');
  var endPunc={'.':1,'?':1,'!':1,',':1,':':1,';':1};
  var core=[];
  for(var i=0;i<toks.length;i++) if(!endPunc[toks[i]]) core.push(toks[i]);
  if(core.length<2) return {obj: objStr||'', tail:''};
  var preps=_preps();
  for(var j=1;j<core.length;j++){
    var w=(core[j]||'').toLowerCase();
    if(preps[w]){
      return {obj: core.slice(0,j).join(' ').trim(), tail: core.slice(j).join(' ').trim()};
    }
  }
  return {obj: objStr||'', tail:''};
}

function _svfix_fixQuestionHintMap(map, body, patGuess, lead){
  try{
    var toks = tokenize(body||'');
    // drop trailing punctuation
    while(toks.length && !isWord(toks[toks.length-1])) toks.pop();
    if(toks.length<3) return map;

    var wh={what:1,who:1,when:1,where:1,why:1,how:1,which:1};
    var auxDo={do:1,does:1,did:1};
    var auxBe={am:1,is:1,are:1,was:1,were:1};
    var auxModal={can:1,will:1,shall:1,may:1,might:1,must:1,should:1,could:1,would:1};
    var auxHave={have:1,has:1,had:1};
    function isAux(w){ return !!(auxDo[w]||auxBe[w]||auxModal[w]||auxHave[w]); }

    var det={a:1,an:1,the:1,this:1,that:1,these:1,those:1,my:1,your:1,his:1,her:1,our:1,their:1,some:1,any:1};
    function join(a){return (a&&a.length)? a.join(' '):'';}

    var w0=lower(toks[0]||'');
    var whLead='';
    var auxTok='';
    var start=0;

    if(wh[w0] && toks.length>=4 && isAux(lower(toks[1]||''))){
      whLead = toks[0];
      auxTok = toks[1];
      start = 2;
    } else if(isAux(w0)){
      auxTok = toks[0];
      start = 1;
    } else {
      return map;
    }

    var auxLow = lower(auxTok||'');
    var subjEnd = start+1;
    // allow 2-token subject like "your brother" / "the movie"
    if(subjEnd < toks.length && det[lower(toks[start]||'')] && isWord(toks[subjEnd])) subjEnd = start+2;

    // --- DO/MODAL/HAVE question: Aux + S + V + ... ---
    if(auxDo[auxLow] || auxModal[auxLow] || auxHave[auxLow]){
      if(subjEnd>=toks.length) return map;
      var vIndex = subjEnd;
      if(vIndex>=toks.length) return map;
      var S = join(toks.slice(start, subjEnd));
      var V = toks[vIndex]||'';
      var rest = toks.slice(vIndex+1);

      map.S = S || map.S;
      map.V = V || map.V;

<script>
/* === PATCH: long-press activates 'press-ready' instantly; short tap immediately triggers add; block native selection === */
(function(){
  const LONGPRESS_MS = 220;      // long-press threshold
  const MOVE_CANCEL_PX = 8;      // cancel long-press if finger moves before activation
  const TAP_MAX_MS = 220;        // treat as tap if released quickly (<= longpress)
  const TOK_SEL = '.tok';

  let timer = null;
  let activeTok = null;
  let startX = 0, startY = 0;
  let downAt = 0;
  let moved = false;
  let pressActive = false;

  function isTouchLike(e){
    return (e && (e.type && e.type.indexOf('touch')===0)) || (e && e.pointerType === 'touch');
  }

  function pt(e){
    if(e && e.touches && e.touches[0]) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
    if(e && e.changedTouches && e.changedTouches[0]) return {x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY};
    return {x:e.clientX, y:e.clientY};
  }

  function clearSelection(){
    try{
      const sel = window.getSelection && window.getSelection();
      if(sel && sel.type === 'Range') sel.removeAllRanges();
    }catch(_){ }
  }

  function clearAll(){
    if(timer){ clearTimeout(timer); timer = null; }
    if(activeTok){ activeTok.classList.remove('press-ready'); }
    activeTok = null;
    pressActive = false;
    moved = false;
    downAt = 0;
  }

  function markSynthetic(tok){
    try{ tok.dataset.__syntheticTap = String(Date.now()); }catch(_){ }
  }

  function isRecentSynthetic(tok){
    try{
      const t = tok && tok.dataset && tok.dataset.__syntheticTap;
      if(!t) return false;
      const dt = Date.now() - parseInt(t,10);
      return dt >= 0 && dt < 600;
    }catch(_){ return false; }
  }

  function consumeSynthetic(tok){
    try{ if(tok && tok.dataset) delete tok.dataset.__syntheticTap; }catch(_){ }
  }

  function onDown(e){
    const tok = e.target && e.target.closest ? e.target.closest(TOK_SEL) : null;
    if(!tok) return;

    const p = pt(e);
    startX = p.x; startY = p.y;
    downAt = Date.now();

      if(activeTok) activeTok.classList.add('press-ready');
      clearSelection();

  }

    if(!activeTok) return;

    const p = pt(e);
    const dx = p.x - startX;
    const dy = p.y - startY;

    if((dx*dx + dy*dy) > (MOVE_CANCEL_PX*MOVE_CANCEL_PX)) moved = true;

    // If user moves before long-press activates, cancel the press-ready timer (allow existing drag logic)
    if(!pressActive && timer && moved){
      clearTimeout(timer); timer = null;
      return;
    }

  }

  function onUp(e){
    if(!activeTok){ clearAll(); return; }

    const elapsed = downAt ? (Date.now() - downAt) : 9999;

    // If long-press not activated and not moved -> treat as tap: execute existing click behavior immediately
    if(!pressActive && !moved && elapsed <= TAP_MAX_MS){
      if(timer){ clearTimeout(timer); timer = null; }
      if(isTouchLike(e) && e.cancelable) e.preventDefault();

      const tok = activeTok;
      markSynthetic(tok);
      try{ tok.click(); }catch(_){ }

      tok.classList.remove('press-ready');
      clearAll();
      return;
    }

    clearAll();
  }

  const bank = document.getElementById('bank');
  const slots = document.getElementById('slots');
  const containers = [bank, slots].filter(Boolean);

  containers.forEach(function(el){
    el.addEventListener('pointerdown', onDown, {passive:false});
    el.addEventListener('pointermove', onMove, {passive:false});
    el.addEventListener('pointerup', onUp, {passive:false});
    el.addEventListener('pointercancel', onUp, {passive:false});

    el.addEventListener('touchstart', onDown, {passive:false});
    el.addEventListener('touchmove', onMove, {passive:false});
    el.addEventListener('touchend', onUp, {passive:false});
    el.addEventListener('touchcancel', onUp, {passive:false});

    el.addEventListener('contextmenu', function(ev){
      if(ev.target && ev.target.closest && ev.target.closest(TOK_SEL)) ev.preventDefault();
    });

    // Prevent duplicate native clicks after our synthetic tap
    el.addEventListener('click', function(ev){
      const tok = ev.target && ev.target.closest ? ev.target.closest(TOK_SEL) : null;
      if(!tok) return;
      if(isRecentSynthetic(tok) && ev.isTrusted){

    clearSelection();
  });

  document.addEventListener('dragstart', onUp, {passive:true});
})();

  // Parse questions, including "Do not you ..." from contraction expansion.
  function parseQuestion(tokens){

    while(i<t.length && ADV[L(t[i]||'')]){ if(L(t[i])==='not' && !neg) neg='not'; midAdv.push(t[i]); i++; }

      var j=i;
      while(j<t.length && ADV[L(t[j]||'')]){ if(L(t[j])==='not' && !neg) neg='not'; j++; }
      mainVerb=t[j]||''; mainIndex=j;
      if(!looksParticiple(mainVerb) && looksParticiple(t[j+1]||'')) { mainVerb=t[j+1]; mainIndex=j+1; }

      mainVerb=t[j2]||''; mainIndex=j2;

    if(!mainVerb) return null;
    var rest=t.slice(mainIndex+1);

    if(whLead) mBits.push(whLead);

  // Override question fix: V = lexical verb (or be for copula), Aux goes to M.
  window._svfix_fixQuestionHintMap = function(map, body, patGuess, lead){

        auxPhrase.push(toks[i]);

    }
    else if(auxHave[w]){
      if(L(toks[i+1]||'')==='to' && isW(toks[i+2]||'')){
        auxPhrase.push(toks[i]); auxPhrase.push(toks[i+1]);

      } else {
        var la=toks[i+1]||'';

      }

      if(L(toks[i+1]||'')==='going' && L(toks[i+2]||'')==='to' && isW(toks[i+3]||'')){
        auxPhrase.push(toks[i]); auxPhrase.push(toks[i+1]); auxPhrase.push(toks[i+2]);

        if(neg2) mPartsC.push('not');
        if(sp.m) mPartsC.push(sp.m);
        if(sp.obj) mPartsC.push(sp.obj);
        map.M = mPartsC.join(' / ') || map.M || '—';
      } else {
        // is open from 9 to 5 / is late today
        if(restC.length){
          map.C = restC[0];
          var tail = restC.slice(1);
          var tailStr = join(tail);
          var mPartsC2=[];
          if(lead) mPartsC2.push(lead);
          if(neg2) mPartsC2.push('not');
          if(tailStr) mPartsC2.push(tailStr);
          map.M = mPartsC2.join(' / ') || map.M || '—';
        }
      }
      map.O='—';
      return map;
    }

    if(pat==='1'){
      map.V = vPhrase;
      var rest1 = toks.slice(mainIndex+1);
      var m = join(rest1);
      if(m){ map.M = (lead?lead+' / ':'') + m; }
      map.O='—'; map.C='—';
      return map;
    }

    if(pat==='3'){
      map.V = vPhrase;
      var rest2 = toks.slice(mainIndex+1);
      var objm2 = splitObjAndM(rest2);
      if(objm2.obj) map.O = objm2.obj;
      var mParts3=[];
      if(lead) mParts3.push(lead);
      if(objm2.m) mParts3.push(objm2.m);
      map.M = mParts3.join(' / ') || map.M || '—';
      return map;
    }

  }

  // Override buildHintWithM to apply fixes.
  window.buildHintWithM = function(raw, patGuess, verb, it){
    var ex = extractLeadingIntro(raw||'');

    if(lead){

      return ['S='+p.S,'V='+p.V,'O=—','C='+(sp.head.join(' ').trim()||'—'),'M='+(sp.tail.join(' ').trim()||'—')].join('\n');
    }
    if(String(pat||'')==='3'){
      var sp3=splitAtFirstPrep(rest);
      return ['S='+p.S,'V='+p.V,'O='+(sp3.head.join(' ').trim()||'—'),'C=—','M='+(sp3.tail.join(' ').trim()||'—')].join('\n');
    }
    if(String(pat||'')==='4'){
      if(typeof parseDative==='function'){
        var dt=parseDative((typeof tokenize==='function')?tokenize(raw||''):String(raw||'').split(/\s+/));
        if(dt && dt.kind==='SVOO') return ['S='+dt.S,'V='+dt.V,'O1(人)='+dt.O1,'O2(物)='+dt.O2,'C=—','M=—'].join('\n');
        if(dt && dt.kind==='SVO_PREP') return ['S='+dt.S,'V='+dt.V,'O='+(dt.O||'—'),'C=—','M=('+(dt.prep+' '+dt.IO)+')'].join('\n');
      }
      var sp4=splitAtFirstPrep(rest);
      return ['S='+p.S,'V='+p.V,'O='+(sp4.head.join(' ').trim()||'—'),'C=—','M='+(sp4.tail.join(' ').trim()||'—')].join('\n');
    }
    if(String(pat||'')==='5'){
      if(!rest.length) return ['S='+p.S,'V='+p.V,'O=—','C=—','M=—'].join('\n');
      var oEnd=1; if(rest.length>=2 && DET[lw(rest[0])]) oEnd=2;
      var O5=rest.slice(0,oEnd).join(' ').trim()||'—';
      var rem=rest.slice(oEnd);
      var sp5=splitAtFirstPrep(rem);
      return ['S='+p.S,'V='+p.V,'O='+O5,'C='+(sp5.head.join(' ').trim()||'—'),'M='+(sp5.tail.join(' ').trim()||'—')].join('\n');
    }
    return ['S='+p.S,'V='+p.V,'O=—','C=—','M='+(rest.join(' ').trim()||'—')].join('\n');
  };

  // Replace HINT button handler
  function newShowHint(){
    var it=window.pool && window.pool[window.idx];
    if(!it) return;
    window.hintLevel=Math.min(3,(window.hintLevel||0)+1);
    var tgt=(it.targets&&it.targets.length)? it.targets[0] : '';
    var inf2=(tgt&&tgt.replace(/\s/g,'').length)? window.inferPatternFromSentence(tgt) : null;
    var basePat=(inf2 && inf2.guess) ? String(inf2.guess) : String(it.pattern||'');

    if(window.hintLevel===1){
      var msg='HINT 1（S/V/O/C/M）:\n'+window.buildHintWithM(tgt, basePat, inf2?inf2.verb:'', it);
      window.els.statusMsg.textContent=msg;
      window.els.explain.classList.remove('show');
    } else if(window.hintLevel===2){
      window.els.statusMsg.textContent='HINT 2（正解）: '+tgt;
      window.els.explain.classList.remove('show');
    } else {
      var allArr=(it.targets&&it.targets.length)? it.targets : [];
      var hasToFor=false;
      for(var kk=0;kk<allArr.length;kk++){ if(/\b(to|for)\b/i.test(String(allArr[kk]||''))){ hasToFor=true; break; } }
      if(it && it.allowAltInA && hasToFor && allArr.length>=2 && typeof window._svfix_labelForAlt==='function'){
        var parts=[];
        for(var k=0;k<allArr.length;k++){
          var s=allArr[k];
          var pat=(typeof window._svfix_labelForAlt==='function')? window._svfix_labelForAlt(s, basePat) : basePat;
          parts.push(s+' ：'+window.patternLabel(pat));
        }
        window.els.statusMsg.textContent='HINT 3（正解例まとめ）: '+parts.join(' / ');
      } else {
        var all=(allArr.length)? allArr.join(' / ') : '';
        var msg3='HINT 3（正解例まとめ）: '+all;
        msg3+='\n正解の文型：'+window.patternLabel(basePat);
        window.els.statusMsg.textContent=msg3;
      }
      window.els.explain.classList.remove('show');
    }
  }

  function replaceHintButton(){
    var btn=document.getElementById('btnHint');
    if(!btn || !btn.parentNode) return;
    var clone=btn.cloneNode(true);
    btn.parentNode.replaceChild(clone, btn);
    clone.addEventListener('click', newShowHint);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', replaceHintButton);
  else replaceHintButton();
})();

<script>
/* === HINT FIX v6 (PRE-2): rule-based S/V/O/C/M from HINT2, with auto-repair rules ===
   New rule added: BE + ADJ (+ PP like 'from 9 to 5') must be SVC: S=NP, V=be, C=adj, M=PP.
   Also includes sanity-repair: if V is not finite but next token is be-verb, shift V to be.
*/
(function(){
  // --- helpers ---
  function lw(x){ return (typeof lower==='function') ? lower(x) : String(x||'').toLowerCase(); }
  function tok(raw){
    if(typeof tokenize==='function') return tokenize(raw||'');
    return String(raw||'').trim().split(/\s+/);
  }
  function trimPunc(tokens){
    if(typeof isWord!=='function') return tokens;
    while(tokens.length && !isWord(tokens[tokens.length-1])) tokens.pop();
    return tokens;
  }
  function join(a){ return (a && a.length) ? a.join(' ').trim() : ''; }

  // preps for splitting M
  if(typeof window._preps !== 'function'){
    window._preps = function(){
      return {at:1,in:1,on:1,to:1,for:1,from:1,with:1,by:1,about:1,of:1,into:1,onto:1,over:1,under:1,after:1,before:1,between:1,among:1,during:1,without:1,against:1,around:1,because:1};
    };
  }
  var PREPS = window._preps();
  var BE = {am:1,is:1,are:1,was:1,were:1,be:1,been:1,being:1};
  var DET = {a:1,an:1,the:1,this:1,that:1,these:1,those:1,my:1,your:1,his:1,her:1,our:1,their:1,some:1,any:1,no:1,each:1,every:1};
  var AUX = Object.assign({}, BE, {do:1,does:1,did:1,have:1,has:1,had:1,can:1,will:1,shall:1,may:1,might:1,must:1,should:1,could:1,would:1});

  function isFiniteVerbLike(w){
    w=lw(w);
    if(!w) return false;
    if(AUX[w]) return true;
    if(/^[a-z]+(s|es|ied)$/.test(w)) return true;
    if(/^[a-z]+ed$/.test(w)) return true;
    var irr={went:1,came:1,saw:1,made:1,gave:1,took:1,found:1,kept:1,told:1,sent:1,taught:1,became:1,began:1,left:1,felt:1,got:1,knew:1,thought:1,said:1,held:1,brought:1,wrote:1,read:1,spoke:1,drove:1,ran:1,built:1,chose:1,ate:1,drank:1,slept:1,met:1};
    return !!irr[w];
  }

  function isAdjLike(w){
    w=lw(w);
    if(!w) return false;
    // if native looksAdj exists, trust it
    if(typeof looksAdj==='function') return !!looksAdj(w);
    // common adj suffixes + basic list
    if({open:1,closed:1,late:1,early:1,good:1,bad:1,busy:1,sad:1,happy:1,angry:1,ready:1,sure:1,free:1,available:1,important:1,interesting:1,boring:1,tired:1,afraid:1,clean:1}.hasOwnProperty(w)) return true;
    if(/(y|ful|ous|able|ible|al|ive|less|ic|ish)$/.test(w)) return true;
    if(/ed$/.test(w)) return true;
    return false;
  }

  function pickVerbIndexRobust(tokens){
    // prefer finite verb; avoid DET + -ing trap when next is finite
    for(var i=1;i<tokens.length;i++){
      var w=lw(tokens[i]);
      if(/ing$/.test(w) && DET[lw(tokens[i-1])] && i+1<tokens.length && isFiniteVerbLike(tokens[i+1])) continue;
      if(isFiniteVerbLike(tokens[i])) return i;
    }
    // fallback to existing pickVerb if any
    if(typeof pickVerb==='function'){
      var v = pickVerb(tokens.slice(1)) || pickVerb(tokens) || '';
      if(v){
        var lv=lw(v);
        for(var j=0;j<tokens.length;j++) if(lw(tokens[j])===lv) return j;
      }
    }
    return Math.min(1, Math.max(0, tokens.length-1));
  }

  function splitAtFirstPrep(tokens){
    for(var i=0;i<tokens.length;i++){
      if(PREPS[lw(tokens[i])]) return {head: tokens.slice(0,i), tail: tokens.slice(i)};
    }
    return {head: tokens.slice(0), tail: []};
  }

  function baseParse(raw){
    var tokens = trimPunc(tok(raw));
    var vi = pickVerbIndexRobust(tokens);
    return {tokens:tokens, vi:vi, S:join(tokens.slice(0,vi))||'—', V:String(tokens[vi]||'—'), rest:tokens.slice(vi+1)};
  }

  function repairSVOCM(p){
    // Repair rule A: if V is not finite but next token is BE, shift V to BE and move earlier token into S.
    var Vlow=lw(p.V);
    if(!isFiniteVerbLike(Vlow) && p.rest.length && BE[lw(p.rest[0])]){
      // move current V into S tail
      var newS = (p.S && p.S!=='—') ? (p.S+' '+p.V).trim() : p.V;
      p.S = newS;
      p.V = p.rest[0];
      p.rest = p.rest.slice(1);
    }
    return p;
  }

  // Infer pattern from sentence (HINT2)
  window.inferPatternFromSentence = function(raw){
    var p = repairSVOCM(baseParse(raw));
    var v = lw(p.V);
    var t1 = lw(p.rest[0]||'');
    var t2 = lw(p.rest[1]||'');

    // New rule: BE + adj-like => SVC
    if(BE[v] && isAdjLike(t1)) return {guess:'2',verb:v,why:'be + adj => SVC'};

    // Existing logic fallback
    if(typeof isPrepTok==='function' && isPrepTok(t1)) return {guess:'1',verb:v,why:'V直後が前置詞 => SV'};
    if(typeof looksNounStart==='function'){
      if(looksNounStart(t1)) return {guess:'3',verb:v,why:'V直後が名詞 => SVO'};
    } else {
      // crude noun-start: determiner/pronoun/word
      if(DET[t1] || /^[a-z]+$/.test(t1) || /^(me|him|her|us|them|you|it)$/.test(t1)) return {guess:'3',verb:v,why:'V直後が名詞っぽい => SVO'};
    }
    return {guess:'1',verb:v,why:'default SV'};
  };

  // Build HINT1 lines directly (do not rely on old buildHintWithM heuristics)
  function buildHint1(raw, pat){
    var p = repairSVOCM(baseParse(raw));
    var v = lw(p.V);

    // Force SVC for BE+adj-like even if pat is wrong
    if(BE[v] && isAdjLike(lw(p.rest[0]||''))) pat = '2';

    if(String(pat)==='1'){
      var M = join(p.rest) || '—';
      return ['S='+p.S,'V='+p.V,'O(物)=—','C=—','M='+M].join('\n');
    }

    if(String(pat)==='2'){
      // C until first prep, M from first prep
      var sp = splitAtFirstPrep(p.rest);
      var C = join(sp.head) || '—';
      var M = join(sp.tail) || '—';
      // New rule refinement: if C starts with a prep, move it to M
      if(C!=='—' && PREPS[lw(C.split(/\s+/)[0])]){
        M = (C + (M==='—'?'':(' '+M))).trim();
        C = '—';
      }
      return ['S='+p.S,'V='+p.V,'O(物)=—','C='+C,'M='+M].join('\n');
    }

    if(String(pat)==='3'){
      var sp3 = splitAtFirstPrep(p.rest);
      var O = join(sp3.head) || '—';
      var M3 = join(sp3.tail) || '—';
      return ['S='+p.S,'V='+p.V,'O(物)='+O,'C=—','M='+M3].join('\n');
    }

    if(String(pat)==='4'){
      if(typeof parseDative==='function'){
        try{
          var dt=parseDative(tok(raw));
          if(dt && dt.kind==='SVOO') return ['S='+dt.S,'V='+dt.V,'O1(人)='+dt.O1,'O2(物)='+dt.O2,'C=—','M=—'].join('\n');
          if(dt && dt.kind==='SVO_PREP') return ['S='+dt.S,'V='+dt.V,'O(物)='+(dt.O||'—'),'C=—','M=('+(dt.prep+' '+dt.IO)+')'].join('\n');
        } catch(e){}
      }
      // fallback: treat like SVO
      var sp4 = splitAtFirstPrep(p.rest);
      return ['S='+p.S,'V='+p.V,'O(物)='+(join(sp4.head)||'—'),'C=—','M='+(join(sp4.tail)||'—')].join('\n');
    }

    if(String(pat)==='5'){
      // Simple: O first (det+word allowed), then C until prep
      var rest=p.rest.slice();
      if(!rest.length) return ['S='+p.S,'V='+p.V,'O(物)=—','C=—','M=—'].join('\n');
      var oEnd=1;
      if(rest.length>=2 && DET[lw(rest[0])]) oEnd=2;
      var O5=join(rest.slice(0,oEnd))||'—';
      var rem=rest.slice(oEnd);
      var sp5=splitAtFirstPrep(rem);
      var C5=join(sp5.head)||'—';
      var M5=join(sp5.tail)||'—';
      return ['S='+p.S,'V='+p.V,'O(物)='+O5,'C='+C5,'M='+M5].join('\n');
    }

    // default
    var Mx = join(p.rest) || '—';
    return ['S='+p.S,'V='+p.V,'O(物)=—','C=—','M='+Mx].join('\n');
  }

  // Replace HINT button to use our builder + basePat
  function newShowHint(){
    var it=window.pool && window.pool[window.idx];
    if(!it) return;
    window.hintLevel=Math.min(3,(window.hintLevel||0)+1);
    var tgt=(it.targets&&it.targets.length)? it.targets[0] : '';
    var inf=(tgt&&tgt.replace(/\s/g,'').length)? window.inferPatternFromSentence(tgt) : null;
    var basePat=(inf && inf.guess) ? String(inf.guess) : String(it.pattern||'');

    if(window.hintLevel===1){
      window.els.statusMsg.textContent = 'HINT 1（S/V/O/C/M）:\n' + buildHint1(tgt, basePat);
      window.els.explain.classList.remove('show');
    } else if(window.hintLevel===2){
      window.els.statusMsg.textContent = 'HINT 2（正解）: ' + tgt;
      window.els.explain.classList.remove('show');
    } else {
      var allArr=(it.targets&&it.targets.length)? it.targets : [];
      var all=(allArr.length)? allArr.join(' / ') : '';
      var msg3='HINT 3（正解例まとめ）: '+all+'\n正解の文型：'+(typeof patternLabel==='function'? patternLabel(basePat):basePat);
      window.els.statusMsg.textContent=msg3;
      window.els.explain.classList.remove('show');
    }
  }

  function replaceHintButton(){
    var btn=document.getElementById('btnHint');
    if(!btn || !btn.parentNode) return;
    var clone=btn.cloneNode(true);
    btn.parentNode.replaceChild(clone, btn);
    clone.addEventListener('click', newShowHint);
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', replaceHintButton);
  else replaceHintButton();
})();
</script>








<script>
/* === HINT2→HINT1 SVOCM OVERRIDE v35 (比較: better/most + SVC & 主語2語のbe文を崩さない) ===
  FIX:
    - This restaurant is better than the one near my house. が S=This / V=restaurant になる
      （動詞位置検出が早すぎて名詞をV扱いしていた）
    - English is more difficult than math.（more+adj）/ Today is hotter than yesterday.（-er）もSVCで維持

  対応:
    1) pickVerbIndexRobust を改修：BE/DO/MODAL/have を優先してVにする。名詞をVにしない。
    2) be/link + (not) + 形容詞/名詞補語 + 比較（better/best含む） をSVC
    3) more/less + adj を補語C=2語で取る
    4) HINT3：重複除去＋正解文型以外除外（v31）を維持

  NEW:
    - She is the most popular in her class. → C=the most popular / M=in her class
*/
(function(){
  const PREPS = new Set(['at','in','on','to','for','from','with','by','about','of','into','onto','over','under','after','before','between','among','during','without','against','around','because','than']);
  const BE = new Set(['am','is','are','was','were','be','been','being']);
  const DO = new Set(['do','does','did']);
  const MODAL = new Set(['will','would','can','could','shall','should','may','might','must']);
  const HAVE = new Set(['have','has','had']);
  const DET = new Set(['a','an','the','this','that','these','those','my','your','his','her','our','their','some','any','no','each','every']);
  const SUBJ_PRON = new Set(['i','you','he','she','we','they','it','there']);
  const WH_ADV = new Set(['where','when','why','how']);
  const ADV = new Set(['not','yet','ever','never','already','just','still','again','today','tomorrow','yesterday','now','soon','here','there','always','often','sometimes','usually','very','tonight','early','late','then']);
  const LINKLIKE = new Set(['become','became','get','got','turn','turned','grow','grew','seem','seems','look','looks','feel','feels','remain','remains','stay','stays']);
  const TO_INF_OBJ = new Set(['want','wants','wanted','hope','hopes','hoped','plan','plans','planned','decide','decides','decided','try','tries','tried','need','needs','needed','promise','promises','promised']);
  const MOTION_V = new Set(['come','go','return','arrive','leave']);
  const DIR_ADV = new Set(['home','here','there','back','away','abroad','upstairs','downstairs','downtown']);
  const MORELESS = new Set(['more','less']);

  // irregular / common verbs (minimal)
  const IRR = new Set(['went','came','saw','made','gave','took','found','kept','told','sent','taught','became','began','left','felt','got','knew','thought','said','held','brought','wrote','read','spoke','drove','ran','built','chose','ate','drank','slept','met','fell','grew']);

  function lw(x){ return (typeof lower==='function') ? lower(x) : String(x||'').toLowerCase(); }

  function normalizeContractions(s){
    s=String(s||'');
    s=s.replace(/[’‛＇`]/g,"'");
    s=s.replace(/\b([A-Za-z]+)'ve\b/g,'$1 have');
    s=s.replace(/\bwon't\b/gi,'will not');
    s=s.replace(/\bcan't\b/gi,'cannot');
    s=s.replace(/\b(don't)\b/gi,'do not');
    s=s.replace(/\b(doesn't)\b/gi,'does not');
    s=s.replace(/\b(didn't)\b/gi,'did not');
    s=s.replace(/\bI'm\b/gi,'I am');
    s=s.replace(/\b(we|they|you)\s*'re\b/gi,'$1 are');
    s=s.replace(/\b(he|she|it)\s*'s\b/gi,'$1 is');
    return s;
  }

  function tokenizeSafe(raw){
    raw = normalizeContractions(raw);
    return (typeof tokenize==='function') ? tokenize(raw||'') : String(raw||'').trim().split(/\s+/);
  }
  function trimPunc(toks){
    if(typeof isWord!=='function') return toks;
    while(toks.length && !isWord(toks[toks.length-1])) toks.pop();
    return toks;
  }
  function join(toks){ return toks && toks.length ? toks.join(' ').trim() : ''; }
  function isAdvLike(w){ w=lw(w); return ADV.has(w) || /ly$/.test(w); }

  function isAdjLike(w){
    w=lw(w);
    if(!w) return false;
    if(PREPS.has(w)) return false;
    if(typeof looksAdj==='function' && looksAdj(w)) return true;
    // comparative/superlative (better/best 포함)
    if(/(er|est)$/.test(w)) return true;
    if(w==='better' || w==='best' || w==='worse' || w==='worst') return true;
    if(/(y|ful|ous|able|ible|al|ive|less|ic|ish|ed)$/.test(w)) return true;
    if(['late','early','busy','happy','sad','angry','tired','ready','sure','quiet','open','closed','hot','cold','warm','cool','difficult','easy','important','interesting','boring','expensive','comfortable','hard'].includes(w)) return true;
    return false;
  }

  function isFiniteVerbLike(tok, prevTok){
    const w=lw(tok), prev=lw(prevTok);
    if(!w) return false;
    if(BE.has(w) || DO.has(w) || MODAL.has(w) || HAVE.has(w)) return true;
    if(IRR.has(w)) return true;
    if(PREPS.has(w) || WH_ADV.has(w) || isAdvLike(w)) return false;
    // avoid treating noun after determiner as verb (this restaurant)
    if(DET.has(prev)) return false;
    // simple verb endings
    if(/^[a-z]+ed$/.test(w)) return true;
    if(/^[a-z]+(s|es)$/.test(w)) return true;
    return false;
  }

  function pickVerbIndexRobust(toks){
    // Prefer auxiliaries / be / do / modal / have
    for(let i=1;i<toks.length;i++){
      const w=lw(toks[i]);
      if(BE.has(w) || DO.has(w) || MODAL.has(w) || HAVE.has(w)) return i;
    }
    // Then verb-like heuristics
    for(let i=1;i<toks.length;i++){
      if(isFiniteVerbLike(toks[i], toks[i-1])) return i;
    }
    // fallback
    return Math.min(1, Math.max(0, toks.length-1));
  }

  function consumeNPShort(toks, start){
    const out=[];
    let i=start;
    if(i>=toks.length) return {np:out,next:i};
    let w=lw(toks[i]);
    if(SUBJ_PRON.has(w)) return {np:[toks[i]], next:i+1};
    if(DET.has(w)){
      out.push(toks[i]); i++;
      if(i<toks.length){ out.push(toks[i]); i++; }
      return {np:out,next:i};
    }
    return {np:[toks[i]], next:i+1};
  }

  function splitAtFirstPrep(toks){
    for(let i=0;i<toks.length;i++) if(PREPS.has(lw(toks[i]))) return {head:toks.slice(0,i), tail:toks.slice(i)};
    return {head:toks.slice(0), tail:[]};
  }

  function baseParse(raw){
    const toks=trimPunc(tokenizeSafe(raw));
    const vi=pickVerbIndexRobust(toks);
    return {toks, vi, S: join(toks.slice(0,vi))||'—', V: String(toks[vi]||'—'), rest: toks.slice(vi+1)};
  }

  // WH + do + (not) + NP + V
  function repairWhQuestion(p){
    const toks=p.toks||[];
    if(toks.length<4) return p;
    const wh=lw(toks[0]);
    const aux=lw(toks[1]);
    if(!WH_ADV.has(wh) || !DO.has(aux)) return p;
    let i=2, neg=false;
    if(lw(toks[i])==='not'){ neg=true; i++; }
    const subj=consumeNPShort(toks,i);
    if(subj.next < toks.length){
      p.S = join(subj.np);
      p.V = toks[subj.next];
      const rest=toks.slice(subj.next+1);
      p.rest = [toks[0]].concat(neg?['not']:[]).concat(rest);
    }
    return p;
  }

  // do + (not) + NP + V
  function repairDoQuestion(p){
    const toks=p.toks||[];
    if(toks.length<3) return p;
    const first=lw(toks[0]);
    if(!DO.has(first)) return p;
    let i=1, neg=false;
    if(lw(toks[i])==='not'){ neg=true; i++; }
    const subj=consumeNPShort(toks,i);
    if(subj.next < toks.length){
      p.S = join(subj.np);
      p.V = toks[subj.next];
      const rest=toks.slice(subj.next+1);
      p.rest = (neg?['not']:[]).concat(rest);
    }
    return p;
  }

  // declarative do-neg fold (does not want)
  function foldDoNeg(p){
    const v=lw(p.V);
    if(!DO.has(v)) return p;
    if(p.rest.length>=2 && lw(p.rest[0])==='not'){
      p.V = p.V + ' ' + p.rest[0] + ' ' + p.rest[1];
      p.rest = p.rest.slice(2);
    }
    return p;
  }

  // be going to fold
  function foldBeGoingTo(p){
    const v=lw(p.V);
    if(!BE.has(v)) return p;
    if(p.rest.length>=3 && lw(p.rest[0])==='going' && lw(p.rest[1])==='to'){
      p.V = p.V + ' ' + p.rest[0] + ' ' + p.rest[1] + ' ' + p.rest[2];
      p.rest = p.rest.slice(3);
    }
    return p;
  }

  function mainVerbFromVPhrase(V){
    const parts=String(V||'').trim().split(/\s+/);
    return lw(parts[parts.length-1]||'');
  }

  function isToInfObject(mainV, rest){
    return TO_INF_OBJ.has(lw(mainV)) && rest && rest.length && lw(rest[0])==='to';
  }

  function isDirAdvAfterMotion(mainV, tok){
    return MOTION_V.has(lw(mainV)) && DIR_ADV.has(lw(tok));
  }

  function parseForHints(raw){
    let p=baseParse(raw);
    p=repairWhQuestion(p);
    p=repairDoQuestion(p);
    p=foldDoNeg(p);
    p=foldBeGoingTo(p);
    return p;
  }

  window.inferPatternFromSentence = function(raw){
    const p=parseForHints(raw);
    const mainV=mainVerbFromVPhrase(p.V);
    const r=p.rest||[];

    // SVC: be/link + (not) + adjective/noun OR more/less + adjective
    if(BE.has(mainV) || LINKLIKE.has(mainV)){
      let idx=0;
      if(lw(r[0]||'')==='not') idx=1;
      const first=lw(r[idx]||'');
      const second=lw(r[idx+1]||'');
      if(first && (isAdjLike(first) || DET.has(first))) return {guess:'2', verb:mainV, why:'be/link + (not) + C'};
      if(MORELESS.has(first) && second && isAdjLike(second)) return {guess:'2', verb:mainV, why:'be/link + (not) + more/less + adj'};
    }

    if(isToInfObject(mainV, r)) return {guess:'3', verb:mainV, why:'to-inf as object'};
    if(isDirAdvAfterMotion(mainV, lw(r[0]||''))) return {guess:'1', verb:mainV, why:'motion + direction adv'};

    let start=0;
    let a1=lw(r[0]||'');
    if(a1==='not'){ start=1; a1=lw(r[1]||''); }
    if(a1 && (PREPS.has(a1) || isAdvLike(a1))) return {guess:'1', verb:mainV, why:'prep/adv after V'};

    if(r.length>start) return {guess:'3', verb:mainV, why:'fallback SVO'};
    return {guess:'1', verb:mainV, why:'default SV'};
  };

  // SVC complement split: C can be 1 word OR (more/less + adj)
  function splitBeComplement(rest){
    const r=rest.slice();
    const M=[];
    if(r.length && lw(r[0])==='not') M.push(r.shift());
    const C=[];
    if(!r.length) return {C, M};

    // (1) the most/least + adj  => C="the most popular" and stop before prep (in/at/than...)
    if(lw(r[0])==='the' && r.length>=3 && (lw(r[1])==='most' || lw(r[1])==='least') && (isAdjLike(lw(r[2])) || (/^[a-z]+$/.test(lw(r[2])) && !PREPS.has(lw(r[2]))))){
      C.push(r.shift()); // the
      C.push(r.shift()); // most/least
      C.push(r.shift()); // adjective
      // attach following noun(s) to C until a preposition starts (e.g., "the most popular student")
      while(r.length && !PREPS.has(lw(r[0]))){
        C.push(r.shift());
      }
      while(r.length) M.push(r.shift());
      return {C, M};
    }

    // (2) the + superlative adjective (best/worst/longest...) => keep together; attach following noun(s) until prep
    if(lw(r[0])==='the' && r.length>=2 && isAdjLike(lw(r[1]))){
      C.push(r.shift()); // the
      C.push(r.shift()); // best/worst/longest...
      while(r.length && !PREPS.has(lw(r[0]))){
        C.push(r.shift());
      }
      while(r.length) M.push(r.shift());
      return {C, M};
    }

    // (3) more/less + adj
    if(MORELESS.has(lw(r[0])) && r.length>=2 && isAdjLike(lw(r[1]))){
      C.push(r.shift());
      C.push(r.shift());
      while(r.length) M.push(r.shift());
      return {C, M};
    }

    // (4) default: one-token complement
    C.push(r.shift());
    while(r.length) M.push(r.shift());
    return {C, M};
  }

  function buildHint1FromHINT2(sentence){
    const p=parseForHints(sentence);
    const inf=window.inferPatternFromSentence(sentence) || {guess:'1'};
    const pat=String(inf.guess||'1');
    const mainV=mainVerbFromVPhrase(p.V);

    if(pat==='2'){
      const s=splitBeComplement(p.rest);
      return ['S='+p.S,'V='+p.V,'O(物)=—','C='+(join(s.C)||'—'),'M='+(join(s.M)||'—')].join('\n');
    }

    if(pat==='1') return ['S='+p.S,'V='+p.V,'O(物)=—','C=—','M='+(join(p.rest)||'—')].join('\n');

    // pat==='3'
    let rest=p.rest.slice();
    let M=[];
    if(rest.length && lw(rest[0])==='not') M.push(rest.shift());
    if(isDirAdvAfterMotion(mainV, lw(rest[0]||''))){
      return ['S='+p.S,'V='+p.V,'O(物)=—','C=—','M='+(join(M.concat(rest))||'—')].join('\n');
    }
    if(isToInfObject(mainV, rest)){
      return ['S='+p.S,'V='+p.V,'O(物)='+(join(rest)||'—'),'C=—','M='+(join(M)||'—')].join('\n');
    }
    const sp=splitAtFirstPrep(rest);
    return ['S='+p.S,'V='+p.V,'O(物)='+(join(sp.head)||'—'),'C=—','M='+(join(M.concat(sp.tail))||'—')].join('\n');
  }

  // HINT3 dedupe + filter by correct pattern
  function normKey(s){
    s = normalizeContractions(s);
    s = s.toLowerCase();
    s = s.replace(/[“”]/g,'"');
    s = s.replace(/[^a-z0-9\s]/g,' ');
    s = s.replace(/\s+/g,' ').trim();
    return s;
  }

  function buildHint3(it){
    const allArr=(it && it.targets && it.targets.length) ? it.targets : [];
    if(!allArr.length) return 'HINT 3（正解例まとめ）: ';

    const correct = String(it.pattern||'');
    const seen = new Set();
    const rows = [];

    for(let i=0;i<allArr.length;i++){
      const s=String(allArr[i]||'');
      const key=normKey(s);
      if(!key || seen.has(key)) continue;
      seen.add(key);
      const inf=window.inferPatternFromSentence(s);
      const pat=String((inf&&inf.guess) || correct || '');
      rows.push({s, pat});
    }

    let filtered = rows;
    if(correct){
      const keep = rows.filter(r=>String(r.pat)===String(correct));
      if(keep.length) filtered = keep;
    }

    const parts = filtered.map(r=> r.s + ' ：' + (typeof patternLabel==='function' ? patternLabel(String(r.pat)) : String(r.pat)) );
    const header = 'HINT 3（正解例まとめ）: ' + parts.join(' / ');
    const patLine = '正解の文型：' + (typeof patternLabel==='function' ? patternLabel(String(correct)) : String(correct));
    return header + '\n' + patLine;
  }

  function newShowHint(){
    const it=window.pool && window.pool[window.idx];
    if(!it) return;
    window.hintLevel=Math.min(3,(window.hintLevel||0)+1);
    const tgt=(it.targets && it.targets.length) ? it.targets[0] : '';

    if(window.hintLevel===1){
      window.els.statusMsg.textContent = 'HINT 1（S/V/O/C/M）:\n' + buildHint1FromHINT2(tgt);
      window.els.explain.classList.remove('show');
    } else if(window.hintLevel===2){
      window.els.statusMsg.textContent = 'HINT 2（正解）: ' + tgt;
      window.els.explain.classList.remove('show');
    } else {
      window.els.statusMsg.textContent = buildHint3(it);
      window.els.explain.classList.remove('show');
    }
  }

  function replaceHintButton(){
    const btn=document.getElementById('btnHint');
    if(!btn || !btn.parentNode) return;
    const clone=btn.cloneNode(true);
    btn.parentNode.replaceChild(clone, btn);
    clone.addEventListener('click', newShowHint);
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', replaceHintButton);
  else replaceHintButton();
})();
</script>


<script>
/* =================== HINT PATCH v12 (HINT3: add alt patterns reliably) ===================
  目的:
    - targets に別解がある場合、その文ごとの文型ラベルを HINT3 に必ず付ける
    - 「正解の文型」も、別解で出てくる文型を追加して列挙する
  重要:
    - 元HTMLは HINT ボタンの click handler を差し替える実装があるため、btnHint を再クローンして本パッチを確実に適用
    - 画面下に [HINT PATCH v12 ACTIVE] を表示
  判定ルール（to/for 交替を優先）:
    - 受け手(人)が動詞直後に来る: SVOO(4)
    - 物 + to/for + 人 の形: SVO(3)
    - それ以外は inferPatternFromSentence を使う（あれば）
*/
(function(){
  if(window.__HINT_PATCH_V12__) return;
  window.__HINT_PATCH_V12__ = true;

  function setActiveFlag(){
    try{
      if(window.els && window.els.statusSub){
        var s=String(window.els.statusSub.textContent||'');
        if(s.indexOf('[HINT PATCH v12 ACTIVE]')===-1){
          window.els.statusSub.textContent = s + '  [HINT PATCH v12 ACTIVE]';
        }
      }
    }catch(e){}
  }

  function patLabel(p){
    return (typeof window.patternLabel==='function') ? window.patternLabel(String(p||'')) : String(p||'');
  }

  // Ditrans verbs (minimal set used in this dataset)
  var DITRANS = /\b(give|gave|send|sent|show|showed|teach|taught|tell|told|lend|lent|buy|bought|make|made|cook|cooked|get|got|offer|offered|bring|brought|write|wrote)\b/i;
  var OBJPRON = /\b(me|him|her|us|them|you)\b/i;

  function detectPatForSentence(s, fallback){
    s = String(s||'');
    // Normalize apostrophes lightly
    s = s.replace(/[’‛＇`]/g,"'");

    // 1) SVOO: verb + (me/him/her/us/them/you) + noun ...
    //    (e.g., bought you this / lent me his pen)
    if(DITRANS.test(s)){
      var m = s.match(DITRANS);
      if(m){
        var v = m[0];
        // look for "v + pron" pattern
        var reSVOO = new RegExp('\\b'+v+'\\b\\s+' + OBJPRON.source, 'i');
        if(reSVOO.test(s)) return '4';
      }
      // 2) SVO (dative prep): "... to/for + pron/name"
      //    (e.g., lent his pen to me / bought this for you)
      if(/\b(to|for)\b/i.test(s)) return '3';
    }

    // 3) fallback to inferPatternFromSentence if available
    if(typeof window.inferPatternFromSentence==='function'){
      var inf = window.inferPatternFromSentence(s);
      if(inf && inf.guess) return String(inf.guess);
    }
    return String(fallback||'');
  }

  function buildHint3_WithAltPatterns(it){
    var arr = (it && it.targets && it.targets.length) ? it.targets : [];
    if(!arr.length) return 'HINT 3（正解例まとめ）: \n正解の文型：';

    var base = String(it.pattern||'');
    var parts=[];
    var pats=[];
    var seenP = {};

    function addPat(p){
      p = String(p||'');
      if(!p) return;
      if(!seenP[p]){ seenP[p]=1; pats.push(p); }
    }

    addPat(base);

    for(var i=0;i<arr.length;i++){
      var s = String(arr[i]||'').trim();
      if(!s) continue;
      var p = detectPatForSentence(s, base);
      addPat(p);
      parts.push(s + ' ：' + patLabel(p));
    }

    var header = 'HINT 3（正解例まとめ）: ' + parts.join(' / ');
    var patLine = '正解の文型：' + pats.map(patLabel).join(' / ');
    return header + '\n' + patLine;
  }

  function buildHint1(it){
    var tgt = (it && it.targets && it.targets.length) ? it.targets[0] : '';
    if(typeof window.buildHint1FromHINT2 === 'function') return window.buildHint1FromHINT2(tgt);
    if(typeof window.buildHintWithM === 'function'){
      var inf = (typeof window.inferPatternFromSentence==='function') ? window.inferPatternFromSentence(tgt) : null;
      var v = inf ? (inf.verb || '') : '';
      return window.buildHintWithM(tgt, String(it.pattern||''), v, it);
    }
    return 'S=—\nV=—\nO(物)=—\nC=—\nM=—';
  }

  function newShowHintV12(){
    var it = window.pool && window.pool[window.idx];
    if(!it) return;
    window.hintLevel = Math.min(3, (window.hintLevel||0) + 1);
    setActiveFlag();

    var tgt = (it.targets && it.targets.length) ? it.targets[0] : '';
    if(window.hintLevel===1){
      window.els.statusMsg.textContent = 'HINT 1（S/V/O/C/M）:\n' + buildHint1(it);
      window.els.explain.classList.remove('show');
    } else if(window.hintLevel===2){
      window.els.statusMsg.textContent = 'HINT 2（正解）: ' + tgt;
      window.els.explain.classList.remove('show');
    } else {
      window.els.statusMsg.textContent = buildHint3_WithAltPatterns(it);
      window.els.explain.classList.remove('show');
    }
  }

  function replaceHintButtonV12(){
    var btn = document.getElementById('btnHint');
    if(!btn || !btn.parentNode) return;
    var clone = btn.cloneNode(true);
    btn.parentNode.replaceChild(clone, btn);
    clone.addEventListener('click', newShowHintV12);
    setActiveFlag();
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', function(){ setTimeout(replaceHintButtonV12, 0); });
  else setTimeout(replaceHintButtonV12, 0);
})();
/* ================= END HINT PATCH v12 ================= */
</script>


<script>/* HINT_PATCH_SVC_ASLEEP v2 */
(function(){
  if(window.__HINT_PATCH_SVC_ASLEEP__) return;
  window.__HINT_PATCH_SVC_ASLEEP__=true;
  var _origInfer=window.inferPatternFromSentence;
  function lower(s){return String(s||'').toLowerCase();}
  function simpleTokenize(raw){
    if(typeof window.tokenize==='function') return window.tokenize(raw||'');
    return String(raw||'').trim().split(/\s+/).filter(Boolean);
  }
  function isWordLike(t){
    if(typeof window.isWord==='function') return window.isWord(t);
    return /[A-Za-z0-9]/.test(String(t||''));
  }
  function isAdjLike(w){
    w=lower(w);
    if(!w) return false;
    if(['asleep','awake','afraid','alive','alone','ready','tired','late','early','busy','free','open','closed','sure','happy','sad','boring','interesting','important'].indexOf(w)>=0) return true;
    if(/(y|ful|ous|able|ible|al|ive|less|ic|ish|ed)$/.test(w)) return true;
    return false;
  }
  function isLinkVerb(v){
    v=lower(v);
    return ['be','am','is','are','was','were','been','being','become','became','seem','seems','look','looks','feel','feels','remain','remains','stay','stays','sound','sounds','taste','tastes','smell','smells','appear','appears','get','got','turn','turned','grow','grew','fall','fell','fallen'].indexOf(v)>=0;
  }
  function guessPattern(raw){
    var tokens=simpleTokenize(raw);
    while(tokens.length && !isWordLike(tokens[tokens.length-1])) tokens.pop();
    if(tokens.length<2) return {guess:'1',verb:'',why:'短すぎ'};
    var AUX={am:1,is:1,are:1,was:1,were:1,be:1,been:1,being:1,do:1,does:1,did:1,have:1,has:1,had:1,can:1,will:1,shall:1,may:1,might:1,must:1,should:1,could:1,would:1};
    var irr={went:1,came:1,saw:1,made:1,gave:1,took:1,found:1,kept:1,told:1,sent:1,felt:1,left:1,slept:1,ran:1,bought:1,caught:1,ate:1,drank:1,wrote:1,read:1,said:1,sat:1,stood:1,met:1,put:1,got:1,hid:1};
    var vIndex=1;
    for(var i=1;i<tokens.length;i++){
      var w=lower(tokens[i]);
      if(isLinkVerb(w) || AUX[w] || irr[w] || /^[a-z]+(ed|s|es)$/.test(w)){ vIndex=i; break; }
    }
    var verb=lower(tokens[vIndex]||'');
    var t1=lower(tokens[vIndex+1]||'');
    // phrasal verb doze off => SV
    if((verb==='doze'||verb==='dozed') && t1==='off') return {guess:'1',verb:verb,why:'句動詞 doze off（自動詞）'};
    // link/state-change + complement => SVC
    if(isLinkVerb(verb) && isAdjLike(t1)) return {guess:'2',verb:verb,why:'リンク動詞/状態変化＋補語C'};
    // preposition right after verb => SV
    var isPrep = (typeof window.isPrepTok==='function') ? window.isPrepTok(t1) : (['in','on','at','during','for','from','to','with','by','about','into','over','under','before','after','since','until','around','near','of'].indexOf(t1)>=0);
    if(isPrep) return {guess:'1',verb:verb,why:'V直後が前置詞 = SV'};
    // noun start => SVO fallback
    var looksNoun = (typeof window.looksNounStart==='function') ? window.looksNounStart(t1) : (!!t1 && !isAdjLike(t1));
    if(looksNoun) return {guess:'3',verb:verb,why:'V直後が名詞 = SVO'};
    return {guess:'1',verb:verb,why:'default SV'};
  }
  window.inferPatternFromSentence = function(raw){
    var g=guessPattern(raw);
    if(_origInfer){
      try{
        var o=_origInfer(raw);
        if(g && (g.guess==='2' || (g.why&&g.why.indexOf('doze off')>=0))) return g;
        return o;
      }catch(e){ return g; }
    }
    return g;
  };
  var _origBuildHintWithM = window.buildHintWithM;
  window.buildHintWithM = function(raw, patGuess, verb, it){
    var inf=guessPattern(raw||'');
    if(inf && inf.guess==='2'){
      var tokens=simpleTokenize(raw||'');
      while(tokens.length && !isWordLike(tokens[tokens.length-1])) tokens.pop();
      var vIdx=1;
      for(var i=1;i<tokens.length;i++){ if(lower(tokens[i])===inf.verb){ vIdx=i; break; } }
      var S=tokens.slice(0,vIdx).join(' ')||'—';
      var V=tokens[vIdx]||'—';
      var C=tokens[vIdx+1]||'—';
      var M=tokens.slice(vIdx+2).join(' ')||'—';
      return ['S='+S,'V='+V,'O(物)=—','C='+C,'M='+M].join('\n');
    }
    return _origBuildHintWithM ? _origBuildHintWithM(raw, patGuess, verb, it) : ['S=—','V=—','O(物)=—','C=—','M=—'].join('\n');
  };
})();
</script>

<script>/* CHECK_PATCH_MULTI_PATTERN v1 */
(function(){
  if(window.__CHECK_PATCH_MULTI_PATTERN__) return;
  window.__CHECK_PATCH_MULTI_PATTERN__=true;
  var _origCheck=window.checkAnswer;
  function safeGetEls(){
    return window.els || {patternSel:document.getElementById('patternSel'),patternWrap:document.getElementById('patternWrap'),statusMsg:document.getElementById('statusMsg'),explain:document.getElementById('explain')};
  }
  window.checkAnswer = function(){
    var els=safeGetEls();
    try{ if(els.explain && els.explain.classList) els.explain.classList.remove('show'); }catch(e){}
    var pool = window.pool || [];
    var idx = (window.idx!=null) ? window.idx : 0;
    var it = pool[idx];
    if(!it){ if(_origCheck) return _origCheck(); return; }

    var userPattern = els.patternSel ? els.patternSel.value : '';
    var userRaw = (typeof window.currentSentence==='function') ? window.currentSentence() : '';
    var user = (typeof window.normalizeSentence==='function') ? window.normalizeSentence(userRaw) : String(userRaw||'');

    if(!user || user.replace(/\s/g,'').length===0){
      if(typeof window.setStatus==='function') window.setStatus(false,'英文がまだです。','BANKから並べて英文を完成させてください。');
      return;
    }

    var targets = it.targets || [];
    var normalizedTargets = [];
    for(var i=0;i<targets.length;i++) normalizedTargets.push(window.normalizeSentence? window.normalizeSentence(targets[i]) : String(targets[i]||''));

    // ★改善: targets が複数ある場合は全て許可（従来は先頭だけのことがあった）
    var acceptList = (targets.length>1) ? normalizedTargets : ((it && it.allowAltInA) ? normalizedTargets : [normalizedTargets[0]]);
    var sentenceOk = (acceptList.indexOf(user)!==-1);

    if(userPattern===''){
      if(sentenceOk){
        if(typeof window.markAllGood==='function') window.markAllGood();
        if(typeof window.setStatus==='function') window.setStatus(false,'英文はOK。5文型を選択しよう。','5文型を選んでから CHECK。');
      } else {
        if(typeof window.setStatus==='function') window.setStatus(false,'英文を直そう。','まず英文を完成。その後 5文型 を選択。');
      }
      try{ if(els.patternWrap && els.patternWrap.classList) els.patternWrap.classList.add('bad'); }catch(e){}
      return;
    }

    // ★改善: どの正解文に一致したかで「正しい文型」を切り替える
    var matchedIndex = normalizedTargets.indexOf(user);
    var correctPattern = String(it.pattern||'');
    if(matchedIndex>=0){
      try{
        var infT = (typeof window.inferPatternFromSentence==='function') ? window.inferPatternFromSentence(targets[matchedIndex]) : null;
        if(infT && infT.guess) correctPattern = String(infT.guess);
      }catch(e){}
    }

    // 元コードの推定（ユーザー文から）も維持
    var infP = null;
    try{ infP = (typeof window.inferPatternFromSentence==='function') ? window.inferPatternFromSentence(userRaw) : null; }catch(e){ infP=null; }

    // Strict guess for dative alternation items (allowAltInA) — 元仕様を維持
    if(it && it.allowAltInA && typeof window.parseDative==='function' && typeof window.tokenize==='function'){
      try{
        var dt = window.parseDative(window.tokenize(userRaw));
        if(dt && dt.kind==='SVOO'){ infP = infP || {}; infP.guess='4'; }
        if(dt && dt.kind==='SVO_PREP'){ infP = infP || {}; infP.guess='3'; }
      }catch(e){}
    }

    // 授与系のSVOO(4) ⇄ SVO+to/for(3) 救済 — 元仕様を維持
    var altV={give:1,gave:1,send:1,sent:1,show:1,showed:1,teach:1,taught:1,tell:1,told:1,lend:1,lent:1,buy:1,bought:1,make:1,made:1,cook:1,cooked:1,get:1,got:1,find:1,found:1,offer:1,offered:1,bring:1,brought:1,write:1,wrote:1};
    if(sentenceOk && it && it.allowAltInA && infP && altV[infP.verb]){
      if(String(it.pattern)==='4' && String(infP.guess)==='3') correctPattern='3';
      if(String(it.pattern)==='3' && String(infP.guess)==='4') correctPattern='4';
    }

    var patternOk = (String(userPattern)===String(correctPattern));

    if(sentenceOk && patternOk){
      if(typeof window.setStatus==='function') window.setStatus(true,'✅ 正解！','英文・5文型が一致。');
      if(typeof window.markAllGood==='function') window.markAllGood();
      try{ if(els.patternWrap && els.patternWrap.classList){ els.patternWrap.classList.remove('bad'); els.patternWrap.classList.add('good'); } }catch(e){}
      if(it && it.allowAltInA && typeof window.showAltGuideIfNeeded==='function') window.showAltGuideIfNeeded(it,userRaw);
      return;
    }
    if(sentenceOk && !patternOk){
      if(typeof window.markAllGood==='function') window.markAllGood();
      try{ if(els.patternWrap && els.patternWrap.classList){ els.patternWrap.classList.remove('good'); els.patternWrap.classList.add('bad'); } }catch(e){}
      if(typeof window.setStatus==='function') window.setStatus(false,'英文はOK。文型が違う。','HINTで S/V/O/C を確認しよう。');
      try{ if(els.explain && els.explain.classList) els.explain.classList.remove('show'); }catch(e){}
      return;
    }

    // 英文が不正解の場合は元の挙動へ（比較ハイライト等）
    if(_origCheck) return _origCheck();
  };

  // ボタンを再バインド
  function rebindCheck(){
    var btn=document.getElementById('btnCheck');
    if(!btn||!btn.parentNode) return;
    var clone=btn.cloneNode(true);
    btn.parentNode.replaceChild(clone, btn);
    clone.addEventListener('click', window.checkAnswer);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', rebindCheck);
  else rebindCheck();
})();
</script>
</body></html>
