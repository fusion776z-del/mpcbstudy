<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>しぶちゃんの科学</title>
  <style>
    :root{
      --bg1:#050611; --bg2:#0c1330;
      --ink:#eaf2ff; --muted:rgba(234,242,255,.72);
      --glass:rgba(9,12,24,.72);
      --stroke:rgba(124,255,197,.18);
      --stroke2:rgba(189,163,255,.18);
      --accent:#7cffc5; --gold:#ffd86b;
      --shadow: 0 22px 70px rgba(0,0,0,.55);
      --r:28px;
      --btn: rgba(255,255,255,.06);
      --btnH: rgba(124,255,197,.14);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      color:var(--ink);
      font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 12% 14%, rgba(124,255,197,.14), transparent 32%),
        radial-gradient(circle at 82% 22%, rgba(189,163,255,.12), transparent 30%),
        radial-gradient(circle at 62% 84%, rgba(255,216,107,.12), transparent 32%),
        linear-gradient(180deg,var(--bg1),var(--bg2) 55%,var(--bg1));
      display:grid;
      place-items:center;
      padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      overflow-x:hidden;
    }

    /* iPhone SE2-friendly frame: 375x667 viewport */
    .phone{
      width: min(375px, 100%);
      aspect-ratio: 375 / 667;
      max-height: calc(100dvh - 28px); /* iOS dynamic viewport */
  max-height: calc(100svh - 28px); /* fallback for some Safari */
  max-height: 92vh; /* legacy fallback */
      border-radius: 34px;
      background: var(--glass);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow), 0 0 40px rgba(124,255,197,.08);
      backdrop-filter: blur(10px) saturate(1.15);
      overflow:hidden;
      position:relative;
      display:flex;
      flex-direction:column;
    }

    .bezel{
      position:absolute; inset:10px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.08);
      pointer-events:none;
    }

    .top{
      padding: 22px 18px 10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .badge{
      align-self:flex-start;
      font-size:11px;
      letter-spacing:.08em;
      font-weight:800;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid rgba(255,216,107,.26);
      background: rgba(255,216,107,.08);
      color: rgba(255,255,255,.92);
    }

    h1{
      margin:0;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: .02em;
      font-weight: 950;
    }

    .sub{
      margin:0;
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.5;
    }

    .content{
      padding: 10px 18px 18px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    
  min-height:0; /* allow flex child to shrink so it can scroll */
  overflow-y:auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

    .menu{
      margin-top: 4px;
      display:grid;
      gap:10px;
    }

    .entry{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding: 14px 14px;
      border-radius: 18px;
      border: 1px solid rgba(124,255,197,.14);
      background: var(--btn);
      color: rgba(255,255,255,.92);
      text-decoration:none;
      font-weight: 900;
      letter-spacing: .04em;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      user-select:none;
    }
    .entry:active{ transform: scale(.98); }
    .entry:hover{ background: var(--btnH); border-color: rgba(124,255,197,.30); }

    .entry .left{ display:flex; flex-direction:column; gap:2px; min-width:0; }
    .entry .lvl{ font-size:14px; }
    .entry .hint{ font-size:11.5px; color: rgba(234,242,255,.72); font-weight:800; letter-spacing:.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .chip{
      font-size:11px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(189,163,255,.22);
      background: rgba(189,163,255,.10);
      color: rgba(255,255,255,.88);
      font-weight:900;
      letter-spacing:.06em;
      flex:0 0 auto;
    }

    .footer{
      padding: 12px 18px 18px;
      border-top: 1px solid rgba(255,255,255,.08);
      color: rgba(234,242,255,.62);
      font-size: 11px;
      line-height: 1.45;
    }

    .note{
      margin:0;
    }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce){
      .entry{ transition:none; }
      .entry:active{ transform:none; }
    }
  </style>
</head>
<body>
  <main class="phone" role="main" aria-label="しぶちゃんの科学の基礎講座 入口">
    <div class="bezel" aria-hidden="true"></div>

    <header class="top">
      <div class="badge">科学の部屋</div>
      <h1>入学したての高1向け!<br>基礎講座</h1>
      <p class="sub">単語並べ替え＋理論が合っていて初めて正答だからね。<br>下のボタンからジャンルを選んでください。</p>
    </header>

    <section class="content">
      <nav class="menu" aria-label="級別入口">
        <!-- 入口だけ：リンク先HTMLは同じフォルダに置いてください -->
        <a class="entry" href="math_1.html" aria-label="確率へ">
          <div class="left">
            <div class="lvl">数学：確率</div>
            <div class="hint">ぶっちゃけここが入試の登竜門だ。</div>
          </div>
          <span class="chip">ENTER</span>
        </a>

        <a class="entry" href="phisic_1.html" aria-label="物理基礎へ">
          <div class="left">
            <div class="lvl">物理基礎：相対速度</div>
            <div class="hint">動いている自分を止める。この考え方が重要</div>
          </div>
          <span class="chip">ENTER</span>
        </a>

        <a class="entry" href="eiken_2.html" aria-label="2級へ">
          <div class="left">
            <div class="lvl">2級</div>
            <div class="hint">上振れたとしても共通テストは7割程度だ。<br>MARCH一般のスタートライン。</div>
          </div>
          <span class="chip">ENTER</span>
        </a>

        <a class="entry" href="eiken_pre1.html" aria-label="準1級へ">
          <div class="left">
            <div class="lvl">準1級</div>
            <div class="hint">共通テスト8割以上は固い。<br>旧帝、早慶狙うなら最低でもここ。</div>
          </div>
          <span class="chip">ENTER</span>
        </a>
      </nav>
    </section>

    <footer class="footer">
      <p class="note">※ 入口のみのページです。</p>
    </footer>
  </main>
</body>
</html>
